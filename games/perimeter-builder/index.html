<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>周长搭建师</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --ink: #15314b;
      --brand: #3b82f6;
      --ok: #16a34a;
      --warn: #ef4444;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eaf2ff 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
    }
    .app {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(21, 49, 75, .12);
      padding: 14px;
    }
    h1 { margin: 4px 0 10px; font-size: 1.35rem; }
    .sub { color: var(--muted); margin: 0 0 12px; font-size: .95rem; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      background: #e8f0ff;
      color: #1e40af;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: .92rem;
    }
    .target {
      margin-top: 12px;
      border: 2px dashed #93c5fd;
      border-radius: 14px;
      padding: 12px;
      background: #f8fbff;
    }
    .target strong { color: #1d4ed8; font-size: 1.15rem; }
    .panel {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 8px;
      font-size: 1rem;
      font-weight: 700;
      background: #dbeafe;
      color: #1e3a8a;
      touch-action: manipulation;
    }
    button:active { transform: scale(.98); }
    .controls {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .controls button:first-child { background: #bfdbfe; }
    .controls button:last-child { background: #fecaca; color: #991b1b; }
    .big {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #f1f5f9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      text-align: center;
    }
    .big b { display: block; font-size: 1.4rem; margin-top: 4px; }
    .msg {
      margin-top: 10px;
      min-height: 26px;
      font-weight: 700;
    }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .footer {
      margin-top: 8px;
      color: var(--muted);
      font-size: .88rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>📏 周长搭建师</h1>
    <p class="sub">用给定长度的小木条，拼出目标周长。每轮只有 20 秒，越快越准得分越高！</p>

    <div class="row">
      <span class="pill">第 <span id="round">1</span>/10 题</span>
      <span class="pill">剩余时间 <span id="time">20</span>s</span>
    </div>

    <section class="target">
      目标周长：<strong id="target">18</strong>
      <div style="margin-top:6px;color:#475569;font-size:.92rem;">点击下方木条加总，凑到刚好相等即可提交。</div>
    </section>

    <section class="panel" id="panel"></section>

    <div class="controls">
      <button id="submit">✅ 提交答案</button>
      <button id="clear">↺ 清空当前</button>
    </div>

    <section class="big">
      <div>当前总长<b id="sum">0</b></div>
      <div>总得分<b id="score">0</b></div>
    </section>

    <div class="msg" id="msg"></div>
    <p class="footer">规则：正好命中 +10 分；超出或不足 -3 分。连续命中有额外奖励。</p>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const targetEl = $('target');
    const timeEl = $('time');
    const roundEl = $('round');
    const sumEl = $('sum');
    const scoreEl = $('score');
    const msgEl = $('msg');
    const panel = $('panel');

    let round = 1;
    const maxRounds = 10;
    let target = 0;
    let sum = 0;
    let score = 0;
    let timeLeft = 20;
    let timer = null;
    let streak = 0;

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateSticks() {
      const sticks = [];
      for (let i = 0; i < 6; i++) sticks.push(rand(1, 9));
      const base = sticks[rand(0, 5)] + sticks[rand(0, 5)] + sticks[rand(0, 5)];
      target = Math.min(28, Math.max(8, base + rand(-2, 3)));
      targetEl.textContent = target;

      panel.innerHTML = '';
      sticks.forEach((v) => {
        const btn = document.createElement('button');
        btn.textContent = `+${v}`;
        btn.addEventListener('click', () => {
          sum += v;
          sumEl.textContent = sum;
        });
        panel.appendChild(btn);
      });
    }

    function showMsg(text, ok) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + (ok ? 'ok' : 'warn');
    }

    function nextRound() {
      if (round > maxRounds) {
        clearInterval(timer);
        panel.innerHTML = '';
        showMsg(`🎉 挑战完成！最终得分 ${score} 分。点击“清空当前”可重新开始。`, true);
        $('submit').disabled = true;
        return;
      }
      roundEl.textContent = round;
      sum = 0;
      timeLeft = 20;
      sumEl.textContent = sum;
      timeEl.textContent = timeLeft;
      showMsg('', true);
      generateSticks();
    }

    function judge(auto = false) {
      let delta = 0;
      if (sum === target) {
        streak++;
        delta = 10 + Math.min(5, streak - 1);
        score += delta;
        showMsg(`命中！+${delta} 分${streak > 1 ? `（连击 x${streak}）` : ''}`, true);
      } else {
        streak = 0;
        delta = -3;
        score += delta;
        const reason = auto ? '超时未提交' : (sum > target ? '超出了目标' : '还没达到目标');
        showMsg(`${reason}，${delta} 分`, false);
      }
      score = Math.max(0, score);
      scoreEl.textContent = score;
      round++;
      setTimeout(nextRound, 800);
    }

    function restart() {
      round = 1;
      score = 0;
      streak = 0;
      scoreEl.textContent = score;
      $('submit').disabled = false;
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) judge(true);
      }, 1000);
      nextRound();
    }

    $('submit').addEventListener('click', () => judge(false));
    $('clear').addEventListener('click', () => {
      if (round > maxRounds) {
        restart();
      } else {
        sum = 0;
        sumEl.textContent = sum;
      }
    });

    restart();
  </script>
</body>
</html>
