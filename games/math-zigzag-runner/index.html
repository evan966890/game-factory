<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>数学曲折跑</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --ok: #22c55e;
      --bad: #ef4444;
      --shield: #3b82f6;
      --text: #e5e7eb;
      --path: #1e293b;
      --obstacle: #ef4444;
      --ball: #22d3ee;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1024, #111827);
      color: var(--text);
      min-height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }
    
    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }
    
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      z-index: 10;
    }
    
    .hud-item {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 8px 12px;
      text-align: center;
      min-width: 80px;
    }
    
    .hud-label {
      font-size: 12px;
      opacity: 0.7;
    }
    
    .hud-value {
      font-size: 20px;
      font-weight: 700;
    }
    
    #shield-indicator {
      position: absolute;
      top: 60px;
      left: 10px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid var(--shield);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 14px;
      display: none;
    }
    
    #question-modal {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .question-content {
      background: var(--card);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
      width: min(90%, 400px);
      text-align: center;
    }
    
    .question-text {
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 800;
      margin-bottom: 20px;
    }
    
    .question-timer {
      font-size: 24px;
      margin-bottom: 20px;
      color: var(--accent);
    }
    
    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .option-btn {
      appearance: none;
      border: 1px solid #334155;
      background: #111827;
      color: var(--text);
      border-radius: 12px;
      padding: 16px;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .option-btn:active {
      transform: scale(0.95);
    }
    
    .option-btn.correct {
      background: rgba(34, 197, 94, 0.2);
      border-color: var(--ok);
    }
    
    .option-btn.wrong {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--bad);
    }
    
    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .game-over-content {
      background: var(--card);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 32px;
      width: min(90%, 400px);
      text-align: center;
    }
    
    .game-over-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    
    .final-score {
      font-size: 48px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 10px;
    }
    
    .high-score {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 20px;
    }
    
    .achievements {
      margin-bottom: 24px;
      text-align: left;
    }
    
    .achievement {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1f2937;
    }
    
    .achievement:last-child {
      border-bottom: none;
    }
    
    .achievement-icon {
      font-size: 20px;
    }
    
    .achievement.unlocked .achievement-icon {
      color: var(--ok);
    }
    
    .restart-btn {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      color: white;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .restart-btn:active {
      transform: scale(0.95);
    }
    
    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .start-content {
      background: var(--card);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 32px;
      width: min(90%, 400px);
      text-align: center;
    }
    
    .start-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    
    .start-subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    
    .start-btn {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      color: white;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .start-btn:active {
      transform: scale(0.95);
    }
    
    .instructions {
      margin-top: 24px;
      font-size: 14px;
      opacity: 0.7;
      text-align: left;
    }
    
    .instructions li {
      margin-bottom: 8px;
    }
    
    @keyframes flash-green {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(34, 197, 94, 0.3); }
    }
    
    @keyframes flash-red {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(239, 68, 68, 0.3); }
    }
    
    .flash-green {
      animation: flash-green 0.5s ease;
    }
    
    .flash-red {
      animation: flash-red 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    
    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">距离</div>
        <div id="distance" class="hud-value">0m</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">分数</div>
        <div id="score" class="hud-value">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">最高分</div>
        <div id="high-score" class="hud-value">0</div>
      </div>
    </div>
    
    <div id="shield-indicator">🛡️ 护盾激活</div>
    
    <div id="question-modal">
      <div class="question-content">
        <div id="question-text" class="question-text">5 + 3 = ?</div>
        <div id="question-timer" class="question-timer">5</div>
        <div id="options-grid" class="options-grid"></div>
      </div>
    </div>
    
    <div id="game-over">
      <div class="game-over-content">
        <div class="game-over-title">游戏结束</div>
        <div id="final-score" class="final-score">0</div>
        <div id="high-score-display" class="high-score">最高分: 0</div>
        <div id="achievements" class="achievements"></div>
        <button id="restart-btn" class="restart-btn">再来一局</button>
      </div>
    </div>
    
    <div id="start-screen">
      <div class="start-content">
        <div class="start-title">数学曲折跑</div>
        <div class="start-subtitle">点击控制球体在曲折路径上滚动，避开障碍物，回答数学问题获得奖励！</div>
        <button id="start-btn" class="start-btn">开始游戏</button>
        <ul class="instructions">
          <li>👆 点击屏幕控制球体移动方向</li>
          <li>🧮 每前进100米回答一道数学题</li>
          <li>✅ 答对获得加速和护盾</li>
          <li>❌ 答错减速并失去护盾</li>
          <li>🏆 挑战高分，解锁成就</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    // 游戏状态
    const state = {
      running: false,
      paused: false,
      distance: 0,
      score: 0,
      highScore: 0,
      speed: 3,
      baseSpeed: 3,
      shield: false,
      shieldTime: 0,
      correctAnswers: 0,
      achievements: {
        mathMaster: false,  // 答对50题
        kilometerRunner: false,  // 前进1000米
        highScorer: false  // 达到5000分
      },
      lastQuestionDistance: 0,
      questionInterval: 100,  // 每100米出题
      currentQuestion: null,
      questionTimer: null,
      questionTimeLeft: 5
    };

    // 球体
    const ball = {
      x: 0,
      y: 0,
      radius: 15,
      targetX: 0,
      moving: false
    };

    // 路径
    const path = {
      points: [],
      width: 0,
      offset: 0,
      amplitude: 100,
      frequency: 0.02
    };

    // 障碍物
    let obstacles = [];
    const obstacleSize = 30;

    // 画布
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // DOM元素
    const distanceEl = document.getElementById('distance');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const shieldIndicator = document.getElementById('shield-indicator');
    const questionModal = document.getElementById('question-modal');
    const questionText = document.getElementById('question-text');
    const questionTimerEl = document.getElementById('question-timer');
    const optionsGrid = document.getElementById('options-grid');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const highScoreDisplay = document.getElementById('high-score-display');
    const achievementsEl = document.getElementById('achievements');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // 初始化
    function init() {
      resizeCanvas();
      loadHighScore();
      generatePath();
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 100;
      ball.targetX = ball.x;
      
      window.addEventListener('resize', resizeCanvas);
      canvas.addEventListener('mousedown', handleClick);
      canvas.addEventListener('touchstart', handleTouch, { passive: false });
      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', restartGame);
      
      render();
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      path.width = canvas.width * 0.8;
      generatePath();
    }

    function loadHighScore() {
      const saved = localStorage.getItem('math-zigzag-runner-highscore');
      if (saved) {
        state.highScore = parseInt(saved, 10);
        highScoreEl.textContent = state.highScore;
      }
    }

    function saveHighScore() {
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('math-zigzag-runner-highscore', state.highScore.toString());
        highScoreEl.textContent = state.highScore;
      }
    }

    function loadAchievements() {
      const saved = localStorage.getItem('math-zigzag-runner-achievements');
      if (saved) {
        state.achievements = JSON.parse(saved);
      }
    }

    function saveAchievements() {
      localStorage.setItem('math-zigzag-runner-achievements', JSON.stringify(state.achievements));
    }

    function generatePath() {
      path.points = [];
      const segments = 100;
      const segmentHeight = canvas.height / segments;
      
      for (let i = 0; i <= segments; i++) {
        const y = i * segmentHeight;
        const x = canvas.width / 2 + Math.sin(y * path.frequency + path.offset) * path.amplitude;
        path.points.push({ x, y });
      }
    }

    function generateObstacles() {
      obstacles = [];
      const count = Math.floor(state.distance / 200) + 3;
      
      for (let i = 0; i < count; i++) {
        const y = Math.random() * canvas.height;
        const pathPoint = getPathPointAtY(y);
        if (pathPoint) {
          const side = Math.random() > 0.5 ? 1 : -1;
          const offset = 50 + Math.random() * 100;
          obstacles.push({
            x: pathPoint.x + side * offset,
            y: y,
            width: obstacleSize,
            height: obstacleSize
          });
        }
      }
    }

    function getPathPointAtY(y) {
      for (let i = 0; i < path.points.length - 1; i++) {
        if (y >= path.points[i].y && y <= path.points[i + 1].y) {
          const t = (y - path.points[i].y) / (path.points[i + 1].y - path.points[i].y);
          return {
            x: path.points[i].x + t * (path.points[i + 1].x - path.points[i].x)
          };
        }
      }
      return null;
    }

    function handleClick(e) {
      if (!state.running || state.paused) return;
      const rect = canvas.getBoundingClientRect();
      ball.targetX = e.clientX - rect.left;
      ball.moving = true;
    }

    function handleTouch(e) {
      e.preventDefault();
      if (!state.running || state.paused) return;
      const rect = canvas.getBoundingClientRect();
      ball.targetX = e.touches[0].clientX - rect.left;
      ball.moving = true;
    }

    function startGame() {
      startScreen.style.display = 'none';
      state.running = true;
      state.paused = false;
      state.distance = 0;
      state.score = 0;
      state.speed = state.baseSpeed;
      state.shield = false;
      state.correctAnswers = 0;
      state.lastQuestionDistance = 0;
      loadAchievements();
      
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 100;
      ball.targetX = ball.x;
      
      generatePath();
      generateObstacles();
      
      gameLoop();
    }

    function restartGame() {
      gameOverScreen.style.display = 'none';
      startGame();
    }

    function gameLoop() {
      if (!state.running) return;
      
      update();
      render();
      
      requestAnimationFrame(gameLoop);
    }

    function update() {
      if (state.paused) return;
      
      // 更新距离和分数
      state.distance += state.speed / 10;
      state.score += Math.floor(state.speed / 10);
      
      // 更新护盾
      if (state.shield) {
        state.shieldTime -= 16;
        if (state.shieldTime <= 0) {
          state.shield = false;
          shieldIndicator.style.display = 'none';
        }
      }
      
      // 移动球体
      if (ball.moving) {
        const dx = ball.targetX - ball.x;
        ball.x += dx * 0.1;
        if (Math.abs(dx) < 1) {
          ball.moving = false;
        }
      }
      
      // 保持球体在路径上
      const pathPoint = getPathPointAtY(ball.y);
      if (pathPoint) {
        const maxOffset = path.width / 2 - ball.radius;
        ball.x = Math.max(pathPoint.x - maxOffset, Math.min(pathPoint.x + maxOffset, ball.x));
      }
      
      // 滚动路径
      path.offset += state.speed * 0.01;
      generatePath();
      
      // 滚动障碍物
      obstacles.forEach(obs => {
        obs.y -= state.speed;
      });
      
      // 移除屏幕外的障碍物
      obstacles = obstacles.filter(obs => obs.y > -obstacleSize);
      
      // 生成新障碍物
      if (obstacles.length < 5) {
        generateObstacles();
      }
      
      // 碰撞检测
      if (!state.shield) {
        for (const obs of obstacles) {
          if (checkCollision(ball, obs)) {
            gameOver();
            return;
          }
        }
      }
      
      // 检查是否需要出题
      if (state.distance - state.lastQuestionDistance >= state.questionInterval) {
        showQuestion();
      }
      
      // 更新UI
      distanceEl.textContent = Math.floor(state.distance) + 'm';
      scoreEl.textContent = state.score;
    }

    function checkCollision(ball, obs) {
      const dx = ball.x - (obs.x + obs.width / 2);
      const dy = ball.y - (obs.y + obs.height / 2);
      const distance = Math.sqrt(dx * dx + dy * dy);
      return distance < ball.radius + Math.min(obs.width, obs.height) / 2;
    }

    function showQuestion() {
      state.paused = true;
      state.lastQuestionDistance = state.distance;
      
      // 根据距离确定难度
      let difficulty = 1;
      if (state.distance >= 2000) difficulty = 4;
      else if (state.distance >= 1000) difficulty = 3;
      else if (state.distance >= 500) difficulty = 2;
      
      state.currentQuestion = generateQuestion(difficulty);
      questionText.textContent = state.currentQuestion.text;
      
      // 生成选项
      optionsGrid.innerHTML = '';
      state.currentQuestion.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.addEventListener('click', () => selectAnswer(option, btn));
        optionsGrid.appendChild(btn);
      });
      
      // 启动计时器
      state.questionTimeLeft = 5;
      questionTimerEl.textContent = state.questionTimeLeft;
      questionModal.style.display = 'flex';
      
      state.questionTimer = setInterval(() => {
        state.questionTimeLeft--;
        questionTimerEl.textContent = state.questionTimeLeft;
        
        if (state.questionTimeLeft <= 0) {
          clearInterval(state.questionTimer);
          handleAnswer(false);
        }
      }, 1000);
    }

    function generateQuestion(difficulty) {
      let a, b, answer, text, type;
      
      switch (difficulty) {
        case 1: // 加法
          a = Math.floor(Math.random() * 50);
          b = Math.floor(Math.random() * 50);
          answer = a + b;
          text = `${a} + ${b} = ?`;
          type = 'addition';
          break;
        case 2: // 加法和减法
          if (Math.random() > 0.5) {
            a = Math.floor(Math.random() * 50);
            b = Math.floor(Math.random() * 50);
            answer = a + b;
            text = `${a} + ${b} = ?`;
            type = 'addition';
          } else {
            a = Math.floor(Math.random() * 50) + 50;
            b = Math.floor(Math.random() * 50);
            answer = a - b;
            text = `${a} - ${b} = ?`;
            type = 'subtraction';
          }
          break;
        case 3: // 加减乘
          const rand = Math.random();
          if (rand < 0.33) {
            a = Math.floor(Math.random() * 50);
            b = Math.floor(Math.random() * 50);
            answer = a + b;
            text = `${a} + ${b} = ?`;
            type = 'addition';
          } else if (rand < 0.66) {
            a = Math.floor(Math.random() * 50) + 50;
            b = Math.floor(Math.random() * 50);
            answer = a - b;
            text = `${a} - ${b} = ?`;
            type = 'subtraction';
          } else {
            a = Math.floor(Math.random() * 12) + 1;
            b = Math.floor(Math.random() * 12) + 1;
            answer = a * b;
            text = `${a} × ${b} = ?`;
            type = 'multiplication';
          }
          break;
        case 4: // 加减乘除
          const rand2 = Math.random();
          if (rand2 < 0.25) {
            a = Math.floor(Math.random() * 50);
            b = Math.floor(Math.random() * 50);
            answer = a + b;
            text = `${a} + ${b} = ?`;
            type = 'addition';
          } else if (rand2 < 0.5) {
            a = Math.floor(Math.random() * 50) + 50;
            b = Math.floor(Math.random() * 50);
            answer = a - b;
            text = `${a} - ${b} = ?`;
            type = 'subtraction';
          } else if (rand2 < 0.75) {
            a = Math.floor(Math.random() * 12) + 1;
            b = Math.floor(Math.random() * 12) + 1;
            answer = a * b;
            text = `${a} × ${b} = ?`;
            type = 'multiplication';
          } else {
            b = Math.floor(Math.random() * 12) + 1;
            answer = Math.floor(Math.random() * 12) + 1;
            a = b * answer;
            text = `${a} ÷ ${b} = ?`;
            type = 'division';
          }
          break;
      }
      
      // 生成选项
      const options = [answer];
      while (options.length < 4) {
        const offset = Math.floor(Math.random() * 20) - 10;
        const wrongAnswer = answer + offset;
        if (wrongAnswer > 0 && !options.includes(wrongAnswer)) {
          options.push(wrongAnswer);
        }
      }
      
      // 打乱选项
      options.sort(() => Math.random() - 0.5);
      
      return { text, answer, options, type };
    }

    function selectAnswer(selected, btn) {
      clearInterval(state.questionTimer);
      const correct = selected === state.currentQuestion.answer;
      
      // 显示正确/错误
      const buttons = optionsGrid.querySelectorAll('.option-btn');
      buttons.forEach(button => {
        const value = parseInt(button.textContent, 10);
        if (value === state.currentQuestion.answer) {
          button.classList.add('correct');
        } else if (button === btn && !correct) {
          button.classList.add('wrong');
        }
        button.disabled = true;
      });
      
      setTimeout(() => handleAnswer(correct), 500);
    }

    function handleAnswer(correct) {
      questionModal.style.display = 'none';
      state.paused = false;
      
      if (correct) {
        // 答对奖励
        state.correctAnswers++;
        state.score += 100;
        state.speed = state.baseSpeed * 1.5;
        state.shield = true;
        state.shieldTime = 5000; // 5秒护盾
        shieldIndicator.style.display = 'block';
        
        // 视觉反馈
        document.getElementById('game-container').classList.add('flash-green');
        setTimeout(() => {
          document.getElementById('game-container').classList.remove('flash-green');
        }, 500);
        
        // 检查成就
        if (state.correctAnswers >= 50 && !state.achievements.mathMaster) {
          state.achievements.mathMaster = true;
          saveAchievements();
        }
      } else {
        // 答错惩罚
        state.speed = state.baseSpeed * 0.7;
        state.shield = false;
        shieldIndicator.style.display = 'none';
        
        // 视觉反馈
        document.getElementById('game-container').classList.add('flash-red');
        setTimeout(() => {
          document.getElementById('game-container').classList.remove('flash-red');
        }, 500);
      }
      
      // 恢复速度
      setTimeout(() => {
        state.speed = state.baseSpeed;
      }, 2000);
    }

    function gameOver() {
      state.running = false;
      saveHighScore();
      
      // 检查成就
      if (state.distance >= 1000 && !state.achievements.kilometerRunner) {
        state.achievements.kilometerRunner = true;
        saveAchievements();
      }
      if (state.score >= 5000 && !state.achievements.highScorer) {
        state.achievements.highScorer = true;
        saveAchievements();
      }
      
      // 显示游戏结束界面
      finalScoreEl.textContent = state.score;
      highScoreDisplay.textContent = `最高分: ${state.highScore}`;
      
      // 显示成就
      achievementsEl.innerHTML = '';
      const achievementList = [
        { id: 'mathMaster', name: '数学达人', desc: '答对50道题', icon: '🧮' },
        { id: 'kilometerRunner', name: '千米跑者', desc: '前进1000米', icon: '🏃' },
        { id: 'highScorer', name: '高分王者', desc: '达到5000分', icon: '👑' }
      ];
      
      achievementList.forEach(achievement => {
        const div = document.createElement('div');
        div.className = `achievement ${state.achievements[achievement.id] ? 'unlocked' : ''}`;
        div.innerHTML = `
          <span class="achievement-icon">${achievement.icon}</span>
          <div>
            <div>${achievement.name}</div>
            <div style="font-size: 12px; opacity: 0.7;">${achievement.desc}</div>
          </div>
        `;
        achievementsEl.appendChild(div);
      });
      
      gameOverScreen.style.display = 'flex';
    }

    function render() {
      // 清空画布
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制路径
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = path.width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      
      if (path.points.length > 0) {
        ctx.moveTo(path.points[0].x, path.points[0].y);
        for (let i = 1; i < path.points.length; i++) {
          ctx.lineTo(path.points[i].x, path.points[i].y);
        }
      }
      ctx.stroke();
      
      // 绘制障碍物
      ctx.fillStyle = '#ef4444';
      obstacles.forEach(obs => {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
      });
      
      // 绘制球体
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = state.shield ? '#3b82f6' : '#22d3ee';
      ctx.fill();
      
      // 绘制护盾效果
      if (state.shield) {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // 启动游戏
    init();
  </script>
</body>
</html>
