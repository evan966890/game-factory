<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>数学曲折跑</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --ok: #22c55e;
      --bad: #ef4444;
      --text: #e5e7eb;
      --path: #3b82f6;
      --ball: #f59e0b;
      --obstacle: #ef4444;
      --shield: #22c55e;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1024, #111827);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      overflow: hidden;
    }
    
    .app {
      width: min(720px, 100%);
      background: rgba(17, 24, 39, .95);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .35);
    }
    
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 5vw, 34px);
      text-align: center;
    }
    
    .sub {
      opacity: .85;
      margin: 0 0 12px;
      font-size: 14px;
      text-align: center;
    }
    
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .box {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    
    .k {
      font-size: 12px;
      opacity: .7;
    }
    
    .v {
      font-size: 22px;
      font-weight: 700;
    }
    
    .game-container {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 60vh;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #1f2937;
    }
    
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(180deg, #0b1024, #1a1a2e);
    }
    
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 10;
      padding: 20px;
      text-align: center;
    }
    
    .overlay.hidden {
      display: none;
    }
    
    .overlay h2 {
      margin: 0 0 10px;
      font-size: clamp(20px, 4vw, 28px);
    }
    
    .overlay p {
      margin: 0 0 20px;
      opacity: 0.8;
    }
    
    .overlay .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 300px;
    }
    
    .overlay .stat {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 8px;
    }
    
    .overlay .stat-label {
      font-size: 12px;
      opacity: 0.7;
    }
    
    .overlay .stat-value {
      font-size: 20px;
      font-weight: 700;
    }
    
    .math-modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(17, 24, 39, 0.95);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 20px;
      z-index: 20;
      width: 90%;
      max-width: 300px;
      text-align: center;
    }
    
    .math-modal.hidden {
      display: none;
    }
    
    .math-modal h3 {
      margin: 0 0 15px;
      font-size: 18px;
      color: var(--accent);
    }
    
    .math-problem {
      font-size: 32px;
      font-weight: 800;
      margin: 15px 0;
      color: var(--text);
    }
    
    .math-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    
    .math-option {
      appearance: none;
      border: 2px solid #334155;
      background: #111827;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 15px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .math-option:active {
      transform: scale(0.95);
    }
    
    .math-option.correct {
      background: rgba(34, 197, 94, 0.2);
      border-color: var(--ok);
    }
    
    .math-option.wrong {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--bad);
    }
    
    .math-feedback {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }
    
    .achievements {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 5;
    }
    
    .achievement {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid var(--ok);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--ok);
      animation: achievementPop 0.5s ease-out;
    }
    
    @keyframes achievementPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .shield-indicator {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid var(--shield);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--shield);
      z-index: 5;
    }
    
    .shield-indicator.hidden {
      display: none;
    }
    
    .ctl {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    
    button.primary {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      color: white;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button.primary:active {
      transform: scale(0.98);
    }
    
    .instructions {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
    
    .instructions kbd {
      background: #1f2937;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>数学曲折跑</h1>
    <p class="sub">点击控制球在曲折路径上滚动，答数学题获得加速和护盾！</p>
    
    <section class="hud">
      <div class="box">
        <div class="k">距离</div>
        <div id="distance" class="v">0m</div>
      </div>
      <div class="box">
        <div class="k">得分</div>
        <div id="score" class="v">0</div>
      </div>
      <div class="box">
        <div class="k">最高分</div>
        <div id="highScore" class="v">0</div>
      </div>
    </section>
    
    <div class="game-container">
      <canvas id="gameCanvas"></canvas>
      
      <!-- Start Overlay -->
      <div id="startOverlay" class="overlay">
        <h2>数学曲折跑</h2>
        <p>点击屏幕控制球的方向，避开障碍物，答对数学题获得奖励！</p>
        <button id="startBtn" class="primary">开始游戏</button>
      </div>
      
      <!-- Game Over Overlay -->
      <div id="gameOverOverlay" class="overlay hidden">
        <h2>游戏结束</h2>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">最终距离</div>
            <div id="finalDistance" class="stat-value">0m</div>
          </div>
          <div class="stat">
            <div class="stat-label">最终得分</div>
            <div id="finalScore" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">答对题数</div>
            <div id="correctAnswers" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">最高分</div>
            <div id="finalHighScore" class="stat-value">0</div>
          </div>
        </div>
        <button id="restartBtn" class="primary">再来一局</button>
      </div>
      
      <!-- Math Problem Modal -->
      <div id="mathModal" class="math-modal hidden">
        <h3>数学挑战！</h3>
        <div id="mathProblem" class="math-problem">5 + 3 = ?</div>
        <div id="mathOptions" class="math-options">
          <!-- Options will be generated by JS -->
        </div>
        <div id="mathFeedback" class="math-feedback"></div>
      </div>
      
      <!-- Achievements Display -->
      <div id="achievements" class="achievements"></div>
      
      <!-- Shield Indicator -->
      <div id="shieldIndicator" class="shield-indicator hidden">🛡️ 护盾激活</div>
    </div>
    
    <p class="instructions">
      <kbd>点击/触摸</kbd> 切换方向 | 每 <kbd>100m</kbd> 弹出数学题
    </p>
  </main>

  <script>
    // Game Constants
    const CANVAS_WIDTH = 400;
    const CANVAS_HEIGHT = 700;
    const BALL_RADIUS = 15;
    const PATH_WIDTH = 80;
    const OBSTACLE_SIZE = 30;
    const INITIAL_SPEED = 3;
    const SPEED_INCREMENT = 0.5;
    const MATH_INTERVAL = 100; // meters
    const SHIELD_DURATION = 3000; // ms
    
    // Game State
    let gameState = {
      isRunning: false,
      isPaused: false,
      distance: 0,
      score: 0,
      highScore: 0,
      correctAnswers: 0,
      speed: INITIAL_SPEED,
      direction: 1, // 1 = right, -1 = left
      ball: { x: 0, y: 0 },
      pathSegments: [],
      obstacles: [],
      shield: { active: false, endTime: 0 },
      achievements: [],
      lastMathDistance: 0,
      difficulty: 'addition' // addition, subtraction, multiplication, division
    };
    
    // DOM Elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const distanceEl = document.getElementById('distance');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const mathModal = document.getElementById('mathModal');
    const mathProblemEl = document.getElementById('mathProblem');
    const mathOptionsEl = document.getElementById('mathOptions');
    const mathFeedbackEl = document.getElementById('mathFeedback');
    const achievementsEl = document.getElementById('achievements');
    const shieldIndicator = document.getElementById('shieldIndicator');
    
    // Initialize Canvas
    function initCanvas() {
      canvas.width = CANVAS_WIDTH;
      canvas.height = CANVAS_HEIGHT;
      
      // Load high score from localStorage
      const savedHighScore = localStorage.getItem('mathZigzagHighScore');
      if (savedHighScore) {
        gameState.highScore = parseInt(savedHighScore);
        highScoreEl.textContent = gameState.highScore;
      }
    }
    
    // Initialize Game
    function initGame() {
      gameState = {
        isRunning: true,
        isPaused: false,
        distance: 0,
        score: 0,
        highScore: gameState.highScore,
        correctAnswers: 0,
        speed: INITIAL_SPEED,
        direction: 1,
        ball: { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT - 100 },
        pathSegments: [],
        obstacles: [],
        shield: { active: false, endTime: 0 },
        achievements: [],
        lastMathDistance: 0,
        difficulty: 'addition'
      };
      
      // Generate initial path
      generatePath();
      
      // Update UI
      updateUI();
      
      // Hide overlays
      startOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      mathModal.classList.add('hidden');
      achievementsEl.innerHTML = '';
      shieldIndicator.classList.add('hidden');
    }
    
    // Generate zigzag path
    function generatePath() {
      gameState.pathSegments = [];
      let currentX = CANVAS_WIDTH / 2;
      let currentY = CANVAS_HEIGHT;
      
      for (let i = 0; i < 20; i++) {
        const segmentLength = 100 + Math.random() * 100;
        const direction = Math.random() > 0.5 ? 1 : -1;
        const endX = Math.max(PATH_WIDTH / 2, Math.min(CANVAS_WIDTH - PATH_WIDTH / 2, currentX + direction * (100 + Math.random() * 150)));
        
        gameState.pathSegments.push({
          startX: currentX,
          startY: currentY,
          endX: endX,
          endY: currentY - segmentLength,
          direction: direction
        });
        
        currentX = endX;
        currentY -= segmentLength;
      }
    }
    
    // Generate obstacles
    function generateObstacles() {
      gameState.obstacles = [];
      
      for (let i = 0; i < gameState.pathSegments.length; i++) {
        const segment = gameState.pathSegments[i];
        const numObstacles = Math.floor(Math.random() * 3) + 1;
        
        for (let j = 0; j < numObstacles; j++) {
          const t = Math.random() * 0.8 + 0.1; // Position along segment (10% to 90%)
          const x = segment.startX + (segment.endX - segment.startX) * t;
          const y = segment.startY + (segment.endY - segment.startY) * t;
          
          // Add some randomness to x position
          const offsetX = (Math.random() - 0.5) * (PATH_WIDTH - OBSTACLE_SIZE);
          
          gameState.obstacles.push({
            x: x + offsetX,
            y: y,
            size: OBSTACLE_SIZE,
            type: Math.random() > 0.7 ? 'spike' : 'block'
          });
        }
      }
    }
    
    // Update game state
    function update(deltaTime) {
      if (!gameState.isRunning || gameState.isPaused) return;
      
      // Update distance
      gameState.distance += gameState.speed * deltaTime / 16;
      
      // Update difficulty based on distance
      if (gameState.distance > 500) gameState.difficulty = 'subtraction';
      if (gameState.distance > 1000) gameState.difficulty = 'multiplication';
      if (gameState.distance > 1500) gameState.difficulty = 'division';
      
      // Check for math problem trigger
      if (gameState.distance - gameState.lastMathDistance >= MATH_INTERVAL) {
        gameState.lastMathDistance = Math.floor(gameState.distance / MATH_INTERVAL) * MATH_INTERVAL;
        showMathProblem();
        return; // Pause game while math problem is shown
      }
      
      // Update ball position
      const currentSegment = getCurrentSegment();
      if (currentSegment) {
        const segmentProgress = (gameState.distance % 100) / 100;
        gameState.ball.x = currentSegment.startX + (currentSegment.endX - currentSegment.startX) * segmentProgress;
        gameState.ball.y = CANVAS_HEIGHT - 100 - (gameState.distance % 100);
      }
      
      // Update shield
      if (gameState.shield.active && Date.now() > gameState.shield.endTime) {
        gameState.shield.active = false;
        shieldIndicator.classList.add('hidden');
      }
      
      // Check collisions
      checkCollisions();
      
      // Update UI
      updateUI();
    }
    
    // Get current path segment
    function getCurrentSegment() {
      const segmentIndex = Math.floor(gameState.distance / 100) % gameState.pathSegments.length;
      return gameState.pathSegments[segmentIndex];
    }
    
    // Check collisions with obstacles
    function checkCollisions() {
      if (gameState.shield.active) return;
      
      for (const obstacle of gameState.obstacles) {
        const dx = gameState.ball.x - obstacle.x;
        const dy = gameState.ball.y - obstacle.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < BALL_RADIUS + obstacle.size / 2) {
          gameOver();
          return;
        }
      }
    }
    
    // Show math problem
    function showMathProblem() {
      gameState.isPaused = true;
      mathModal.classList.remove('hidden');
      
      const problem = generateMathProblem();
      mathProblemEl.textContent = problem.question;
      
      // Generate options
      mathOptionsEl.innerHTML = '';
      problem.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'math-option';
        btn.textContent = option;
        btn.onclick = () => checkMathAnswer(option, problem.answer, btn);
        mathOptionsEl.appendChild(btn);
      });
      
      mathFeedbackEl.textContent = '';
    }
    
    // Generate math problem based on difficulty
    function generateMathProblem() {
      let a, b, answer, question;
      const difficulty = gameState.difficulty;
      
      switch (difficulty) {
        case 'addition':
          a = Math.floor(Math.random() * 20) + 1;
          b = Math.floor(Math.random() * 20) + 1;
          answer = a + b;
          question = `${a} + ${b} = ?`;
          break;
        case 'subtraction':
          a = Math.floor(Math.random() * 30) + 10;
          b = Math.floor(Math.random() * a) + 1;
          answer = a - b;
          question = `${a} - ${b} = ?`;
          break;
        case 'multiplication':
          a = Math.floor(Math.random() * 10) + 1;
          b = Math.floor(Math.random() * 10) + 1;
          answer = a * b;
          question = `${a} × ${b} = ?`;
          break;
        case 'division':
          b = Math.floor(Math.random() * 9) + 2;
          answer = Math.floor(Math.random() * 10) + 1;
          a = b * answer;
          question = `${a} ÷ ${b} = ?`;
          break;
      }
      
      // Generate options (including correct answer)
      const options = [answer];
      while (options.length < 4) {
        const wrongAnswer = answer + Math.floor(Math.random() * 10) - 5;
        if (wrongAnswer > 0 && !options.includes(wrongAnswer)) {
          options.push(wrongAnswer);
        }
      }
      
      // Shuffle options
      options.sort(() => Math.random() - 0.5);
      
      return { question, answer, options };
    }
    
    // Check math answer
    function checkMathAnswer(selected, correct, btn) {
      const isCorrect = selected === correct;
      
      // Update button style
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      
      if (isCorrect) {
        gameState.correctAnswers++;
        gameState.score += 50;
        mathFeedbackEl.textContent = '✅ 正确！获得加速和护盾！';
        
        // Apply rewards
        gameState.speed += SPEED_INCREMENT;
        gameState.shield.active = true;
        gameState.shield.endTime = Date.now() + SHIELD_DURATION;
        shieldIndicator.classList.remove('hidden');
        
        // Check achievements
        checkAchievements();
      } else {
        gameState.score = Math.max(0, gameState.score - 20);
        gameState.speed = Math.max(INITIAL_SPEED, gameState.speed - SPEED_INCREMENT);
        mathFeedbackEl.textContent = `❌ 正确答案是 ${correct}`;
      }
      
      // Close modal after delay
      setTimeout(() => {
        mathModal.classList.add('hidden');
        gameState.isPaused = false;
      }, 1000);
    }
    
    // Check and award achievements
    function checkAchievements() {
      const newAchievements = [];
      
      if (gameState.distance >= 1000 && !gameState.achievements.includes('1000m')) {
        newAchievements.push({ id: '1000m', text: '🏆 1000米达成' });
        gameState.achievements.push('1000m');
      }
      
      if (gameState.correctAnswers >= 10 && !gameState.achievements.includes('10correct')) {
        newAchievements.push({ id: '10correct', text: '🎯 答对10题' });
        gameState.achievements.push('10correct');
      }
      
      if (gameState.correctAnswers >= 50 && !gameState.achievements.includes('50correct')) {
        newAchievements.push({ id: '50correct', text: '🌟 答对50题' });
        gameState.achievements.push('50correct');
      }
      
      if (gameState.score >= 1000 && !gameState.achievements.includes('1000score')) {
        newAchievements.push({ id: '1000score', text: '💎 1000分达成' });
        gameState.achievements.push('1000score');
      }
      
      // Display new achievements
      newAchievements.forEach(achievement => {
        const el = document.createElement('div');
        el.className = 'achievement';
        el.textContent = achievement.text;
        achievementsEl.appendChild(el);
        
        // Remove after animation
        setTimeout(() => el.remove(), 3000);
      });
    }
    
    // Game over
    function gameOver() {
      gameState.isRunning = false;
      
      // Update high score
      if (gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem('mathZigzagHighScore', gameState.highScore);
      }
      
      // Show game over overlay
      document.getElementById('finalDistance').textContent = Math.floor(gameState.distance) + 'm';
      document.getElementById('finalScore').textContent = gameState.score;
      document.getElementById('correctAnswers').textContent = gameState.correctAnswers;
      document.getElementById('finalHighScore').textContent = gameState.highScore;
      
      gameOverOverlay.classList.remove('hidden');
    }
    
    // Update UI
    function updateUI() {
      distanceEl.textContent = Math.floor(gameState.distance) + 'm';
      scoreEl.textContent = gameState.score;
      highScoreEl.textContent = gameState.highScore;
    }
    
    // Render game
    function render() {
      // Clear canvas
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // Draw background gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
      gradient.addColorStop(0, '#0b1024');
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      // Draw path
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = PATH_WIDTH;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      ctx.beginPath();
      for (let i = 0; i < gameState.pathSegments.length; i++) {
        const segment = gameState.pathSegments[i];
        if (i === 0) {
          ctx.moveTo(segment.startX, segment.startY);
        }
        ctx.lineTo(segment.endX, segment.endY);
      }
      ctx.stroke();
      
      // Draw path border
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = PATH_WIDTH + 4;
      ctx.globalCompositeOperation = 'destination-over';
      ctx.beginPath();
      for (let i = 0; i < gameState.pathSegments.length; i++) {
        const segment = gameState.pathSegments[i];
        if (i === 0) {
          ctx.moveTo(segment.startX, segment.startY);
        }
        ctx.lineTo(segment.endX, segment.endY);
      }
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
      
      // Draw obstacles
      for (const obstacle of gameState.obstacles) {
        ctx.fillStyle = obstacle.type === 'spike' ? '#ef4444' : '#dc2626';
        ctx.beginPath();
        if (obstacle.type === 'spike') {
          // Draw spike
          ctx.moveTo(obstacle.x, obstacle.y - obstacle.size / 2);
          ctx.lineTo(obstacle.x - obstacle.size / 2, obstacle.y + obstacle.size / 2);
          ctx.lineTo(obstacle.x + obstacle.size / 2, obstacle.y + obstacle.size / 2);
          ctx.closePath();
        } else {
          // Draw block
          ctx.rect(obstacle.x - obstacle.size / 2, obstacle.y - obstacle.size / 2, obstacle.size, obstacle.size);
        }
        ctx.fill();
      }
      
      // Draw ball
      ctx.fillStyle = gameState.shield.active ? '#22c55e' : '#f59e0b';
      ctx.beginPath();
      ctx.arc(gameState.ball.x, gameState.ball.y, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw ball border
      ctx.strokeStyle = gameState.shield.active ? '#16a34a' : '#d97706';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      // Draw shield effect
      if (gameState.shield.active) {
        ctx.strokeStyle = 'rgba(34, 197, 94, 0.5)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(gameState.ball.x, gameState.ball.y, BALL_RADIUS + 10, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    
    // Game loop
    let lastTime = 0;
    function gameLoop(timestamp) {
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;
      
      update(deltaTime);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Event listeners
    canvas.addEventListener('click', () => {
      if (gameState.isRunning && !gameState.isPaused) {
        gameState.direction *= -1;
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameState.isRunning && !gameState.isPaused) {
        gameState.direction *= -1;
      }
    });
    
    document.getElementById('startBtn').addEventListener('click', () => {
      initGame();
      requestAnimationFrame(gameLoop);
    });
    
    document.getElementById('restartBtn').addEventListener('click', () => {
      initGame();
      requestAnimationFrame(gameLoop);
    });
    
    // Initialize
    initCanvas();
    generatePath();
    generateObstacles();
    render();
  </script>
</body>
</html>
