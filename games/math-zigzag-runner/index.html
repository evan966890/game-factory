<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>数学曲折跑</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --path: #16213e;
            --ball: #e94560;
            --obstacle: #0f3460;
            --text: #ffffff;
            --accent: #e94560;
            --success: #4caf50;
            --error: #f44336;
            --ui-bg: rgba(22, 33, 62, 0.9);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 9/16;
            background: var(--path);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        
        .score-display {
            background: var(--ui-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .distance-display {
            background: var(--ui-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .math-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--accent);
        }
        
        .math-popup.active {
            display: block;
            animation: popIn 0.3s ease-out;
        }
        
        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        
        .math-question {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--accent);
        }
        
        .math-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .math-option {
            background: var(--path);
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .math-option:hover {
            background: var(--accent);
            transform: scale(1.05);
        }
        
        .math-option.correct {
            background: var(--success);
            border-color: var(--success);
        }
        
        .math-option.wrong {
            background: var(--error);
            border-color: var(--error);
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }
        
        .game-over.active {
            display: flex;
        }
        
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: var(--accent);
        }
        
        .final-score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .high-score {
            font-size: 18px;
            color: var(--success);
            margin-bottom: 30px;
        }
        
        .restart-btn {
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 16px 48px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.1);
        }
        
        .achievement-popup {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 25;
            display: none;
            animation: achievementPop 2s ease-out forwards;
        }
        
        @keyframes achievementPop {
            0% {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            20% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            80% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ui-bg);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            z-index: 15;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .shield-indicator {
            position: absolute;
            top: 60px;
            right: 16px;
            background: var(--ui-bg);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 10;
        }
        
        .shield-indicator.active {
            display: block;
            animation: shieldPulse 1s infinite;
        }
        
        @keyframes shieldPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <div class="score-display">得分: <span id="score">0</span></div>
            <div class="distance-display">距离: <span id="distance">0</span>m</div>
        </div>
        
        <div class="shield-indicator" id="shieldIndicator">🛡️ 护盾激活</div>
        
        <div class="math-popup" id="mathPopup">
            <div class="math-question" id="mathQuestion">2 + 3 = ?</div>
            <div class="math-options" id="mathOptions">
                <button class="math-option" data-answer="4">4</button>
                <button class="math-option" data-answer="5">5</button>
                <button class="math-option" data-answer="6">6</button>
                <button class="math-option" data-answer="7">7</button>
            </div>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
            <button class="restart-btn" id="restartBtn">再来一局</button>
        </div>
        
        <div class="achievement-popup" id="achievementPopup">🎉 成就解锁!</div>
        
        <div class="instructions" id="instructions">点击屏幕改变球的方向</div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            ballRadius: 15,
            pathWidth: 100,
            obstacleSize: 30,
            baseSpeed: 3,
            speedIncrement: 0.5,
            mathInterval: 100, // 每100米弹出题目
            shieldDuration: 3000, // 护盾持续时间（毫秒）
            difficultyLevels: [
                { distance: 0, operation: 'add', range: [1, 10] },
                { distance: 200, operation: 'sub', range: [1, 20] },
                { distance: 500, operation: 'mul', range: [1, 10] },
                { distance: 1000, operation: 'div', range: [1, 10] }
            ]
        };

        // 游戏状态
        let gameState = {
            score: 0,
            distance: 0,
            highScore: parseInt(localStorage.getItem('mathZigzagHighScore')) || 0,
            speed: CONFIG.baseSpeed,
            isPlaying: false,
            isPaused: false,
            shieldActive: false,
            shieldEndTime: 0,
            lastMathDistance: 0,
            correctAnswers: 0,
            totalAnswers: 0,
            achievements: {
                distance1000: false,
                correct50: false,
                score1000: false
            }
        };

        // 游戏对象
        let ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            direction: 1 // 1: 右, -1: 左
        };

        let pathSegments = [];
        let obstacles = [];
        let particles = [];

        // Canvas 上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI 元素
        const scoreEl = document.getElementById('score');
        const distanceEl = document.getElementById('distance');
        const mathPopup = document.getElementById('mathPopup');
        const mathQuestion = document.getElementById('mathQuestion');
        const mathOptions = document.getElementById('mathOptions');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');
        const achievementPopup = document.getElementById('achievementPopup');
        const instructions = document.getElementById('instructions');
        const shieldIndicator = document.getElementById('shieldIndicator');

        // 初始化游戏
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouch);
            restartBtn.addEventListener('click', restartGame);
            mathOptions.addEventListener('click', handleMathAnswer);
            
            // 隐藏说明
            setTimeout(() => {
                instructions.style.display = 'none';
            }, 5000);
            
            startGame();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            if (!gameState.isPlaying) {
                resetBall();
                generateInitialPath();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height * 0.8;
            ball.vx = CONFIG.baseSpeed * ball.direction;
            ball.vy = -CONFIG.baseSpeed;
        }

        function generateInitialPath() {
            pathSegments = [];
            obstacles = [];
            
            // 生成初始路径
            let y = canvas.height;
            while (y > -100) {
                addPathSegment(y);
                y -= CONFIG.pathWidth * 1.5;
            }
        }

        function addPathSegment(y) {
            const segmentWidth = CONFIG.pathWidth * (1 + Math.random() * 0.5);
            const x = Math.random() * (canvas.width - segmentWidth);
            
            pathSegments.push({
                x: x,
                y: y,
                width: segmentWidth,
                height: 20
            });
            
            // 随机生成障碍物
            if (Math.random() < 0.3 && y < canvas.height * 0.7) {
                obstacles.push({
                    x: x + Math.random() * (segmentWidth - CONFIG.obstacleSize),
                    y: y - CONFIG.obstacleSize,
                    width: CONFIG.obstacleSize,
                    height: CONFIG.obstacleSize
                });
            }
        }

        function startGame() {
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.score = 0;
            gameState.distance = 0;
            gameState.speed = CONFIG.baseSpeed;
            gameState.lastMathDistance = 0;
            gameState.correctAnswers = 0;
            gameState.totalAnswers = 0;
            gameState.shieldActive = false;
            
            resetBall();
            generateInitialPath();
            
            gameOverEl.classList.remove('active');
            updateUI();
            
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            update();
            render();
            
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // 更新球的位置
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 更新距离和分数
            gameState.distance += gameState.speed / 10;
            gameState.score = Math.floor(gameState.distance * 2);
            
            // 检查护盾
            if (gameState.shieldActive && Date.now() > gameState.shieldEndTime) {
                gameState.shieldActive = false;
                shieldIndicator.classList.remove('active');
            }
            
            // 检查是否需要弹出数学题
            if (gameState.distance - gameState.lastMathDistance >= CONFIG.mathInterval) {
                showMathQuestion();
                gameState.lastMathDistance = gameState.distance;
            }
            
            // 检查边界
            if (ball.x < CONFIG.ballRadius || ball.x > canvas.width - CONFIG.ballRadius) {
                ball.direction *= -1;
                ball.vx = gameState.speed * ball.direction;
            }
            
            // 检查是否掉出屏幕
            if (ball.y > canvas.height + CONFIG.ballRadius) {
                if (!gameState.shieldActive) {
                    gameOver();
                    return;
                } else {
                    // 护盾保护，重置位置
                    ball.y = canvas.height * 0.8;
                    ball.vy = -gameState.speed;
                }
            }
            
            // 检查碰撞
            checkCollisions();
            
            // 更新路径和障碍物
            updatePath();
            
            // 更新粒子
            updateParticles();
            
            // 检查成就
            checkAchievements();
            
            // 更新UI
            updateUI();
        }

        function checkCollisions() {
            // 检查与路径的碰撞
            let onPath = false;
            for (let segment of pathSegments) {
                if (ball.y + CONFIG.ballRadius > segment.y &&
                    ball.y - CONFIG.ballRadius < segment.y + segment.height &&
                    ball.x + CONFIG.ballRadius > segment.x &&
                    ball.x - CONFIG.ballRadius < segment.x + segment.width) {
                    
                    if (ball.vy > 0) {
                        ball.y = segment.y - CONFIG.ballRadius;
                        ball.vy = -gameState.speed;
                        onPath = true;
                        
                        // 创建粒子效果
                        createParticles(ball.x, ball.y + CONFIG.ballRadius, 5);
                    }
                }
            }
            
            // 检查与障碍物的碰撞
            if (!gameState.shieldActive) {
                for (let obstacle of obstacles) {
                    if (ball.x + CONFIG.ballRadius > obstacle.x &&
                        ball.x - CONFIG.ballRadius < obstacle.x + obstacle.width &&
                        ball.y + CONFIG.ballRadius > obstacle.y &&
                        ball.y - CONFIG.ballRadius < obstacle.y + obstacle.height) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        function updatePath() {
            // 移动路径和障碍物
            for (let segment of pathSegments) {
                segment.y += gameState.speed;
            }
            
            for (let obstacle of obstacles) {
                obstacle.y += gameState.speed;
            }
            
            // 移除屏幕外的路径
            pathSegments = pathSegments.filter(s => s.y < canvas.height + 50);
            obstacles = obstacles.filter(o => o.y < canvas.height + 50);
            
            // 添加新路径
            const topY = Math.min(...pathSegments.map(s => s.y));
            if (topY > -100) {
                addPathSegment(topY - CONFIG.pathWidth * 1.5);
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function createParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color: `hsl(${Math.random() * 60 + 330}, 100%, 50%)`
                });
            }
        }

        function render() {
            // 清空画布
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--path');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制路径
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--path');
            for (let segment of pathSegments) {
                ctx.fillRect(segment.x, segment.y, segment.width, segment.height);
            }
            
            // 绘制障碍物
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--obstacle');
            for (let obstacle of obstacles) {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            }
            
            // 绘制粒子
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // 绘制球
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--ball');
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, CONFIG.ballRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制护盾效果
            if (gameState.shieldActive) {
                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--success');
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, CONFIG.ballRadius + 5, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function handleClick(e) {
            if (gameState.isPaused) return;
            changeDirection();
        }

        function handleTouch(e) {
            e.preventDefault();
            if (gameState.isPaused) return;
            changeDirection();
        }

        function changeDirection() {
            ball.direction *= -1;
            ball.vx = gameState.speed * ball.direction;
        }

        function showMathQuestion() {
            gameState.isPaused = true;
            
            // 根据距离确定难度
            let difficulty = CONFIG.difficultyLevels[0];
            for (let level of CONFIG.difficultyLevels) {
                if (gameState.distance >= level.distance) {
                    difficulty = level;
                }
            }
            
            // 生成题目
            const question = generateMathQuestion(difficulty);
            mathQuestion.textContent = question.text;
            
            // 生成选项
            mathOptions.innerHTML = '';
            const options = generateOptions(question.answer);
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'math-option';
                btn.textContent = option;
                btn.dataset.answer = option;
                mathOptions.appendChild(btn);
            });
            
            mathPopup.classList.add('active');
        }

        function generateMathQuestion(difficulty) {
            const { operation, range } = difficulty;
            const a = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
            const b = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
            
            let text, answer;
            switch (operation) {
                case 'add':
                    text = `${a} + ${b} = ?`;
                    answer = a + b;
                    break;
                case 'sub':
                    text = `${a + b} - ${b} = ?`;
                    answer = a;
                    break;
                case 'mul':
                    text = `${a} × ${b} = ?`;
                    answer = a * b;
                    break;
                case 'div':
                    const product = a * b;
                    text = `${product} ÷ ${b} = ?`;
                    answer = a;
                    break;
            }
            
            return { text, answer };
        }

        function generateOptions(correctAnswer) {
            const options = [correctAnswer];
            while (options.length < 4) {
                const wrong = correctAnswer + Math.floor(Math.random() * 10) - 5;
                if (wrong !== correctAnswer && wrong > 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function handleMathAnswer(e) {
            if (!e.target.classList.contains('math-option')) return;
            
            const selected = parseInt(e.target.dataset.answer);
            const correct = parseInt(mathQuestion.textContent.match(/\d+/g).pop());
            
            gameState.totalAnswers++;
            
            if (selected === correct) {
                // 答对
                e.target.classList.add('correct');
                gameState.correctAnswers++;
                gameState.speed += CONFIG.speedIncrement;
                
                // 激活护盾
                gameState.shieldActive = true;
                gameState.shieldEndTime = Date.now() + CONFIG.shieldDuration;
                shieldIndicator.classList.add('active');
                
                // 奖励分数
                gameState.score += 50;
            } else {
                // 答错
                e.target.classList.add('wrong');
                gameState.speed = Math.max(CONFIG.baseSpeed, gameState.speed - CONFIG.speedIncrement);
                
                // 显示正确答案
                const buttons = mathOptions.querySelectorAll('.math-option');
                buttons.forEach(btn => {
                    if (parseInt(btn.dataset.answer) === correct) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            // 延迟关闭弹窗
            setTimeout(() => {
                mathPopup.classList.remove('active');
                gameState.isPaused = false;
                requestAnimationFrame(gameLoop);
            }, 1000);
        }

        function checkAchievements() {
            // 前进1000米成就
            if (gameState.distance >= 1000 && !gameState.achievements.distance1000) {
                gameState.achievements.distance1000 = true;
                showAchievement('前进 1000 米!');
            }
            
            // 答对50题成就
            if (gameState.correctAnswers >= 50 && !gameState.achievements.correct50) {
                gameState.achievements.correct50 = true;
                showAchievement('答对 50 题!');
            }
            
            // 得分1000成就
            if (gameState.score >= 1000 && !gameState.achievements.score1000) {
                gameState.achievements.score1000 = true;
                showAchievement('得分 1000!');
            }
        }

        function showAchievement(text) {
            achievementPopup.textContent = `🎉 ${text}`;
            achievementPopup.style.display = 'block';
            
            setTimeout(() => {
                achievementPopup.style.display = 'none';
            }, 2000);
        }

        function updateUI() {
            scoreEl.textContent = Math.floor(gameState.score);
            distanceEl.textContent = Math.floor(gameState.distance);
        }

        function gameOver() {
            gameState.isPlaying = false;
            
            // 更新最高分
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('mathZigzagHighScore', gameState.highScore);
            }
            
            finalScoreEl.textContent = Math.floor(gameState.score);
            highScoreEl.textContent = gameState.highScore;
            gameOverEl.classList.add('active');
        }

        function restartGame() {
            startGame();
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
