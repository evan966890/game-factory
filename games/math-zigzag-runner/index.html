<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学曲折跑 - 数学教育跑酷游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="score-display">
                <div class="score-item">
                    <span class="label">分数</span>
                    <span id="current-score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分</span>
                    <span id="high-score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">距离</span>
                    <span id="distance">0</span>米
                </div>
            </div>
            <div id="math-popup" class="hidden">
                <div class="math-content">
                    <div id="math-question">5 + 3 = ?</div>
                    <div id="math-options">
                        <button class="math-option" data-answer="7">7</button>
                        <button class="math-option" data-answer="8">8</button>
                        <button class="math-option" data-answer="9">9</button>
                        <button class="math-option" data-answer="10">10</button>
                    </div>
                    <div id="math-timer"></div>
                </div>
            </div>
            <div id="achievement-popup" class="hidden">
                <div class="achievement-content">
                    <div class="achievement-icon">🏆</div>
                    <div class="achievement-text">成就解锁！</div>
                    <div id="achievement-name"></div>
                </div>
            </div>
            <div id="game-over" class="hidden">
                <div class="game-over-content">
                    <h2>游戏结束</h2>
                    <div class="final-score">
                        <div>最终分数: <span id="final-score">0</span></div>
                        <div>前进距离: <span id="final-distance">0</span>米</div>
                        <div>答对题数: <span id="correct-answers">0</span></div>
                    </div>
                    <button id="restart-btn">再来一局</button>
                </div>
            </div>
            <div id="start-screen">
                <div class="start-content">
                    <h1>数学曲折跑</h1>
                    <p>点击控制球体在曲折路径上滚动</p>
                    <p>每前进100米回答数学题获得奖励</p>
                    <button id="start-btn">开始游戏</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
