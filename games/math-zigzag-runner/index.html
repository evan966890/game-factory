<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>数学曲折跑</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --ok: #22c55e;
      --bad: #ef4444;
      --text: #e5e7eb;
      --path: #3b82f6;
      --ball: #f59e0b;
      --obstacle: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1024, #111827);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      overflow: hidden;
    }
    .app {
      width: min(720px, 100%);
      background: rgba(17, 24, 39, .95);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .35);
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 5vw, 34px);
      text-align: center;
    }
    .sub {
      opacity: .85;
      margin: 0 0 12px;
      font-size: 14px;
      text-align: center;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .box {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .k { font-size: 12px; opacity: .7; }
    .v { font-size: 22px; font-weight: 700; }
    .game-container {
      position: relative;
      width: 100%;
      height: 400px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .question-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }
    .question-overlay.active { display: flex; }
    .question-text {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 800;
      margin-bottom: 20px;
      text-align: center;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }
    .option-btn {
      appearance: none;
      border: 1px solid #334155;
      background: #111827;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 15px;
      font-size: 20px;
      font-weight: 700;
      min-height: 60px;
      touch-action: manipulation;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:active { transform: scale(.98); }
    .option-btn.correct {
      background: rgba(34, 197, 94, .18);
      border-color: var(--ok);
    }
    .option-btn.wrong {
      background: rgba(239, 68, 68, .18);
      border-color: var(--bad);
    }
    .msg {
      min-height: 24px;
      text-align: center;
      margin-top: 8px;
      font-size: 16px;
    }
    .ctl {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    button {
      appearance: none;
      border: 1px solid #334155;
      background: #111827;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 700;
      min-height: 56px;
      touch-action: manipulation;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:active { transform: scale(.98); }
    .primary {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
    }
    .instructions {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>数学曲折跑</h1>
    <p class="sub">点击控制球在曲折路径上滚动，每100米回答数学题，挑战你的反应和计算能力！</p>
    
    <section class="hud">
      <div class="box">
        <div class="k">距离</div>
        <div id="distance" class="v">0</div>
      </div>
      <div class="box">
        <div class="k">得分</div>
        <div id="score" class="v">0</div>
      </div>
      <div class="box">
        <div class="k">最高分</div>
        <div id="highScore" class="v">0</div>
      </div>
    </section>
    
    <div class="game-container">
      <canvas id="gameCanvas"></canvas>
      <div id="questionOverlay" class="question-overlay">
        <div id="questionText" class="question-text">5 + 3 = ?</div>
        <div id="optionsGrid" class="options-grid"></div>
        <div id="questionMsg" class="msg"></div>
      </div>
    </div>
    
    <div id="gameMsg" class="msg">点击开始按钮开始游戏</div>
    
    <div class="ctl">
      <button id="startBtn" class="primary">开始游戏</button>
      <button id="resetBtn">重置</button>
    </div>
    
    <div class="instructions">
      点击屏幕控制球体方向 | 每100米回答数学题 | 答对加速，答错减速
    </div>
  </main>

  <script>
    const $ = s => document.querySelector(s);
    const canvas = $('#gameCanvas');
    const ctx = canvas.getContext('2d');
    const distanceEl = $('#distance');
    const scoreEl = $('#score');
    const highScoreEl = $('#highScore');
    const gameMsgEl = $('#gameMsg');
    const questionOverlay = $('#questionOverlay');
    const questionText = $('#questionText');
    const optionsGrid = $('#optionsGrid');
    const questionMsg = $('#questionMsg');
    const startBtn = $('#startBtn');
    const resetBtn = $('#resetBtn');

    // Game state
    let gameRunning = false;
    let gamePaused = false;
    let distance = 0;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('mathZigzagHighScore')) || 0;
    let lastQuestionDistance = 0;
    let currentDifficulty = 1; // 1: addition, 2: subtraction, 3: multiplication, 4: division
    let currentAnswer = 0;
    let shieldActive = false;
    let speedBoost = false;
    let speedBoostTimer = null;
    let shieldTimer = null;

    // Ball state
    let ball = {
      x: 0,
      y: 0,
      radius: 15,
      speed: 3,
      direction: 1, // 1: right, -1: left
      verticalSpeed: 0,
      gravity: 0.2,
      jumpForce: -8
    };

    // Path state
    let pathPoints = [];
    let pathWidth = 40;
    let pathSegments = [];
    let obstacles = [];

    // Initialize
    highScoreEl.textContent = highScore;
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      if (!gameRunning) {
        drawInitialState();
      }
    }

    function drawInitialState() {
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw initial path
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = pathWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
      
      // Draw initial ball
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(50, canvas.height / 2, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw start text
      ctx.fillStyle = '#e5e7eb';
      ctx.font = '20px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('点击开始按钮开始游戏', canvas.width / 2, canvas.height / 2 - 50);
    }

    function initGame() {
      gameRunning = true;
      gamePaused = false;
      distance = 0;
      score = 0;
      lastQuestionDistance = 0;
      currentDifficulty = 1;
      shieldActive = false;
      speedBoost = false;
      
      // Reset ball
      ball.x = 50;
      ball.y = canvas.height / 2;
      ball.speed = 3;
      ball.direction = 1;
      ball.verticalSpeed = 0;
      
      // Generate initial path
      generatePath();
      
      // Update UI
      distanceEl.textContent = '0';
      scoreEl.textContent = '0';
      gameMsgEl.textContent = '游戏进行中...';
      
      // Start game loop
      requestAnimationFrame(gameLoop);
    }

    function generatePath() {
      pathPoints = [];
      pathSegments = [];
      obstacles = [];
      
      let x = 0;
      let y = canvas.height / 2;
      let direction = 1; // 1: right, -1: left
      
      // Generate path points
      while (x < canvas.width + 200) {
        pathPoints.push({ x, y });
        
        // Random segment length
        const segmentLength = 100 + Math.random() * 150;
        
        // Random direction change
        if (Math.random() < 0.3) {
          direction *= -1;
        }
        
        // Random height change
        const heightChange = (Math.random() - 0.5) * 100;
        y = Math.max(100, Math.min(canvas.height - 100, y + heightChange));
        
        x += segmentLength * direction;
        
        // Add obstacle occasionally
        if (Math.random() < 0.2 && x > 100) {
          obstacles.push({
            x: x - segmentLength / 2,
            y: y,
            width: 20,
            height: 30
          });
        }
      }
      
      // Create path segments for collision detection
      for (let i = 0; i < pathPoints.length - 1; i++) {
        const p1 = pathPoints[i];
        const p2 = pathPoints[i + 1];
        pathSegments.push({
          x1: p1.x,
          y1: p1.y,
          x2: p2.x,
          y2: p2.y
        });
      }
    }

    function gameLoop() {
      if (!gameRunning || gamePaused) return;
      
      // Clear canvas
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Update ball position
      updateBall();
      
      // Check collisions
      checkCollisions();
      
      // Check for question trigger
      checkQuestionTrigger();
      
      // Draw everything
      drawPath();
      drawObstacles();
      drawBall();
      drawUI();
      
      // Continue loop
      requestAnimationFrame(gameLoop);
    }

    function updateBall() {
      // Apply gravity
      ball.verticalSpeed += ball.gravity;
      
      // Update position
      ball.x += ball.speed * ball.direction;
      ball.y += ball.verticalSpeed;
      
      // Keep ball on path
      const pathY = getPathYAtX(ball.x);
      if (pathY !== null) {
        if (ball.y > pathY - ball.radius) {
          ball.y = pathY - ball.radius;
          ball.verticalSpeed = 0;
        }
      }
      
      // Update distance
      distance = Math.max(distance, Math.floor(ball.x / 10));
      distanceEl.textContent = distance;
      
      // Generate more path if needed
      if (ball.x > canvas.width - 200) {
        extendPath();
      }
    }

    function getPathYAtX(x) {
      for (let i = 0; i < pathSegments.length; i++) {
        const seg = pathSegments[i];
        if (x >= Math.min(seg.x1, seg.x2) && x <= Math.max(seg.x1, seg.x2)) {
          const t = (x - seg.x1) / (seg.x2 - seg.x1);
          return seg.y1 + t * (seg.y2 - seg.y1);
        }
      }
      return null;
    }

    function extendPath() {
      const lastPoint = pathPoints[pathPoints.length - 1];
      let x = lastPoint.x;
      let y = lastPoint.y;
      let direction = 1;
      
      for (let i = 0; i < 5; i++) {
        const segmentLength = 100 + Math.random() * 150;
        
        if (Math.random() < 0.3) {
          direction *= -1;
        }
        
        const heightChange = (Math.random() - 0.5) * 100;
        y = Math.max(100, Math.min(canvas.height - 100, y + heightChange));
        
        x += segmentLength * direction;
        pathPoints.push({ x, y });
        
        if (Math.random() < 0.2) {
          obstacles.push({
            x: x - segmentLength / 2,
            y: y,
            width: 20,
            height: 30
          });
        }
      }
      
      // Update path segments
      pathSegments = [];
      for (let i = 0; i < pathPoints.length - 1; i++) {
        const p1 = pathPoints[i];
        const p2 = pathPoints[i + 1];
        pathSegments.push({
          x1: p1.x,
          y1: p1.y,
          x2: p2.x,
          y2: p2.y
        });
      }
    }

    function checkCollisions() {
      // Check obstacle collisions
      for (const obs of obstacles) {
        if (ball.x + ball.radius > obs.x && 
            ball.x - ball.radius < obs.x + obs.width &&
            ball.y + ball.radius > obs.y - obs.height &&
            ball.y - ball.radius < obs.y) {
          if (!shieldActive) {
            gameOver();
            return;
          }
        }
      }
      
      // Check if ball fell off path
      if (ball.y > canvas.height + 50) {
        gameOver();
      }
    }

    function checkQuestionTrigger() {
      const questionInterval = 100;
      if (distance >= lastQuestionDistance + questionInterval) {
        lastQuestionDistance = Math.floor(distance / questionInterval) * questionInterval;
        showQuestion();
      }
    }

    function showQuestion() {
      gamePaused = true;
      questionOverlay.classList.add('active');
      
      // Generate question based on difficulty
      const question = generateQuestion();
      currentAnswer = question.answer;
      questionText.textContent = question.text;
      
      // Generate options
      const options = generateOptions(question.answer);
      optionsGrid.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, btn);
        optionsGrid.appendChild(btn);
      });
      
      questionMsg.textContent = '';
    }

    function generateQuestion() {
      let a, b, answer, text;
      
      switch (currentDifficulty) {
        case 1: // Addition
          a = Math.floor(Math.random() * 50) + 1;
          b = Math.floor(Math.random() * 50) + 1;
          answer = a + b;
          text = `${a} + ${b} = ?`;
          break;
        case 2: // Subtraction
          a = Math.floor(Math.random() * 50) + 20;
          b = Math.floor(Math.random() * 20) + 1;
          answer = a - b;
          text = `${a} - ${b} = ?`;
          break;
        case 3: // Multiplication
          a = Math.floor(Math.random() * 12) + 1;
          b = Math.floor(Math.random() * 12) + 1;
          answer = a * b;
          text = `${a} × ${b} = ?`;
          break;
        case 4: // Division
          b = Math.floor(Math.random() * 10) + 2;
          answer = Math.floor(Math.random() * 10) + 1;
          a = b * answer;
          text = `${a} ÷ ${b} = ?`;
          break;
      }
      
      return { text, answer };
    }

    function generateOptions(correctAnswer) {
      const options = new Set([correctAnswer]);
      
      while (options.size < 4) {
        const offset = Math.floor(Math.random() * 20) - 10;
        const option = correctAnswer + offset;
        if (option > 0 && option !== correctAnswer) {
          options.add(option);
        }
      }
      
      return Array.from(options).sort(() => Math.random() - 0.5);
    }

    function checkAnswer(selected, btn) {
      const correct = selected === currentAnswer;
      
      // Disable all buttons
      const buttons = optionsGrid.querySelectorAll('.option-btn');
      buttons.forEach(b => b.disabled = true);
      
      if (correct) {
        btn.classList.add('correct');
        questionMsg.textContent = '✅ 正确！获得加速和护盾！';
        score += 50;
        scoreEl.textContent = score;
        
        // Apply boost
        applySpeedBoost();
        applyShield();
        
        // Increase difficulty
        if (distance > 500 && currentDifficulty < 4) {
          currentDifficulty++;
        }
      } else {
        btn.classList.add('wrong');
        // Highlight correct answer
        buttons.forEach(b => {
          if (parseInt(b.textContent) === currentAnswer) {
            b.classList.add('correct');
          }
        });
        questionMsg.textContent = `❌ 正确答案是 ${currentAnswer}`;
        
        // Apply penalty
        applySlowdown();
      }
      
      // Close question after delay
      setTimeout(() => {
        questionOverlay.classList.remove('active');
        gamePaused = false;
        requestAnimationFrame(gameLoop);
      }, 1500);
    }

    function applySpeedBoost() {
      speedBoost = true;
      ball.speed = 5;
      
      if (speedBoostTimer) clearTimeout(speedBoostTimer);
      speedBoostTimer = setTimeout(() => {
        speedBoost = false;
        ball.speed = 3;
      }, 3000);
    }

    function applyShield() {
      shieldActive = true;
      
      if (shieldTimer) clearTimeout(shieldTimer);
      shieldTimer = setTimeout(() => {
        shieldActive = false;
      }, 5000);
    }

    function applySlowdown() {
      ball.speed = 1.5;
      
      setTimeout(() => {
        ball.speed = speedBoost ? 5 : 3;
      }, 2000);
    }

    function drawPath() {
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = pathWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Draw path with gradient based on distance
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
      const hue = (distance * 2) % 360;
      gradient.addColorStop(0, `hsl(${hue}, 70%, 50%)`);
      gradient.addColorStop(1, `hsl(${(hue + 60) % 360}, 70%, 50%)`);
      ctx.strokeStyle = gradient;
      
      ctx.beginPath();
      ctx.moveTo(pathPoints[0].x - ball.x + 50, pathPoints[0].y);
      
      for (let i = 1; i < pathPoints.length; i++) {
        const px = pathPoints[i].x - ball.x + 50;
        const py = pathPoints[i].y;
        ctx.lineTo(px, py);
      }
      
      ctx.stroke();
    }

    function drawObstacles() {
      ctx.fillStyle = '#ef4444';
      
      for (const obs of obstacles) {
        const ox = obs.x - ball.x + 50;
        const oy = obs.y - obs.height;
        
        if (ox > -50 && ox < canvas.width + 50) {
          ctx.fillRect(ox, oy, obs.width, obs.height);
        }
      }
    }

    function drawBall() {
      // Draw shield if active
      if (shieldActive) {
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(50, ball.y, ball.radius + 5, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      // Draw ball
      ctx.fillStyle = speedBoost ? '#fbbf24' : '#f59e0b';
      ctx.beginPath();
      ctx.arc(50, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw ball highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(45, ball.y - 5, ball.radius / 3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawUI() {
      // Draw distance marker
      ctx.fillStyle = '#e5e7eb';
      ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`距离: ${distance}m`, 10, 25);
      
      // Draw next question marker
      const nextQuestion = Math.ceil(distance / 100) * 100;
      ctx.fillText(`下一题: ${nextQuestion}m`, 10, 45);
      
      // Draw difficulty
      const difficultyNames = ['加法', '减法', '乘法', '除法'];
      ctx.fillText(`难度: ${difficultyNames[currentDifficulty - 1]}`, 10, 65);
    }

    function gameOver() {
      gameRunning = false;
      
      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('mathZigzagHighScore', highScore);
        highScoreEl.textContent = highScore;
      }
      
      gameMsgEl.textContent = `游戏结束！最终得分: ${score}，距离: ${distance}m`;
      
      // Draw game over screen
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#e5e7eb';
      ctx.font = 'bold 32px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 40);
      
      ctx.font = '20px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2);
      ctx.fillText(`距离: ${distance}m`, canvas.width / 2, canvas.height / 2 + 30);
      ctx.fillText(`最高分: ${highScore}`, canvas.width / 2, canvas.height / 2 + 60);
      
      ctx.font = '16px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('点击"重置"按钮重新开始', canvas.width / 2, canvas.height / 2 + 100);
    }

    // Event listeners
    startBtn.onclick = () => {
      if (!gameRunning) {
        initGame();
      }
    };

    resetBtn.onclick = () => {
      gameRunning = false;
      gamePaused = false;
      questionOverlay.classList.remove('active');
      drawInitialState();
      gameMsgEl.textContent = '点击开始按钮开始游戏';
    };

    // Click/touch to change direction
    canvas.addEventListener('click', () => {
      if (gameRunning && !gamePaused) {
        ball.direction *= -1;
        ball.verticalSpeed = ball.jumpForce;
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameRunning && !gamePaused) {
        ball.direction *= -1;
        ball.verticalSpeed = ball.jumpForce;
      }
    });

    // Prevent scrolling on touch
    document.body.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
