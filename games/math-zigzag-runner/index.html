<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学曲折跑</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --accent-color: #FF9800;
            --danger-color: #F44336;
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
            --path-color: #333366;
            --ball-color: #FFD700;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .hud-item .icon {
            font-size: 16px;
        }
        
        #score-display {
            color: var(--accent-color);
        }
        
        #distance-display {
            color: var(--secondary-color);
        }
        
        #shield-display {
            color: var(--primary-color);
        }
        
        #math-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            min-width: 300px;
            border: 3px solid var(--secondary-color);
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.5);
        }
        
        #math-popup h2 {
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        #math-question {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            color: var(--accent-color);
        }
        
        #math-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .math-option {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .math-option:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .math-option.correct {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            animation: pulse 0.5s ease;
        }
        
        .math-option.wrong {
            background: linear-gradient(135deg, #F44336 0%, #d32f2f 100%);
            animation: shake 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            padding: 20px;
        }
        
        #game-over h1 {
            font-size: 48px;
            color: var(--danger-color);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(244, 67, 54, 0.5);
        }
        
        #final-score {
            font-size: 36px;
            color: var(--accent-color);
            margin: 20px 0;
        }
        
        #high-score {
            font-size: 24px;
            color: var(--secondary-color);
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            text-align: center;
            padding: 20px;
        }
        
        #start-screen h1 {
            font-size: 42px;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        
        #start-screen h2 {
            font-size: 24px;
            color: var(--secondary-color);
            margin-bottom: 30px;
        }
        
        #start-screen p {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 40px;
            max-width: 400px;
            line-height: 1.6;
        }
        
        #achievements-popup {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 10px;
            z-index: 150;
            display: none;
            max-width: 250px;
            border: 2px solid var(--accent-color);
        }
        
        #achievements-popup h3 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .achievement {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .achievement.unlocked {
            color: var(--primary-color);
        }
        
        .achievement.locked {
            color: #666;
        }
        
        #difficulty-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--secondary-color);
            z-index: 10;
        }
        
        .effect-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 1s ease forwards;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }
        
        .shield-effect {
            position: absolute;
            border: 3px solid var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: shieldPulse 1s ease infinite;
        }
        
        @keyframes shieldPulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="hud">
            <div id="score-display" class="hud-item">
                <span class="icon">⭐</span>
                <span id="score-value">0</span>
            </div>
            <div id="distance-display" class="hud-item">
                <span class="icon">📏</span>
                <span id="distance-value">0m</span>
            </div>
            <div id="shield-display" class="hud-item">
                <span class="icon">🛡️</span>
                <span id="shield-value">0</span>
            </div>
        </div>
        
        <div id="difficulty-indicator">难度：加法</div>
        
        <div id="math-popup">
            <h2>🧮 数学挑战</h2>
            <div id="math-question">5 + 3 = ?</div>
            <div id="math-options">
                <button class="math-option" data-answer="7">7</button>
                <button class="math-option" data-answer="8">8</button>
                <button class="math-option" data-answer="9">9</button>
                <button class="math-option" data-answer="10">10</button>
            </div>
        </div>
        
        <div id="game-over">
            <h1>游戏结束</h1>
            <div id="final-score">得分: 0</div>
            <div id="high-score">最高分: 0</div>
            <button class="btn" id="restart-btn">再来一局</button>
            <button class="btn" id="menu-btn">返回菜单</button>
        </div>
        
        <div id="start-screen">
            <h1>🎮 数学曲折跑</h1>
            <h2>Zigzag Runner + 数学教育</h2>
            <p>点击控制球在曲折路径上滚动，每前进100米会弹出数学题。<br>答对获得加速和护盾，答错会减速。<br>难度随距离递进：加法 → 减法 → 乘法 → 除法</p>
            <button class="btn" id="start-btn">开始游戏</button>
            <button class="btn" id="achievements-btn">成就</button>
        </div>
        
        <div id="achievements-popup">
            <h3>🏆 成就</h3>
            <div id="achievements-list"></div>
        </div>
    </div>

    <script>
        // 游戏状态
        const GameState = {
            START: 'start',
            PLAYING: 'playing',
            MATH_POPUP: 'math_popup',
            GAME_OVER: 'game_over'
        };
        
        // 难度级别
        const Difficulty = {
            ADDITION: { name: '加法', min: 1, max: 10, operator: '+' },
            SUBTRACTION: { name: '减法', min: 1, max: 20, operator: '-' },
            MULTIPLICATION: { name: '乘法', min: 1, max: 10, operator: '×' },
            DIVISION: { name: '除法', min: 1, max: 10, operator: '÷' }
        };
        
        // 成就定义
        const Achievements = [
            { id: 'distance_100', name: '新手上路', desc: '前进100米', condition: (game) => game.distance >= 100 },
            { id: 'distance_500', name: '跑酷达人', desc: '前进500米', condition: (game) => game.distance >= 500 },
            { id: 'distance_1000', name: '曲折大师', desc: '前进1000米', condition: (game) => game.distance >= 1000 },
            { id: 'math_10', name: '数学新手', desc: '答对10题', condition: (game) => game.correctAnswers >= 10 },
            { id: 'math_50', name: '数学达人', desc: '答对50题', condition: (game) => game.correctAnswers >= 50 },
            { id: 'math_100', name: '数学大师', desc: '答对100题', condition: (game) => game.correctAnswers >= 100 },
            { id: 'score_1000', name: '千分达人', desc: '得分达到1000', condition: (game) => game.score >= 1000 },
            { id: 'score_5000', name: '五千分大师', desc: '得分达到5000', condition: (game) => game.score >= 5000 },
            { id: 'perfect_10', name: '完美主义', desc: '连续答对10题', condition: (game) => game.consecutiveCorrect >= 10 }
        ];
        
        // 游戏类
        class MathZigzagRunner {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = GameState.START;
                
                // 游戏参数
                this.ball = { x: 0, y: 0, radius: 15, speed: 3, direction: 1, color: '#FFD700' };
                this.path = [];
                this.pathWidth = 80;
                this.distance = 0;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('mathZigzagHighScore')) || 0;
                this.shield = 0;
                this.correctAnswers = 0;
                this.consecutiveCorrect = 0;
                this.unlockedAchievements = JSON.parse(localStorage.getItem('mathZigzagAchievements')) || [];
                
                // 数学题相关
                this.currentDifficulty = Difficulty.ADDITION;
                this.currentQuestion = null;
                this.mathPopupDistance = 100;
                
                // 视觉效果
                this.effects = [];
                this.pathColor = '#333366';
                this.backgroundColor = '#1a1a2e';
                
                // 输入
                this.isPressed = false;
                
                this.init();
            }
            
            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // 输入事件
                this.canvas.addEventListener('mousedown', () => this.handleInput());
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleInput();
                });
                
                // 按钮事件
                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.startGame());
                document.getElementById('menu-btn').addEventListener('click', () => this.showStartScreen());
                document.getElementById('achievements-btn').addEventListener('click', () => this.toggleAchievements());
                
                // 数学题选项
                document.querySelectorAll('.math-option').forEach(btn => {
                    btn.addEventListener('click', (e) => this.checkAnswer(e.target));
                });
                
                this.showStartScreen();
                this.updateAchievementsDisplay();
            }
            
            resizeCanvas() {
                const container = document.getElementById('game-container');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
                
                if (this.state === GameState.PLAYING) {
                    this.ball.x = this.canvas.width / 2;
                    this.ball.y = this.canvas.height - 100;
                }
            }
            
            showStartScreen() {
                this.state = GameState.START;
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('game-over').style.display = 'none';
                document.getElementById('math-popup').style.display = 'none';
            }
            
            startGame() {
                this.state = GameState.PLAYING;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-over').style.display = 'none';
                document.getElementById('math-popup').style.display = 'none';
                
                // 重置游戏状态
                this.ball = {
                    x: this.canvas.width / 2,
                    y: this.canvas.height - 100,
                    radius: 15,
                    speed: 3,
                    direction: 1,
                    color: '#FFD700'
                };
                this.path = [];
                this.distance = 0;
                this.score = 0;
                this.shield = 0;
                this.correctAnswers = 0;
                this.consecutiveCorrect = 0;
                this.currentDifficulty = Difficulty.ADDITION;
                this.mathPopupDistance = 100;
                this.effects = [];
                this.pathColor = '#333366';
                this.backgroundColor = '#1a1a2e';
                
                this.generateInitialPath();
                this.updateHUD();
                this.gameLoop();
            }
            
            generateInitialPath() {
                const startY = this.canvas.height + 100;
                const segmentLength = 100;
                
                for (let i = 0; i < 20; i++) {
                    const y = startY - i * segmentLength;
                    const x = this.canvas.width / 2 + (Math.random() - 0.5) * 200;
                    this.path.push({ x, y, width: this.pathWidth });
                }
            }
            
            handleInput() {
                if (this.state === GameState.PLAYING) {
                    this.ball.direction *= -1;
                    this.isPressed = true;
                    setTimeout(() => this.isPressed = false, 100);
                }
            }
            
            gameLoop() {
                if (this.state !== GameState.PLAYING) return;
                
                this.update();
                this.render();
                
                requestAnimationFrame(() => this.gameLoop());
            }
            
            update() {
                // 更新球体位置
                this.ball.x += this.ball.speed * this.ball.direction;
                this.distance += this.ball.speed / 10;
                this.score = Math.floor(this.distance * 10);
                
                // 更新路径
                this.updatePath();
                
                // 检查碰撞
                if (this.checkCollision()) {
                    if (this.shield > 0) {
                        this.shield--;
                        this.showEffect('🛡️ 护盾抵消!', this.ball.x, this.ball.y - 30, '#4CAF50');
                        this.ball.direction *= -1;
                    } else {
                        this.gameOver();
                        return;
                    }
                }
                
                // 检查数学题弹出
                if (this.distance >= this.mathPopupDistance) {
                    this.showMathPopup();
                    return;
                }
                
                // 更新难度
                this.updateDifficulty();
                
                // 更新视觉效果
                this.updateEffects();
                
                // 更新HUD
                this.updateHUD();
            }
            
            updatePath() {
                // 移动路径
                this.path.forEach(segment => {
                    segment.y += this.ball.speed;
                });
                
                // 移除屏幕外的路径段
                this.path = this.path.filter(segment => segment.y < this.canvas.height + 200);
                
                // 添加新路径段
                const lastSegment = this.path[this.path.length - 1];
                if (lastSegment.y > -200) {
                    const newY = lastSegment.y - 100;
                    const newX = this.canvas.width / 2 + (Math.random() - 0.5) * 200;
                    this.path.push({ x: newX, y: newY, width: this.pathWidth });
                }
            }
            
            checkCollision() {
                // 找到球体当前所在的路径段
                const currentSegment = this.path.find(segment => 
                    this.ball.y >= segment.y - 50 && this.ball.y <= segment.y + 50
                );
                
                if (!currentSegment) return true;
                
                // 检查是否在路径宽度内
                const leftBound = currentSegment.x - currentSegment.width / 2;
                const rightBound = currentSegment.x + currentSegment.width / 2;
                
                return this.ball.x - this.ball.radius < leftBound || 
                       this.ball.x + this.ball.radius > rightBound;
            }
            
            updateDifficulty() {
                if (this.distance >= 800) {
                    this.currentDifficulty = Difficulty.DIVISION;
                } else if (this.distance >= 500) {
                    this.currentDifficulty = Difficulty.MULTIPLICATION;
                } else if (this.distance >= 200) {
                    this.currentDifficulty = Difficulty.SUBTRACTION;
                } else {
                    this.currentDifficulty = Difficulty.ADDITION;
                }
                
                document.getElementById('difficulty-indicator').textContent = 
                    `难度：${this.currentDifficulty.name}`;
            }
            
            showMathPopup() {
                this.state = GameState.MATH_POPUP;
                this.currentQuestion = this.generateQuestion();
                
                const popup = document.getElementById('math-popup');
                document.getElementById('math-question').textContent = 
                    `${this.currentQuestion.num1} ${this.currentQuestion.operator} ${this.currentQuestion.num2} = ?`;
                
                // 生成选项
                const options = this.generateOptions();
                const optionButtons = document.querySelectorAll('.math-option');
                optionButtons.forEach((btn, index) => {
                    btn.textContent = options[index];
                    btn.dataset.answer = options[index];
                    btn.className = 'math-option';
                });
                
                popup.style.display = 'block';
            }
            
            generateQuestion() {
                const diff = this.currentDifficulty;
                let num1, num2, answer;
                
                switch (diff.operator) {
                    case '+':
                        num1 = Math.floor(Math.random() * diff.max) + diff.min;
                        num2 = Math.floor(Math.random() * diff.max) + diff.min;
                        answer = num1 + num2;
                        break;
                    case '-':
                        num1 = Math.floor(Math.random() * diff.max) + diff.min;
                        num2 = Math.floor(Math.random() * num1) + 1;
                        answer = num1 - num2;
                        break;
                    case '×':
                        num1 = Math.floor(Math.random() * diff.max) + diff.min;
                        num2 = Math.floor(Math.random() * diff.max) + diff.min;
                        answer = num1 * num2;
                        break;
                    case '÷':
                        num2 = Math.floor(Math.random() * diff.max) + diff.min;
                        answer = Math.floor(Math.random() * diff.max) + diff.min;
                        num1 = num2 * answer;
                        break;
                }
                
                return { num1, num2, operator: diff.operator, answer };
            }
            
            generateOptions() {
                const correct = this.currentQuestion.answer;
                const options = [correct];
                
                while (options.length < 4) {
                    let wrong = correct + Math.floor(Math.random() * 10) - 5;
                    if (wrong < 0) wrong = Math.abs(wrong);
                    if (!options.includes(wrong)) {
                        options.push(wrong);
                    }
                }
                
                // 打乱选项
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                
                return options;
            }
            
            checkAnswer(button) {
                const selected = parseInt(button.dataset.answer);
                const correct = this.currentQuestion.answer;
                
                if (selected === correct) {
                    button.classList.add('correct');
                    this.correctAnswers++;
                    this.consecutiveCorrect++;
                    this.shield = Math.min(this.shield + 1, 3);
                    this.ball.speed = Math.min(this.ball.speed + 0.5, 6);
                    this.showEffect('✅ 正确! +护盾 +加速', this.canvas.width / 2, this.canvas.height / 2, '#4CAF50');
                } else {
                    button.classList.add('wrong');
                    this.consecutiveCorrect = 0;
                    this.ball.speed = Math.max(this.ball.speed - 0.5, 2);
                    this.showEffect('❌ 错误! 减速', this.canvas.width / 2, this.canvas.height / 2, '#F44336');
                }
                
                // 检查成就
                this.checkAchievements();
                
                setTimeout(() => {
                    document.getElementById('math-popup').style.display = 'none';
                    this.mathPopupDistance += 100;
                    this.state = GameState.PLAYING;
                    this.gameLoop();
                }, 1000);
            }
            
            showEffect(text, x, y, color) {
                const effect = document.createElement('div');
                effect.className = 'effect-text';
                effect.textContent = text;
                effect.style.left = x + 'px';
                effect.style.top = y + 'px';
                effect.style.color = color;
                document.getElementById('game-container').appendChild(effect);
                
                setTimeout(() => effect.remove(), 1000);
            }
            
            updateEffects() {
                // 更新球体颜色
                const hue = (this.distance / 10) % 360;
                this.ball.color = `hsl(${hue}, 80%, 60%)`;
                
                // 更新路径颜色
                const pathHue = (this.distance / 20) % 360;
                this.pathColor = `hsl(${pathHue}, 30%, 30%)`;
            }
            
            updateHUD() {
                document.getElementById('score-value').textContent = this.score;
                document.getElementById('distance-value').textContent = Math.floor(this.distance) + 'm';
                document.getElementById('shield-value').textContent = this.shield;
            }
            
            render() {
                // 清空画布
                this.ctx.fillStyle = this.backgroundColor;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制路径
                this.ctx.fillStyle = this.pathColor;
                this.path.forEach(segment => {
                    this.ctx.beginPath();
                    this.ctx.roundRect(
                        segment.x - segment.width / 2,
                        segment.y - 50,
                        segment.width,
                        100,
                        10
                    );
                    this.ctx.fill();
                });
                
                // 绘制球体
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x, this.ball.y, this.ball.radius, 0, Math.PI * 2);
                this.ctx.fillStyle = this.ball.color;
                this.ctx.fill();
                
                // 绘制球体高光
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x - 5, this.ball.y - 5, this.ball.radius / 3, 0, Math.PI * 2);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fill();
                
                // 绘制护盾效果
                if (this.shield > 0) {
                    this.ctx.beginPath();
                    this.ctx.arc(this.ball.x, this.ball.y, this.ball.radius + 10, 0, Math.PI * 2);
                    this.ctx.strokeStyle = '#4CAF50';
                    this.ctx.lineWidth = 3;
                    this.ctx.stroke();
                }
            }
            
            gameOver() {
                this.state = GameState.GAME_OVER;
                
                // 更新最高分
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('mathZigzagHighScore', this.highScore);
                }
                
                // 显示游戏结束界面
                document.getElementById('final-score').textContent = `得分: ${this.score}`;
                document.getElementById('high-score').textContent = `最高分: ${this.highScore}`;
                document.getElementById('game-over').style.display = 'flex';
            }
            
            checkAchievements() {
                Achievements.forEach(achievement => {
                    if (!this.unlockedAchievements.includes(achievement.id) && 
                        achievement.condition(this)) {
                        this.unlockedAchievements.push(achievement.id);
                        this.showEffect(`🏆 解锁成就: ${achievement.name}`, 
                            this.canvas.width / 2, 100, '#FFD700');
                    }
                });
                
                localStorage.setItem('mathZigzagAchievements', 
                    JSON.stringify(this.unlockedAchievements));
                this.updateAchievementsDisplay();
            }
            
            updateAchievementsDisplay() {
                const list = document.getElementById('achievements-list');
                list.innerHTML = '';
                
                Achievements.forEach(achievement => {
                    const div = document.createElement('div');
                    div.className = `achievement ${this.unlockedAchievements.includes(achievement.id) ? 'unlocked' : 'locked'}`;
                    div.innerHTML = `
                        <span>${this.unlockedAchievements.includes(achievement.id) ? '✅' : '🔒'}</span>
                        <span>${achievement.name}</span>
                    `;
                    div.title = achievement.desc;
                    list.appendChild(div);
                });
            }
            
            toggleAchievements() {
                const popup = document.getElementById('achievements-popup');
                popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
            }
        }
        
        // 启动游戏
        window.addEventListener('load', () => {
            new MathZigzagRunner();
        });
    </script>
</body>
</html>
