<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>数学曲折跑</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --ok: #22c55e;
      --bad: #ef4444;
      --text: #e5e7eb;
      --path: #1e293b;
      --ball: #3b82f6;
      --shield: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1024, #111827);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      overflow: hidden;
    }
    .app {
      width: min(720px, 100%);
      background: rgba(17, 24, 39, .95);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .35);
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 5vw, 34px);
      text-align: center;
    }
    .sub {
      opacity: .85;
      margin: 0 0 12px;
      font-size: 14px;
      text-align: center;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .box {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .k { font-size: 12px; opacity: .7; }
    .v { font-size: 22px; font-weight: 700; }
    .game-container {
      position: relative;
      width: 100%;
      height: 400px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .question-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .question-overlay.active { display: flex; }
    .question-text {
      font-size: clamp(26px, 7vw, 44px);
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--accent);
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 80%;
      max-width: 300px;
    }
    .option-btn {
      appearance: none;
      border: 1px solid #334155;
      background: #111827;
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-size: 20px;
      font-weight: 700;
      min-height: 56px;
      touch-action: manipulation;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:active { transform: scale(.98); }
    .option-btn.correct {
      background: rgba(34, 197, 94, .18);
      border-color: var(--ok);
    }
    .option-btn.wrong {
      background: rgba(239, 68, 68, .18);
      border-color: var(--bad);
    }
    .game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .game-over-overlay.active { display: flex; }
    .game-over-title {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--bad);
    }
    .game-over-stats {
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }
    .ctl {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .primary {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    .primary:active { transform: scale(.98); }
    .msg {
      min-height: 24px;
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
    }
    .instructions {
      font-size: 12px;
      opacity: .7;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>数学曲折跑</h1>
    <p class="sub">点击控制球在曲折路径上滚动，每前进100米回答数学题，答对加速，答错减速！</p>
    
    <section class="hud">
      <div class="box">
        <div class="k">距离</div>
        <div id="distance" class="v">0</div>
      </div>
      <div class="box">
        <div class="k">得分</div>
        <div id="score" class="v">0</div>
      </div>
      <div class="box">
        <div class="k">最高分</div>
        <div id="highScore" class="v">0</div>
      </div>
    </section>
    
    <div class="game-container">
      <canvas id="gameCanvas"></canvas>
      
      <div id="questionOverlay" class="question-overlay">
        <div id="questionText" class="question-text">加载中...</div>
        <div id="options" class="options"></div>
      </div>
      
      <div id="gameOverOverlay" class="game-over-overlay">
        <div class="game-over-title">游戏结束</div>
        <div class="game-over-stats">
          <div>前进距离: <span id="finalDistance">0</span> 米</div>
          <div>最终得分: <span id="finalScore">0</span></div>
          <div>答对题目: <span id="correctAnswers">0</span></div>
        </div>
        <button id="restartBtn" class="primary">再来一局</button>
      </div>
    </div>
    
    <div id="msg" class="msg"></div>
    <div class="instructions">点击屏幕控制球体方向，每100米触发数学题</div>
    
    <div class="ctl">
      <button id="startBtn" class="primary">开始游戏</button>
      <button id="resetBtn" class="primary" style="background: linear-gradient(135deg, #6b7280, #4b5563);">重置</button>
    </div>
  </main>

  <script>
    // 游戏状态
    const state = {
      running: false,
      paused: false,
      distance: 0,
      score: 0,
      highScore: 0,
      correctAnswers: 0,
      lastQuestionDistance: 0,
      difficulty: 1, // 1: 加法, 2: 减法, 3: 乘法, 4: 除法
      ball: {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        radius: 15,
        color: '#3b82f6',
        shield: false,
        shieldTime: 0
      },
      path: [],
      pathWidth: 80,
      gravity: 0.5,
      jumpForce: -12,
      moveSpeed: 3,
      lastTime: 0,
      deltaTime: 0
    };

    // DOM 元素
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const distanceEl = document.getElementById('distance');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const questionOverlay = document.getElementById('questionOverlay');
    const questionText = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalDistanceEl = document.getElementById('finalDistance');
    const finalScoreEl = document.getElementById('finalScore');
    const correctAnswersEl = document.getElementById('correctAnswers');
    const msgEl = document.getElementById('msg');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const restartBtn = document.getElementById('restartBtn');

    // 初始化
    function init() {
      loadHighScore();
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      canvas.addEventListener('click', handleClick);
      canvas.addEventListener('touchstart', handleTouch);
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);
      restartBtn.addEventListener('click', restartGame);
      requestAnimationFrame(gameLoop);
    }

    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      resetBall();
    }

    function loadHighScore() {
      const saved = localStorage.getItem('mathZigzagHighScore');
      if (saved) {
        state.highScore = parseInt(saved);
        highScoreEl.textContent = state.highScore;
      }
    }

    function saveHighScore() {
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('mathZigzagHighScore', state.highScore);
        highScoreEl.textContent = state.highScore;
      }
    }

    function resetBall() {
      state.ball.x = canvas.width / 2;
      state.ball.y = canvas.height / 3;
      state.ball.vx = state.moveSpeed;
      state.ball.vy = 0;
      state.ball.color = '#3b82f6';
      state.ball.shield = false;
      state.ball.shieldTime = 0;
    }

    function generatePath() {
      state.path = [];
      const segmentLength = 100;
      const numSegments = Math.ceil(canvas.width / segmentLength) + 2;
      
      for (let i = 0; i < numSegments; i++) {
        const x = i * segmentLength;
        const y = canvas.height / 2 + Math.sin(i * 0.5) * 50;
        state.path.push({ x, y });
      }
    }

    function updatePath() {
      // 移动路径
      for (let point of state.path) {
        point.x -= state.ball.vx;
      }
      
      // 移除屏幕外的点
      while (state.path.length > 0 && state.path[0].x < -100) {
        state.path.shift();
      }
      
      // 添加新点
      const lastPoint = state.path[state.path.length - 1];
      if (lastPoint.x < canvas.width + 100) {
        const newX = lastPoint.x + 100;
        const newY = canvas.height / 2 + Math.sin(state.path.length * 0.5) * 50;
        state.path.push({ x: newX, y: newY });
      }
    }

    function handleClick(e) {
      if (!state.running || state.paused) return;
      e.preventDefault();
      jump();
    }

    function handleTouch(e) {
      if (!state.running || state.paused) return;
      e.preventDefault();
      jump();
    }

    function jump() {
      state.ball.vy = state.jumpForce;
    }

    function startGame() {
      if (state.running) return;
      state.running = true;
      state.paused = false;
      state.distance = 0;
      state.score = 0;
      state.correctAnswers = 0;
      state.lastQuestionDistance = 0;
      state.difficulty = 1;
      resetBall();
      generatePath();
      updateHUD();
      msgEl.textContent = '游戏开始！点击控制球体';
      startBtn.textContent = '游戏中...';
      startBtn.disabled = true;
    }

    function resetGame() {
      state.running = false;
      state.paused = false;
      state.distance = 0;
      state.score = 0;
      state.correctAnswers = 0;
      state.lastQuestionDistance = 0;
      state.difficulty = 1;
      resetBall();
      generatePath();
      updateHUD();
      msgEl.textContent = '';
      startBtn.textContent = '开始游戏';
      startBtn.disabled = false;
      gameOverOverlay.classList.remove('active');
      questionOverlay.classList.remove('active');
    }

    function restartGame() {
      gameOverOverlay.classList.remove('active');
      startGame();
    }

    function updateHUD() {
      distanceEl.textContent = Math.floor(state.distance);
      scoreEl.textContent = state.score;
    }

    function updateDifficulty() {
      if (state.distance >= 1000) state.difficulty = 4;
      else if (state.distance >= 600) state.difficulty = 3;
      else if (state.distance >= 300) state.difficulty = 2;
      else state.difficulty = 1;
    }

    function generateQuestion() {
      let a, b, answer, operator;
      
      switch (state.difficulty) {
        case 1: // 加法
          a = Math.floor(Math.random() * 20) + 1;
          b = Math.floor(Math.random() * 20) + 1;
          answer = a + b;
          operator = '+';
          break;
        case 2: // 减法
          a = Math.floor(Math.random() * 30) + 10;
          b = Math.floor(Math.random() * a) + 1;
          answer = a - b;
          operator = '-';
          break;
        case 3: // 乘法
          a = Math.floor(Math.random() * 10) + 1;
          b = Math.floor(Math.random() * 10) + 1;
          answer = a * b;
          operator = '×';
          break;
        case 4: // 除法
          b = Math.floor(Math.random() * 9) + 2;
          answer = Math.floor(Math.random() * 10) + 1;
          a = b * answer;
          operator = '÷';
          break;
      }
      
      const question = `${a} ${operator} ${b} = ?`;
      const options = generateOptions(answer);
      
      return { question, answer, options };
    }

    function generateOptions(answer) {
      const options = [answer];
      while (options.length < 4) {
        const offset = Math.floor(Math.random() * 20) - 10;
        const option = answer + offset;
        if (option > 0 && !options.includes(option)) {
          options.push(option);
        }
      }
      return options.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
      state.paused = true;
      const { question, answer, options } = generateQuestion();
      
      questionText.textContent = question;
      optionsEl.innerHTML = '';
      
      options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.addEventListener('click', () => handleAnswer(option, answer, btn));
        optionsEl.appendChild(btn);
      });
      
      questionOverlay.classList.add('active');
    }

    function handleAnswer(selected, correct, btn) {
      const buttons = optionsEl.querySelectorAll('.option-btn');
      buttons.forEach(b => b.disabled = true);
      
      if (selected === correct) {
        btn.classList.add('correct');
        state.correctAnswers++;
        state.score += 50;
        state.ball.shield = true;
        state.ball.shieldTime = 3000;
        state.ball.color = '#fbbf24';
        msgEl.textContent = '✅ 正确！获得护盾和加速';
      } else {
        btn.classList.add('wrong');
        buttons.forEach(b => {
          if (parseInt(b.textContent) === correct) {
            b.classList.add('correct');
          }
        });
        state.ball.vx = Math.max(1, state.ball.vx * 0.7);
        msgEl.textContent = `❌ 错误！正确答案是 ${correct}`;
      }
      
      updateHUD();
      
      setTimeout(() => {
        questionOverlay.classList.remove('active');
        state.paused = false;
        state.lastQuestionDistance = state.distance;
      }, 1000);
    }

    function checkQuestionTrigger() {
      if (state.distance - state.lastQuestionDistance >= 100) {
        showQuestion();
      }
    }

    function updateBall() {
      if (state.paused) return;
      
      // 重力
      state.ball.vy += state.gravity;
      
      // 更新位置
      state.ball.x += state.ball.vx;
      state.ball.y += state.ball.vy;
      
      // 护盾计时
      if (state.ball.shield) {
        state.ball.shieldTime -= state.deltaTime;
        if (state.ball.shieldTime <= 0) {
          state.ball.shield = false;
          state.ball.color = '#3b82f6';
        }
      }
      
      // 边界检测
      if (state.ball.y > canvas.height - state.ball.radius) {
        state.ball.y = canvas.height - state.ball.radius;
        state.ball.vy = 0;
      }
      
      if (state.ball.y < state.ball.radius) {
        state.ball.y = state.ball.radius;
        state.ball.vy = 0;
      }
      
      // 路径碰撞检测
      checkPathCollision();
      
      // 更新距离
      state.distance += state.ball.vx * 0.1;
      
      // 更新难度
      updateDifficulty();
      
      // 检查是否触发问题
      checkQuestionTrigger();
      
      // 更新HUD
      updateHUD();
    }

    function checkPathCollision() {
      for (let i = 0; i < state.path.length - 1; i++) {
        const p1 = state.path[i];
        const p2 = state.path[i + 1];
        
        if (state.ball.x >= p1.x && state.ball.x <= p2.x) {
          const t = (state.ball.x - p1.x) / (p2.x - p1.x);
          const pathY = p1.y + t * (p2.y - p1.y);
          
          if (state.ball.y + state.ball.radius > pathY - state.pathWidth / 2 &&
              state.ball.y - state.ball.radius < pathY + state.pathWidth / 2) {
            // 碰撞
            if (state.ball.vy > 0) {
              state.ball.y = pathY - state.pathWidth / 2 - state.ball.radius;
              state.ball.vy = 0;
            }
          }
        }
      }
    }

    function draw() {
      // 清空画布
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制路径
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = state.pathWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      ctx.beginPath();
      if (state.path.length > 0) {
        ctx.moveTo(state.path[0].x, state.path[0].y);
        for (let i = 1; i < state.path.length; i++) {
          ctx.lineTo(state.path[i].x, state.path[i].y);
        }
      }
      ctx.stroke();
      
      // 绘制球体
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, state.ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = state.ball.color;
      ctx.fill();
      
      // 绘制护盾效果
      if (state.ball.shield) {
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, state.ball.radius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      
      // 绘制距离标记
      ctx.fillStyle = '#e5e7eb';
      ctx.font = '14px sans-serif';
      ctx.fillText(`距离: ${Math.floor(state.distance)}m`, 10, 20);
    }

    function gameLoop(timestamp) {
      state.deltaTime = timestamp - state.lastTime;
      state.lastTime = timestamp;
      
      if (state.running && !state.paused) {
        updatePath();
        updateBall();
      }
      
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 启动游戏
    init();
  </script>
</body>
</html>
