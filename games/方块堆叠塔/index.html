<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>方块堆叠塔</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>方块堆叠塔</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">得分</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="game-canvas"></canvas>
            <div id="game-message" class="game-message hidden">
                <div class="message-content">
                    <h2 id="message-title">游戏结束</h2>
                    <p id="message-text">最终得分: <span id="final-score">0</span></p>
                    <button id="restart-btn" class="btn">再来一局</button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="start-btn" class="btn start-btn">开始游戏</button>
            <p class="hint">点击屏幕或按空格键让方块落下</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
