<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>小数冲刺 Decimal Dash</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --text: #1f2a44;
      --accent: #4f7cff;
      --ok: #1f9d55;
      --bad: #d64545;
      --muted: #6d7890;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 760px;
      display: grid;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(50, 80, 150, 0.12);
    }
    h1 { margin: 0 0 8px; font-size: 1.45rem; }
    .sub { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat {
      background: #f7f9ff;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .stat b { display: block; font-size: 1.2rem; }
    .question {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      text-align: center;
      margin: 8px 0 16px;
      font-weight: 700;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 14px 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      touch-action: manipulation;
    }
    button.secondary { background: #eef3ff; color: #28479a; }
    button:disabled { opacity: 0.6; }
    .feedback {
      min-height: 24px;
      margin-top: 10px;
      font-weight: 700;
      text-align: center;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 6px; }
    .hidden { display: none; }
    .tip { color: var(--muted); font-size: 0.9rem; text-align: center; margin-top: 8px; }
    @media (max-width: 520px) {
      .choices { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      button { padding: 13px 8px; }
    }
  </style>
</head>
<body>
  <main class="app" role="main">
    <section class="card">
      <h1>🏃 小数冲刺 Decimal Dash</h1>
      <p class="sub">45 秒内完成尽可能多的小数运算选择题，越快越准分数越高！</p>
    </section>

    <section class="card stats" aria-live="polite">
      <div class="stat"><span>剩余时间</span><b id="time">45</b></div>
      <div class="stat"><span>得分</span><b id="score">0</b></div>
      <div class="stat"><span>题目数</span><b id="count">0</b></div>
    </section>

    <section class="card">
      <div id="question" class="question">点击开始挑战</div>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback" aria-live="assertive"></div>
      <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn" class="secondary hidden">再来一局</button>
      </div>
      <p class="tip">题型包含：小数加减法、大小比较、四舍五入</p>
    </section>
  </main>

  <script>
    const timeEl = document.getElementById('time');
    const scoreEl = document.getElementById('score');
    const countEl = document.getElementById('count');
    const questionEl = document.getElementById('question');
    const choicesEl = document.getElementById('choices');
    const feedbackEl = document.getElementById('feedback');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const GAME_SECONDS = 45;
    let timer = null;
    let remaining = GAME_SECONDS;
    let score = 0;
    let count = 0;
    let locked = true;
    let answer = '';

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function dec(min, max, step = 10) { return (rand(min * step, max * step) / step).toFixed(1); }

    function generateQuestion() {
      const type = rand(1, 3);
      let text = '';
      let options = [];

      if (type === 1) {
        const a = Number(dec(1, 9));
        const b = Number(dec(1, 9));
        const isAdd = Math.random() > 0.5;
        const result = isAdd ? (a + b) : (a - b);
        text = `${a.toFixed(1)} ${isAdd ? '+' : '-'} ${b.toFixed(1)} = ?`;
        answer = result.toFixed(1);
        options = [answer, (result + 0.2).toFixed(1), (result - 0.3).toFixed(1), (result + 0.5).toFixed(1)];
      } else if (type === 2) {
        const a = Number(dec(1, 15));
        const b = Number(dec(1, 15));
        text = `哪个更大？`;
        answer = a === b ? '一样大' : (a > b ? `${a.toFixed(1)}` : `${b.toFixed(1)}`);
        options = [`${a.toFixed(1)}`, `${b.toFixed(1)}`, '一样大', (Math.max(a, b) + 0.1).toFixed(1)];
      } else {
        const num = (rand(100, 999) / 100).toFixed(2);
        text = `${num} 四舍五入到 1 位小数是？`;
        answer = Number(num).toFixed(1);
        options = [answer, (Number(answer) + 0.1).toFixed(1), (Number(answer) - 0.1).toFixed(1), Number(num).toFixed(0)];
      }

      options = [...new Set(options)];
      while (options.length < 4) {
        const drift = (Math.random() * 2 - 1).toFixed(1);
        options.push((Number(answer) + Number(drift)).toFixed(1));
        options = [...new Set(options)];
      }
      options.sort(() => Math.random() - 0.5);

      questionEl.textContent = text;
      choicesEl.innerHTML = '';

      options.slice(0, 4).forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.addEventListener('click', () => choose(opt));
        choicesEl.appendChild(btn);
      });
    }

    function choose(opt) {
      if (locked) return;
      count++;
      countEl.textContent = count;
      const correct = opt === answer;
      if (correct) {
        score += 10 + Math.max(0, remaining / 10);
        feedbackEl.textContent = '✅ 正确！继续冲刺';
        feedbackEl.className = 'feedback ok';
      } else {
        score = Math.max(0, score - 4);
        feedbackEl.textContent = `❌ 正确答案：${answer}`;
        feedbackEl.className = 'feedback bad';
      }
      scoreEl.textContent = Math.round(score);
      generateQuestion();
    }

    function tick() {
      remaining--;
      timeEl.textContent = remaining;
      if (remaining <= 0) endGame();
    }

    function startGame() {
      remaining = GAME_SECONDS;
      score = 0;
      count = 0;
      locked = false;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      scoreEl.textContent = '0';
      countEl.textContent = '0';
      timeEl.textContent = String(remaining);
      startBtn.classList.add('hidden');
      restartBtn.classList.add('hidden');
      generateQuestion();
      clearInterval(timer);
      timer = setInterval(tick, 1000);
    }

    function endGame() {
      clearInterval(timer);
      locked = true;
      questionEl.textContent = `时间到！最终得分 ${Math.round(score)} 分，完成 ${count} 题`;
      choicesEl.innerHTML = '';
      feedbackEl.textContent = '点击“再来一局”继续挑战';
      feedbackEl.className = 'feedback';
      restartBtn.classList.remove('hidden');
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
