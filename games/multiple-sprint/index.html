<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>倍数冲刺</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --ok: #22c55e;
      --bad: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .app {
      width: 100%;
      max-width: 520px;
      background: rgba(17,24,39,.95);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.3rem, 4.6vw, 1.8rem); }
    .desc { color: var(--muted); margin: 0 0 14px; font-size: .95rem; }
    .hud {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .pill { background:#0b1220; border:1px solid #334155; border-radius:12px; padding:10px; text-align:center; }
    .pill b { font-size: 1.08rem; color: var(--accent); }
    .question {
      text-align: center;
      font-size: clamp(1.3rem, 6vw, 2rem);
      font-weight: 700;
      margin: 10px 0 14px;
      line-height: 1.35;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button.option {
      appearance: none;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      padding: 14px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 56px;
      touch-action: manipulation;
      cursor: pointer;
    }
    button.option:active { transform: translateY(1px); }
    .feedback { text-align:center; min-height: 24px; margin: 12px 0 4px; font-weight: 700; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .actions { display:flex; gap:8px; margin-top: 8px; }
    .actions button { flex:1; border-radius:10px; border:1px solid #334155; background:#1f2937; color:var(--text); padding:10px; font-weight:600; }
  </style>
</head>
<body>
  <main class="app">
    <h1>倍数冲刺</h1>
    <p class="desc">30 秒内判断数字是不是目标数的倍数，答得越快分数越高！</p>

    <section class="hud">
      <div class="pill">目标数<br><b id="base">3</b></div>
      <div class="pill">得分<br><b id="score">0</b></div>
      <div class="pill">倒计时<br><b id="time">30</b>s</div>
    </section>

    <div class="question" id="question">12 是 3 的倍数吗？</div>

    <section class="options">
      <button class="option" data-answer="yes">是</button>
      <button class="option" data-answer="no">不是</button>
    </section>

    <div class="feedback" id="feedback"></div>

    <div class="actions">
      <button id="startBtn">开始 / 重新开始</button>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const baseEl = $('base');
    const scoreEl = $('score');
    const timeEl = $('time');
    const questionEl = $('question');
    const feedbackEl = $('feedback');
    const startBtn = $('startBtn');
    const optionBtns = [...document.querySelectorAll('.option')];

    let base = 3;
    let score = 0;
    let timeLeft = 30;
    let running = false;
    let timer = null;
    let current = { n: 12, isMultiple: true };

    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function pickQuestion() {
      base = randInt(2, 12);
      const isMultiple = Math.random() < 0.5;
      let n;
      if (isMultiple) {
        n = base * randInt(1, 12);
      } else {
        do {
          n = randInt(2, 144);
        } while (n % base === 0);
      }
      current = { n, isMultiple };
      baseEl.textContent = base;
      questionEl.textContent = `${n} 是 ${base} 的倍数吗？`;
    }

    function updateHud() {
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
    }

    function endGame() {
      running = false;
      clearInterval(timer);
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = `时间到！最终得分 ${score}`;
    }

    function answer(userYes) {
      if (!running) return;
      const correct = (userYes === current.isMultiple);
      if (correct) {
        score += 10;
        feedbackEl.className = 'feedback ok';
        feedbackEl.textContent = '✅ 正确 +10';
      } else {
        score = Math.max(0, score - 5);
        feedbackEl.className = 'feedback bad';
        feedbackEl.textContent = '❌ 再想想 -5';
      }
      updateHud();
      pickQuestion();
    }

    function startGame() {
      clearInterval(timer);
      running = true;
      score = 0;
      timeLeft = 30;
      feedbackEl.textContent = '加油！';
      feedbackEl.className = 'feedback';
      pickQuestion();
      updateHud();
      timer = setInterval(() => {
        timeLeft -= 1;
        updateHud();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    optionBtns.forEach(btn => {
      btn.addEventListener('click', () => answer(btn.dataset.answer === 'yes'));
    });
    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
