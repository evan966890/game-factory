<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>角度猎手</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #171f3a;
      --text: #eef3ff;
      --accent: #6ea8ff;
      --ok: #47d18c;
      --warn: #ffcc66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at top, #1a2550, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: min(560px, 100%);
      background: rgba(23, 31, 58, 0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; }
    p { margin: 6px 0; line-height: 1.5; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      background: #212b52;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: .92rem;
    }
    .target {
      margin: 12px 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--warn);
    }
    #board {
      width: 100%;
      aspect-ratio: 1/1;
      background: #0f1732;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      touch-action: none;
      display: block;
    }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }
    #submitBtn { background: var(--accent); color: #06102c; }
    #nextBtn { background: #2a365f; color: var(--text); }
    .feedback { min-height: 1.5em; margin-top: 10px; font-weight: 600; }
    .ok { color: var(--ok); }
    .bad { color: #ff8b8b; }
  </style>
</head>
<body>
  <main class="app">
    <h1>📐 角度猎手</h1>
    <p>观察目标角度，拖动红色射线来“瞄准”。10 题后给出总分，越接近目标分数越高。</p>

    <div class="row">
      <div class="pill">题目：<span id="q">1</span>/10</div>
      <div class="pill">得分：<span id="score">0</span></div>
      <div class="pill">误差：<span id="error">-</span></div>
    </div>

    <div class="target">目标角度：<span id="target">0</span>°</div>
    <canvas id="board" width="800" height="800"></canvas>

    <div class="actions">
      <button id="submitBtn">提交本题</button>
      <button id="nextBtn" disabled>下一题</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </main>

  <script>
    const TOTAL = 10;
    let idx = 1;
    let score = 0;
    let target = 30;
    let angle = 45;
    let locked = false;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const elQ = document.getElementById('q');
    const elScore = document.getElementById('score');
    const elError = document.getElementById('error');
    const elTarget = document.getElementById('target');
    const feedback = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');

    function randTarget() {
      const candidates = [15, 20, 30, 35, 40, 45, 50, 60, 70, 75, 80, 90, 100, 110, 120, 135, 150, 160];
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function norm(a) {
      let n = a % 360;
      if (n < 0) n += 360;
      return n;
    }

    function diff(a, b) {
      const d = Math.abs(norm(a) - norm(b));
      return Math.min(d, 360 - d);
    }

    function toAngle(x, y, cx, cy) {
      const dx = x - cx;
      const dy = cy - y;
      let deg = Math.atan2(dy, dx) * 180 / Math.PI;
      if (deg < 0) deg += 360;
      return deg;
    }

    function draw() {
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;
      const r = w * 0.36;
      ctx.clearRect(0, 0, w, h);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 360; i += 15) {
        const rad = i * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(rad) * r, cy - Math.sin(rad) * r);
        ctx.stroke();
      }

      // Baseline (0°)
      ctx.strokeStyle = '#9cb3ff';
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r, cy);
      ctx.stroke();

      // Player ray
      const a = angle * Math.PI / 180;
      ctx.strokeStyle = '#ff6b6b';
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * r, cy - Math.sin(a) * r);
      ctx.stroke();

      // Arc hint after submit
      if (locked) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(110,168,255,.9)';
        ctx.lineWidth = 6;
        ctx.arc(cx, cy, r * 0.55, -target * Math.PI/180, 0, false);
        ctx.stroke();
      }

      // Center
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    function setFromPointer(clientX, clientY) {
      if (locked) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (clientX - rect.left) * scaleX;
      const y = (clientY - rect.top) * scaleY;
      angle = toAngle(x, y, canvas.width / 2, canvas.height / 2);
      draw();
    }

    canvas.addEventListener('pointerdown', e => setFromPointer(e.clientX, e.clientY));
    canvas.addEventListener('pointermove', e => {
      if (e.buttons) setFromPointer(e.clientX, e.clientY);
    });

    submitBtn.addEventListener('click', () => {
      if (locked) return;
      locked = true;
      const err = diff(angle, target);
      elError.textContent = err.toFixed(1) + '°';
      const earned = Math.max(0, Math.round(100 - err * 3));
      score += earned;
      elScore.textContent = score;
      feedback.className = 'feedback ' + (err <= 8 ? 'ok' : 'bad');
      feedback.textContent = `你画的是 ${angle.toFixed(1)}°，本题 +${earned} 分`; 
      submitBtn.disabled = true;
      nextBtn.disabled = false;
      draw();
    });

    nextBtn.addEventListener('click', () => {
      if (idx >= TOTAL) {
        const avg = Math.round(score / TOTAL);
        feedback.className = 'feedback ok';
        feedback.textContent = `🎉 挑战完成！总分 ${score}，平均每题 ${avg} 分。点击“再来一局”重新开始。`;
        nextBtn.textContent = '再来一局';
        idx = 0;
        score = 0;
        elScore.textContent = '0';
      }
      idx++;
      target = randTarget();
      angle = Math.random() * 360;
      locked = false;
      elQ.textContent = idx;
      elTarget.textContent = target;
      elError.textContent = '-';
      submitBtn.disabled = false;
      nextBtn.disabled = true;
      if (idx === 1) feedback.textContent = '新一局开始，拖动红线瞄准角度！';
      else feedback.textContent = '';
      draw();
    });

    // Init
    target = randTarget();
    elTarget.textContent = target;
    draw();
  </script>
</body>
</html>
