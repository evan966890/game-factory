<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看图猜成语</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="start-screen" class="screen active">
            <h1>看图猜成语</h1>
            <p class="subtitle">根据图片提示猜出正确的成语</p>
            <div class="emoji-preview">🤔 📖 🎯</div>
            <button id="start-btn" class="btn primary">开始游戏</button>
            <div class="high-score">最高分: <span id="high-score-display">0</span></div>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <!-- 信息面板 -->
            <div class="info-panel">
                <div class="info-item">
                    <span class="label">分数</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">连击</span>
                    <span id="combo" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">时间</span>
                    <span id="timer" class="value">30</span>
                </div>
                <div class="info-item">
                    <span class="label">金币</span>
                    <span id="coins" class="value">0</span>
                </div>
            </div>

            <!-- 题目区域 -->
            <div class="question-area">
                <div id="emoji-hint" class="emoji-hint">🤔</div>
                <div class="question-number">第 <span id="question-num">1</span> 题</div>
            </div>

            <!-- 选项区域 -->
            <div id="options" class="options">
                <button class="option-btn" data-index="0"></button>
                <button class="option-btn" data-index="1"></button>
                <button class="option-btn" data-index="2"></button>
                <button class="option-btn" data-index="3"></button>
            </div>

            <!-- 提示按钮 -->
            <div class="hint-section">
                <button id="hint-btn" class="btn hint">💡 提示 (-10金币)</button>
                <div id="hint-text" class="hint-text"></div>
            </div>
        </div>

        <!-- 结果弹窗 -->
        <div id="result-modal" class="modal">
            <div class="modal-content">
                <div id="result-icon" class="result-icon"></div>
                <h2 id="result-title"></h2>
                <p id="result-message"></p>
                <button id="next-btn" class="btn primary">下一题</button>
            </div>
        </div>

        <!-- 成语详情弹窗 -->
        <div id="idiom-modal" class="modal">
            <div class="modal-content">
                <h3 id="idiom-word"></h3>
                <div class="idiom-detail">
                    <p><strong>释义：</strong><span id="idiom-meaning"></span></p>
                    <p><strong>出处：</strong><span id="idiom-origin"></span></p>
                </div>
                <button id="close-idiom-btn" class="btn secondary">继续</button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="end-screen" class="screen">
            <h1>游戏结束</h1>
            <div class="final-score">
                <div class="score-label">最终得分</div>
                <div id="final-score" class="score-value">0</div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">答对题数</span>
                    <span id="correct-count" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">最高连击</span>
                    <span id="max-combo" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">获得金币</span>
                    <span id="earned-coins" class="stat-value">0</span>
                </div>
            </div>
            <div class="new-record" id="new-record" style="display: none;">
                🎉 新纪录！
            </div>
            <button id="restart-btn" class="btn primary">再来一局</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
