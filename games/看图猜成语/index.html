<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看图猜成语 - 成语学习游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }

        .game-area {
            padding: 30px 20px;
        }

        .question-number {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .image-hint {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px dashed #dee2e6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 500;
        }

        .option:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .feedback {
            text-align: center;
            margin-bottom: 20px;
            min-height: 80px;
        }

        .feedback-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-text.correct {
            color: #28a745;
        }

        .feedback-text.wrong {
            color: #dc3545;
        }

        .idiom-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            color: #666;
            text-align: left;
        }

        .idiom-info p {
            margin-bottom: 8px;
        }

        .idiom-info strong {
            color: #333;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .timer-bar {
            height: 5px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #ffc107, #dc3545);
            transition: width 0.1s linear;
        }

        .game-over {
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .high-score {
            color: #666;
            margin-bottom: 30px;
        }

        .summary {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .summary h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-item span:first-child {
            color: #666;
        }

        .summary-item span:last-child {
            font-weight: bold;
            color: #333;
        }

        .combo-display {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 193, 7, 0.9);
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .rules {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .rules h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .rules ul {
            list-style: none;
            padding: 0;
        }

        .rules li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
            color: #666;
            font-size: 14px;
        }

        .rules li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #28a745;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .game-container {
                border-radius: 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .image-hint {
                font-size: 36px;
                padding: 20px;
            }

            .option {
                padding: 12px 8px;
                font-size: 14px;
            }

            .btn {
                padding: 10px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>看图猜成语</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">连击</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最高分</div>
                    <div class="stat-value" id="high-score">0</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="game-area">
            <!-- Start Screen -->
            <div class="start-screen" id="start-screen">
                <h2>🎮 欢迎来到看图猜成语</h2>
                <p>通过图片提示猜出正确的成语，学习成语知识，挑战你的成语储备！</p>
                <div class="rules">
                    <h3>游戏规则</h3>
                    <ul>
                        <li>每题显示一个图片提示（emoji组合）</li>
                        <li>从四个选项中选择正确的成语</li>
                        <li>每题限时30秒</li>
                        <li>连续答对有连击加成</li>
                        <li>共10题，看看你能得多少分</li>
                    </ul>
                </div>
                <button class="btn" id="start-btn">开始游戏</button>
            </div>

            <!-- Game Screen -->
            <div id="game-screen" style="display: none;">
                <div class="question-number" id="question-number">第 1 / 10 题</div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timer-fill"></div>
                </div>
                <div class="image-hint" id="image-hint"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
                <div class="controls">
                    <button class="btn" id="next-btn" style="display: none;">下一题</button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div class="game-over" id="game-over" style="display: none;">
                <h2>🎉 游戏结束</h2>
                <div class="final-score" id="final-score">0</div>
                <div class="high-score" id="final-high-score">最高分: 0</div>
                <div class="summary" id="summary"></div>
                <button class="btn" id="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        // 成语数据
        const idioms = [
            {
                idiom: "一箭双雕",
                meaning: "一支箭射中两只雕，比喻做一件事达到两个目的。",
                origin: "《北史·长孙晟传》",
                hint: "🏹🦅🦅"
            },
            {
                idiom: "画蛇添足",
                meaning: "画蛇时给蛇添上脚，比喻做了多余的事，反而不恰当。",
                origin: "《战国策·齐策二》",
                hint: "🐍🎨🦶"
            },
            {
                idiom: "守株待兔",
                meaning: "守在树桩旁等待兔子撞死，比喻不主动努力，而心存侥幸。",
                origin: "《韩非子·五蠹》",
                hint: "🌳🐇⏳"
            },
            {
                idiom: "井底之蛙",
                meaning: "井底的青蛙只能看到井口那么大的天，比喻见识短浅的人。",
                origin: "《庄子·秋水》",
                hint: "🕳️🐸👀"
            },
            {
                idiom: "对牛弹琴",
                meaning: "对着牛弹琴，比喻对不懂道理的人讲道理。",
                origin: "《庄子·齐物论》",
                hint: "🐂🎹😤"
            },
            {
                idiom: "狐假虎威",
                meaning: "狐狸借老虎的威势，比喻倚仗别人的势力欺压人。",
                origin: "《战国策·楚策一》",
                hint: "🦊🐯👑"
            },
            {
                idiom: "亡羊补牢",
                meaning: "羊丢了才修补羊圈，比喻出了问题以后想办法补救。",
                origin: "《战国策·楚策四》",
                hint: "🐑🔧🏠"
            },
            {
                idiom: "掩耳盗铃",
                meaning: "捂住耳朵去偷铃铛，比喻自己欺骗自己。",
                origin: "《吕氏春秋·自知》",
                hint: "👂🔕🙈"
            },
            {
                idiom: "拔苗助长",
                meaning: "把苗拔起来帮助其生长，比喻违反事物发展的客观规律。",
                origin: "《孟子·公孙丑上》",
                hint: "🌱⬆️😓"
            },
            {
                idiom: "刻舟求剑",
                meaning: "在船上刻记号找剑，比喻拘泥成法，不知变通。",
                origin: "《吕氏春秋·察今》",
                hint: "🚢🗡️📍"
            },
            {
                idiom: "杯弓蛇影",
                meaning: "将映在酒杯里的弓影误认为蛇，比喻因疑神疑鬼而引起恐惧。",
                origin: "《风俗通义·怪神》",
                hint: "🍷🐍😱"
            },
            {
                idiom: "叶公好龙",
                meaning: "叶公喜欢龙，比喻表面上爱好某事物，实际上并不真爱好。",
                origin: "《新序·杂事》",
                hint: "🌿👨🐉❤️"
            },
            {
                idiom: "自相矛盾",
                meaning: "自己的矛和盾，比喻言行前后抵触。",
                origin: "《韩非子·难一》",
                hint: "⚔️🛡️🔄"
            },
            {
                idiom: "杞人忧天",
                meaning: "杞国人担心天塌下来，比喻不必要的或缺乏根据的忧虑。",
                origin: "《列子·天瑞》",
                hint: "😨☁️🌍"
            },
            {
                idiom: "滥竽充数",
                meaning: "不会吹竽的人混在乐队里充数，比喻没有真才实学的人混在行家里面充数。",
                origin: "《韩非子·内储说上》",
                hint: "🎵👥🎭"
            },
            {
                idiom: "买椟还珠",
                meaning: "买下木匣，退还了珍珠，比喻没有眼力，取舍不当。",
                origin: "《韩非子·外储说左上》",
                hint: "📦💎🔙"
            },
            {
                idiom: "邯郸学步",
                meaning: "到邯郸学走路，比喻模仿别人不成，反而丧失了原有的技能。",
                origin: "《庄子·秋水》",
                hint: "🚶‍♂️🏙️🔄"
            },
            {
                idiom: "东施效颦",
                meaning: "东施模仿西施皱眉，比喻模仿别人，不但模仿不好，反而出丑。",
                origin: "《庄子·天运》",
                hint: "👩‍🦰😬👎"
            },
            {
                idiom: "朝三暮四",
                meaning: "早上三个，晚上四个，比喻常常变卦，反复无常。",
                origin: "《庄子·齐物论》",
                hint: "🌅3️⃣🌙4️⃣"
            },
            {
                idiom: "鹬蚌相争",
                meaning: "鹬和蚌互相争持，比喻双方相争，让第三者得利。",
                origin: "《战国策·燕策二》",
                hint: "🐦🐚⚔️"
            }
        ];

        // 游戏状态
        let gameState = {
            score: 0,
            combo: 0,
            maxCombo: 0,
            currentQuestion: 0,
            totalQuestions: 10,
            timeLeft: 30,
            timer: null,
            currentIdiom: null,
            correctAnswers: 0,
            wrongAnswers: 0,
            usedIdioms: [],
            highScore: parseInt(localStorage.getItem('idiomGameHighScore')) || 0
        };

        // DOM 元素
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const highScoreEl = document.getElementById('high-score');
        const questionNumberEl = document.getElementById('question-number');
        const timerFillEl = document.getElementById('timer-fill');
        const imageHintEl = document.getElementById('image-hint');
        const optionsEl = document.getElementById('options');
        const feedbackEl = document.getElementById('feedback');
        const finalScoreEl = document.getElementById('final-score');
        const finalHighScoreEl = document.getElementById('final-high-score');
        const summaryEl = document.getElementById('summary');

        // 初始化
        function init() {
            highScoreEl.textContent = gameState.highScore;
            startBtn.addEventListener('click', startGame);
            nextBtn.addEventListener('click', nextQuestion);
            restartBtn.addEventListener('click', restartGame);
        }

        // 开始游戏
        function startGame() {
            gameState = {
                score: 0,
                combo: 0,
                maxCombo: 0,
                currentQuestion: 0,
                totalQuestions: 10,
                timeLeft: 30,
                timer: null,
                currentIdiom: null,
                correctAnswers: 0,
                wrongAnswers: 0,
                usedIdioms: [],
                highScore: gameState.highScore
            };

            updateStats();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameScreen.style.display = 'block';

            nextQuestion();
        }

        // 下一题
        function nextQuestion() {
            if (gameState.currentQuestion >= gameState.totalQuestions) {
                endGame();
                return;
            }

            gameState.currentQuestion++;
            gameState.timeLeft = 30;
            nextBtn.style.display = 'none';
            feedbackEl.innerHTML = '';

            // 选择成语
            let availableIdioms = idioms.filter(idiom => !gameState.usedIdioms.includes(idiom.idiom));
            if (availableIdioms.length === 0) {
                gameState.usedIdioms = [];
                availableIdioms = [...idioms];
            }

            const randomIndex = Math.floor(Math.random() * availableIdioms.length);
            gameState.currentIdiom = availableIdioms[randomIndex];
            gameState.usedIdioms.push(gameState.currentIdiom.idiom);

            // 显示题目
            questionNumberEl.textContent = `第 ${gameState.currentQuestion} / ${gameState.totalQuestions} 题`;
            imageHintEl.textContent = gameState.currentIdiom.hint;

            // 生成选项
            generateOptions();

            // 开始计时
            startTimer();
        }

        // 生成选项
        function generateOptions() {
            const correctIdiom = gameState.currentIdiom.idiom;
            let options = [correctIdiom];

            // 添加错误选项
            const otherIdioms = idioms.filter(idiom => idiom.idiom !== correctIdiom);
            while (options.length < 4 && otherIdioms.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherIdioms.length);
                const wrongIdiom = otherIdioms[randomIndex].idiom;
                if (!options.includes(wrongIdiom)) {
                    options.push(wrongIdiom);
                }
                otherIdioms.splice(randomIndex, 1);
            }

            // 随机排序
            options = shuffleArray(options);

            // 渲染选项
            optionsEl.innerHTML = '';
            options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.textContent = option;
                optionEl.addEventListener('click', () => selectAnswer(option, optionEl));
                optionsEl.appendChild(optionEl);
            });
        }

        // 选择答案
        function selectAnswer(answer, optionEl) {
            clearInterval(gameState.timer);

            const options = optionsEl.querySelectorAll('.option');
            options.forEach(opt => opt.classList.add('disabled'));

            const isCorrect = answer === gameState.currentIdiom.idiom;

            if (isCorrect) {
                optionEl.classList.add('correct');
                gameState.combo++;
                gameState.correctAnswers++;
                if (gameState.combo > gameState.maxCombo) {
                    gameState.maxCombo = gameState.combo;
                }

                // 计算得分：基础分100 + 连击加成（最高5倍）
                const comboMultiplier = Math.min(gameState.combo, 5);
                const points = 100 * comboMultiplier;
                gameState.score += points;

                showFeedback(true, points);
            } else {
                optionEl.classList.add('wrong');
                gameState.combo = 0;
                gameState.wrongAnswers++;

                // 显示正确答案
                options.forEach(opt => {
                    if (opt.textContent === gameState.currentIdiom.idiom) {
                        opt.classList.add('correct');
                    }
                });

                showFeedback(false, 0);
            }

            updateStats();
            nextBtn.style.display = 'block';
        }

        // 显示反馈
        function showFeedback(isCorrect, points) {
            const idiom = gameState.currentIdiom;
            let html = '';

            if (isCorrect) {
                html = `
                    <div class="feedback-text correct">✅ 回答正确！+${points}分</div>
                    <div class="idiom-info">
                        <p><strong>${idiom.idiom}</strong></p>
                        <p><strong>释义：</strong>${idiom.meaning}</p>
                        <p><strong>出处：</strong>${idiom.origin}</p>
                    </div>
                `;
            } else {
                html = `
                    <div class="feedback-text wrong">❌ 回答错误</div>
                    <div class="idiom-info">
                        <p><strong>正确答案：${idiom.idiom}</strong></p>
                        <p><strong>释义：</strong>${idiom.meaning}</p>
                        <p><strong>出处：</strong>${idiom.origin}</p>
                    </div>
                `;
            }

            feedbackEl.innerHTML = html;
        }

        // 开始计时
        function startTimer() {
            updateTimerDisplay();
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerDisplay();

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timer);
                    timeUp();
                }
            }, 1000);
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            const percentage = (gameState.timeLeft / 30) * 100;
            timerFillEl.style.width = `${percentage}%`;
        }

        // 时间到
        function timeUp() {
            const options = optionsEl.querySelectorAll('.option');
            options.forEach(opt => {
                opt.classList.add('disabled');
                if (opt.textContent === gameState.currentIdiom.idiom) {
                    opt.classList.add('correct');
                }
            });

            gameState.combo = 0;
            gameState.wrongAnswers++;

            feedbackEl.innerHTML = `
                <div class="feedback-text wrong">⏰ 时间到！</div>
                <div class="idiom-info">
                    <p><strong>正确答案：${gameState.currentIdiom.idiom}</strong></p>
                    <p><strong>释义：</strong>${gameState.currentIdiom.meaning}</p>
                    <p><strong>出处：</strong>${gameState.currentIdiom.origin}</p>
                </div>
            `;

            updateStats();
            nextBtn.style.display = 'block';
        }

        // 更新统计
        function updateStats() {
            scoreEl.textContent = gameState.score;
            comboEl.textContent = gameState.combo;
            highScoreEl.textContent = gameState.highScore;
        }

        // 结束游戏
        function endGame() {
            clearInterval(gameState.timer);

            // 更新最高分
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('idiomGameHighScore', gameState.highScore);
            }

            gameScreen.style.display = 'none';
            gameOverScreen.style.display = 'block';

            finalScoreEl.textContent = gameState.score;
            finalHighScoreEl.textContent = `最高分: ${gameState.highScore}`;

            // 显示总结
            const accuracy = Math.round((gameState.correctAnswers / gameState.totalQuestions) * 100);
            summaryEl.innerHTML = `
                <h3>📊 游戏总结</h3>
                <div class="summary-item">
                    <span>答对题数</span>
                    <span>${gameState.correctAnswers} / ${gameState.totalQuestions}</span>
                </div>
                <div class="summary-item">
                    <span>答错题数</span>
                    <span>${gameState.wrongAnswers}</span>
                </div>
                <div class="summary-item">
                    <span>正确率</span>
                    <span>${accuracy}%</span>
                </div>
                <div class="summary-item">
                    <span>最高连击</span>
                    <span>${gameState.maxCombo} 连击</span>
                </div>
                <div class="summary-item">
                    <span>最终得分</span>
                    <span>${gameState.score} 分</span>
                </div>
            `;
        }

        // 重新开始
        function restartGame() {
            startGame();
        }

        // 数组随机排序
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
