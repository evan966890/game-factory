<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>看图猜成语</title>
  <style>
    :root {
      --bg: #f6fbff;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5b7188;
      --primary: #0a7d8c;
      --primary-dark: #075a65;
      --ok: #137f3f;
      --bad: #b23232;
      --border: #d9e6ef;
      --radius: 16px;
      --gold: #ffd700;
      --orange: #ff8c00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #e9f7ff 0%, var(--bg) 45%, #f3fff6 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(7, 90, 101, 0.12);
      padding: 18px;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0 0 6px;
      line-height: 1.25;
      text-align: center;
      color: var(--primary);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-value.combo {
      color: var(--orange);
    }

    .stat-value.timer {
      color: var(--bad);
    }

    .stat-value.high-score {
      color: var(--gold);
    }

    .image-hint {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      border: 2px dashed var(--primary);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .emoji-hint {
      font-size: 2.5rem;
      line-height: 1;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .option-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: #f0f9ff;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn.correct {
      border-color: var(--ok);
      background: #f0fdf4;
      color: var(--ok);
    }

    .option-btn.wrong {
      border-color: var(--bad);
      background: #fef2f2;
      color: var(--bad);
    }

    .option-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .feedback {
      text-align: center;
      margin-bottom: 16px;
      min-height: 60px;
    }

    .feedback-text {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feedback-text.correct {
      color: var(--ok);
    }

    .feedback-text.wrong {
      color: var(--bad);
    }

    .idiom-meaning {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.secondary {
      background: #f1f5f9;
      color: var(--text);
    }

    .btn.secondary:hover {
      background: #e2e8f0;
    }

    .game-over {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .game-over-content {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .game-over h2 {
      margin: 0 0 16px;
      color: var(--primary);
    }

    .final-score {
      font-size: 3rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .final-combo {
      font-size: 1.25rem;
      color: var(--orange);
      margin-bottom: 16px;
    }

    .new-record {
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .app {
        padding: 12px;
      }

      h1 {
        font-size: 1.25rem;
      }

      .emoji-hint {
        font-size: 2rem;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .option-btn {
        padding: 14px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>看图猜成语</h1>
    <p class="subtitle">根据图片提示猜出正确的成语</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">分数</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">连击</div>
        <div class="stat-value combo" id="combo">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">时间</div>
        <div class="stat-value timer" id="timer">60</div>
      </div>
      <div class="stat">
        <div class="stat-label">最高分</div>
        <div class="stat-value high-score" id="highScore">0</div>
      </div>
    </div>

    <div class="image-hint" id="imageHint">
      <span class="emoji-hint" id="emojiHint">🤔</span>
    </div>

    <div class="options" id="options">
      <!-- Options will be generated by JavaScript -->
    </div>

    <div class="feedback" id="feedback">
      <div class="feedback-text" id="feedbackText"></div>
      <div class="idiom-meaning" id="idiomMeaning"></div>
    </div>

    <div class="controls">
      <button class="btn" id="startBtn">开始游戏</button>
      <button class="btn secondary hidden" id="nextBtn">下一题</button>
    </div>
  </div>

  <div class="game-over hidden" id="gameOver">
    <div class="game-over-content">
      <h2>游戏结束</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="final-combo" id="finalCombo">最高连击: 0</div>
      <div class="new-record hidden" id="newRecord">🎉 新纪录！</div>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>
  </div>

  <script>
    // 成语题目数据
    const idioms = [
      {
        hint: ["🐱", "🐟"],
        options: ["猫捉老鼠", "猫吃鱼", "猫哭老鼠", "猫鼠同眠"],
        answer: "猫吃鱼",
        meaning: "猫吃鱼：比喻理所当然的事情，也指顺理成章的结果。"
      },
      {
        hint: ["🐔", "🥚"],
        options: ["鸡飞蛋打", "鸡犬不宁", "鸡鸣狗盗", "鸡毛蒜皮"],
        answer: "鸡飞蛋打",
        meaning: "鸡飞蛋打：比喻两头落空，一无所得。"
      },
      {
        hint: ["🐍", "🐉"],
        options: ["画蛇添足", "蛇鼠一窝", "龙蛇混杂", "虎头蛇尾"],
        answer: "画蛇添足",
        meaning: "画蛇添足：比喻做了多余的事，反而不恰当。"
      },
      {
        hint: ["🐺", "🐑"],
        options: ["狼心狗肺", "狼吞虎咽", "狼狈为奸", "羊入虎口"],
        answer: "羊入虎口",
        meaning: "羊入虎口：比喻陷入险境，无法逃脱。"
      },
      {
        hint: ["🐸", "井"],
        options: ["井底之蛙", "坐井观天", "蛙鸣蝉噪", "沉灶产蛙"],
        answer: "井底之蛙",
        meaning: "井底之蛙：比喻见识短浅的人。"
      },
      {
        hint: ["🐝", "🍯"],
        options: ["蜂拥而至", "蜂目豺声", "蜂虿有毒", "甜蜜蜜"],
        answer: "甜蜜蜜",
        meaning: "甜蜜蜜：形容非常甜美，也指幸福美满的感觉。"
      },
      {
        hint: ["🐦", "🐦"],
        options: ["比翼双飞", "鸟语花香", "惊弓之鸟", "笨鸟先飞"],
        answer: "比翼双飞",
        meaning: "比翼双飞：比喻夫妻恩爱，形影不离。"
      },
      {
        hint: ["🐢", "🐰"],
        options: ["龟兔赛跑", "兔死狐悲", "守株待兔", "动如脱兔"],
        answer: "龟兔赛跑",
        meaning: "龟兔赛跑：比喻做事要坚持不懈，才能成功。"
      },
      {
        hint: ["🦊", "🐯"],
        options: ["狐假虎威", "虎视眈眈", "如虎添翼", "骑虎难下"],
        answer: "狐假虎威",
        meaning: "狐假虎威：比喻倚仗别人的威势欺压人。"
      },
      {
        hint: ["🐴", "🐴"],
        options: ["马到成功", "马不停蹄", "马马虎虎", "走马观花"],
        answer: "马马虎虎",
        meaning: "马马虎虎：形容做事不认真，敷衍了事。"
      },
      {
        hint: ["🐷", "🐷"],
        options: ["猪朋狗友", "猪突豨勇", "泥猪瓦狗", "猪狗不如"],
        answer: "猪朋狗友",
        meaning: "猪朋狗友：比喻不好的朋友。"
      },
      {
        hint: ["🐮", "🐮"],
        options: ["牛刀小试", "牛鬼蛇神", "牛头马面", "对牛弹琴"],
        answer: "对牛弹琴",
        meaning: "对牛弹琴：比喻对不懂道理的人讲道理，白费口舌。"
      }
    ];

    // 游戏状态
    let gameState = {
      score: 0,
      combo: 0,
      maxCombo: 0,
      timeLeft: 60,
      currentQuestion: null,
      usedQuestions: [],
      isPlaying: false,
      timerInterval: null
    };

    // DOM 元素
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const timerEl = document.getElementById('timer');
    const highScoreEl = document.getElementById('highScore');
    const emojiHintEl = document.getElementById('emojiHint');
    const optionsEl = document.getElementById('options');
    const feedbackTextEl = document.getElementById('feedbackText');
    const idiomMeaningEl = document.getElementById('idiomMeaning');
    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const finalComboEl = document.getElementById('finalCombo');
    const newRecordEl = document.getElementById('newRecord');
    const restartBtn = document.getElementById('restartBtn');

    // 初始化
    function init() {
      loadHighScore();
      startBtn.addEventListener('click', startGame);
      nextBtn.addEventListener('click', nextQuestion);
      restartBtn.addEventListener('click', restartGame);
    }

    // 加载最高分
    function loadHighScore() {
      const highScore = localStorage.getItem('kan-tu-cai-cheng-yu-high-score') || 0;
      highScoreEl.textContent = highScore;
    }

    // 保存最高分
    function saveHighScore() {
      const currentHighScore = parseInt(localStorage.getItem('kan-tu-cai-cheng-yu-high-score') || 0);
      if (gameState.score > currentHighScore) {
        localStorage.setItem('kan-tu-cai-cheng-yu-high-score', gameState.score);
        highScoreEl.textContent = gameState.score;
        return true;
      }
      return false;
    }

    // 开始游戏
    function startGame() {
      gameState = {
        score: 0,
        combo: 0,
        maxCombo: 0,
        timeLeft: 60,
        currentQuestion: null,
        usedQuestions: [],
        isPlaying: true,
        timerInterval: null
      };

      updateStats();
      startBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      gameOverEl.classList.add('hidden');

      startTimer();
      nextQuestion();
    }

    // 开始计时器
    function startTimer() {
      gameState.timerInterval = setInterval(() => {
        gameState.timeLeft--;
        timerEl.textContent = gameState.timeLeft;

        if (gameState.timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    // 下一题
    function nextQuestion() {
      // 重置反馈
      feedbackTextEl.textContent = '';
      feedbackTextEl.className = 'feedback-text';
      idiomMeaningEl.textContent = '';

      // 选择随机题目
      let availableQuestions = idioms.filter((_, index) => !gameState.usedQuestions.includes(index));
      
      if (availableQuestions.length === 0) {
        // 所有题目都用过了，重置
        gameState.usedQuestions = [];
        availableQuestions = idioms;
      }

      const randomIndex = Math.floor(Math.random() * availableQuestions.length);
      const questionIndex = idioms.indexOf(availableQuestions[randomIndex]);
      gameState.usedQuestions.push(questionIndex);
      gameState.currentQuestion = idioms[questionIndex];

      // 显示提示
      emojiHintEl.textContent = gameState.currentQuestion.hint.join(' ');

      // 生成选项
      generateOptions();
    }

    // 生成选项
    function generateOptions() {
      optionsEl.innerHTML = '';
      
      // 打乱选项顺序
      const shuffledOptions = [...gameState.currentQuestion.options].sort(() => Math.random() - 0.5);

      shuffledOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.addEventListener('click', () => handleAnswer(option, btn));
        optionsEl.appendChild(btn);
      });
    }

    // 处理答案
    function handleAnswer(selectedOption, btn) {
      if (!gameState.isPlaying) return;

      // 禁用所有选项
      const allBtns = optionsEl.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.classList.add('disabled'));

      const isCorrect = selectedOption === gameState.currentQuestion.answer;

      if (isCorrect) {
        // 正确答案
        btn.classList.add('correct');
        gameState.combo++;
        if (gameState.combo > gameState.maxCombo) {
          gameState.maxCombo = gameState.combo;
        }
        
        // 计算分数：基础分 + 连击加成
        const baseScore = 10;
        const comboBonus = Math.min(gameState.combo - 1, 5) * 2; // 最多加10分
        gameState.score += baseScore + comboBonus;

        feedbackTextEl.textContent = '🎉 回答正确！';
        feedbackTextEl.className = 'feedback-text correct';
        idiomMeaningEl.textContent = gameState.currentQuestion.meaning;

        // 添加时间奖励
        gameState.timeLeft = Math.min(gameState.timeLeft + 3, 60);
        timerEl.textContent = gameState.timeLeft;
      } else {
        // 错误答案
        btn.classList.add('wrong');
        
        // 显示正确答案
        allBtns.forEach(b => {
          if (b.textContent === gameState.currentQuestion.answer) {
            b.classList.add('correct');
          }
        });

        gameState.combo = 0;
        feedbackTextEl.textContent = '❌ 回答错误！';
        feedbackTextEl.className = 'feedback-text wrong';
        idiomMeaningEl.textContent = gameState.currentQuestion.meaning;
      }

      updateStats();
    }

    // 更新统计
    function updateStats() {
      scoreEl.textContent = gameState.score;
      comboEl.textContent = gameState.combo;
      timerEl.textContent = gameState.timeLeft;
    }

    // 结束游戏
    function endGame() {
      gameState.isPlaying = false;
      clearInterval(gameState.timerInterval);

      finalScoreEl.textContent = gameState.score;
      finalComboEl.textContent = `最高连击: ${gameState.maxCombo}`;

      const isNewRecord = saveHighScore();
      if (isNewRecord) {
        newRecordEl.classList.remove('hidden');
      } else {
        newRecordEl.classList.add('hidden');
      }

      gameOverEl.classList.remove('hidden');
    }

    // 重新开始游戏
    function restartGame() {
      gameOverEl.classList.add('hidden');
      startGame();
    }

    // 初始化游戏
    init();
  </script>
</body>
</html>
