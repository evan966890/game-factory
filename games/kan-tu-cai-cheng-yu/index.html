<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看图猜成语</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --error-color: #f44336;
            --success-color: #4CAF50;
            --background-color: #f5f5f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .game-card {
            background: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .combo {
            color: #ff9800;
        }

        .timer {
            color: var(--error-color);
        }

        .question-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .emoji-hint {
            font-size: 4rem;
            margin-bottom: 20px;
            line-height: 1.2;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: var(--card-background);
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 20px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .option-btn:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
            animation: pulse 0.5s ease;
        }

        .option-btn.wrong {
            background: var(--error-color);
            color: white;
            border-color: var(--error-color);
            animation: shake 0.5s ease;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback {
            text-align: center;
            margin-bottom: 30px;
            min-height: 100px;
        }

        .feedback-content {
            display: none;
        }

        .feedback-content.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .feedback-title.correct {
            color: var(--success-color);
        }

        .feedback-title.wrong {
            color: var(--error-color);
        }

        .idiom-meaning {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .idiom-meaning h4 {
            color: var(--secondary-color);
            margin-bottom: 8px;
        }

        .idiom-meaning p {
            color: #666;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--secondary-color);
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .game-over {
            text-align: center;
        }

        .game-over h2 {
            font-size: 2rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .high-score {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .new-record {
            color: #ff9800;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }

            .emoji-hint {
                font-size: 3rem;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .game-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>看图猜成语</h1>
            <p>根据 emoji 提示猜出正确的成语</p>
        </div>

        <div class="game-card" id="game-area">
            <!-- 游戏进行中 -->
            <div id="playing">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="score">0</div>
                        <div class="stat-label">得分</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value combo" id="combo">0</div>
                        <div class="stat-label">连击</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value timer" id="timer">30</div>
                        <div class="stat-label">时间</div>
                    </div>
                </div>

                <div class="question-area">
                    <div class="emoji-hint" id="emoji-hint"></div>
                </div>

                <div class="options" id="options"></div>

                <div class="feedback">
                    <div class="feedback-content" id="feedback">
                        <div class="feedback-title" id="feedback-title"></div>
                        <div class="idiom-meaning" id="idiom-meaning"></div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn" id="next-btn" style="display: none;">下一题</button>
                </div>
            </div>

            <!-- 游戏结束 -->
            <div id="game-over" style="display: none;">
                <div class="game-over">
                    <h2>游戏结束</h2>
                    <div class="final-score" id="final-score">0</div>
                    <div class="high-score" id="high-score">最高分: 0</div>
                    <div class="controls">
                        <button class="btn" id="restart-btn">再来一局</button>
                    </div>
                </div>
            </div>

            <!-- 开始界面 -->
            <div id="start-screen" style="display: none;">
                <div class="game-over">
                    <h2>看图猜成语</h2>
                    <p style="margin-bottom: 30px; color: #666;">根据 emoji 提示猜出正确的成语，考验你的成语知识！</p>
                    <div class="controls">
                        <button class="btn" id="start-btn">开始游戏</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 成语库
        const idioms = [
            {
                hint: "🍎🍊🍋🍇",
                answer: "硕果累累",
                meaning: "本义是指秋天丰收时树上的果实茂盛的样子。现在常引申为某人的作品很多，取得了很大的成就。",
                origin: "《史记·货殖列传》"
            },
            {
                hint: "🔥🚒👨‍🚒💧",
                answer: "水火不容",
                meaning: "水和火是两种对立的事物，不能相容。比喻二者对立，绝不相容。",
                origin: "《汉书·郊祀志下》"
            },
            {
                hint: "🌙⭐🌌✨",
                answer: "星光灿烂",
                meaning: "形容星光闪烁，非常明亮。也比喻事物美好，前途光明。",
                origin: "现代常用语"
            },
            {
                hint: "🌊🚢⚓🏝️",
                answer: "一帆风顺",
                meaning: "船挂着满帆顺风行驶。比喻非常顺利，没有任何阻碍。",
                origin: "唐·孟郊《送崔爽之湖南》"
            },
            {
                hint: "🏃‍♂️💨🏆🥇",
                answer: "一马当先",
                meaning: "原指作战时策马冲锋在前。形容领先。也比喻工作走在群众前面，积极带头。",
                origin: "明·施耐庵《水浒传》"
            },
            {
                hint: "📚✏️🎓👨‍🎓",
                answer: "学富五车",
                meaning: "形容读书多，学识丰富。",
                origin: "《庄子·天下》"
            },
            {
                hint: "🎵🎶🎹🎸",
                answer: "琴棋书画",
                meaning: "弹琴、弈棋、写字、绘画。常以表示个人的文化素养。",
                origin: "宋·孙光宪《北梦琐言》"
            },
            {
                hint: "🌸🌺🌻🌷",
                answer: "百花齐放",
                meaning: "形容百花盛开，丰富多彩。比喻不同形式和风格的各种艺术作品自由发展。",
                origin: "清·李汝珍《镜花缘》"
            },
            {
                hint: "🦅🕊️🦅🕊️",
                answer: "比翼双飞",
                meaning: "比喻夫妻情投意合，在事业上并肩前进。",
                origin: "《尔雅·释地》"
            },
            {
                hint: "🏔️🗻⛰️🌄",
                answer: "崇山峻岭",
                meaning: "形容高大险峻的山岭。",
                origin: "晋·王羲之《兰亭集序》"
            },
            {
                hint: "🐉🐅🦁🐘",
                answer: "龙争虎斗",
                meaning: "形容斗争或竞赛很激烈。",
                origin: "汉·班固《答宾戏》"
            },
            {
                hint: "🌈☀️🌤️⛅",
                answer: "雨过天晴",
                meaning: "雨后转晴。也比喻政治上由黑暗到光明。",
                origin: "明·谢肇涮《文海披沙记》"
            },
            {
                hint: "🎭🎨🎬🎤",
                answer: "多才多艺",
                meaning: "具有多方面的才能和技艺。",
                origin: "《尚书·金滕》"
            },
            {
                hint: "💎💍👑📿",
                answer: "珠光宝气",
                meaning: "形容妇女服饰华贵富丽，闪耀着珍宝的光色。",
                origin: "清·漱石生《武则天四大奇案》"
            },
            {
                hint: "🌲🌳🌴🌵",
                answer: "郁郁葱葱",
                meaning: "形容草木苍翠茂盛。也形容气势美好蓬勃。",
                origin: "汉·王充《论衡·吉验》"
            },
            {
                hint: "🦅🕊️🦅🕊️",
                answer: "鹏程万里",
                meaning: "比喻前程远大。",
                origin: "《庄子·逍遥游》"
            },
            {
                hint: "🌊🐟🐠🐡",
                answer: "如鱼得水",
                meaning: "好像鱼得到水一样。比喻有所凭借。也比喻得到跟自己十分投合的人或对自己很合适的环境。",
                origin: "《三国志·蜀书·诸葛亮传》"
            },
            {
                hint: "🔥🌋💥♨️",
                answer: "热火朝天",
                meaning: "形容群众性的活动情绪热烈，气氛高涨，就像炽热的火焰照天燃烧一样。",
                origin: "现代常用语"
            },
            {
                hint: "❄️⛄🌨️🌬️",
                answer: "冰天雪地",
                meaning: "形容冰雪漫天盖地。",
                origin: "清·蒋士铨《鸡毛房》"
            },
            {
                hint: "🌙🌕🌖🌗",
                answer: "花好月圆",
                meaning: "花儿正盛开，月亮正圆满。比喻美好圆满。多用于祝贺人新婚。",
                origin: "宋·张先《木兰花》"
            }
        ];

        // 游戏状态
        let gameState = {
            score: 0,
            combo: 0,
            timer: 30,
            currentIdiom: null,
            usedIdioms: [],
            timerInterval: null,
            isPlaying: false
        };

        // DOM 元素
        const elements = {
            score: document.getElementById('score'),
            combo: document.getElementById('combo'),
            timer: document.getElementById('timer'),
            emojiHint: document.getElementById('emoji-hint'),
            options: document.getElementById('options'),
            feedback: document.getElementById('feedback'),
            feedbackTitle: document.getElementById('feedback-title'),
            idiomMeaning: document.getElementById('idiom-meaning'),
            nextBtn: document.getElementById('next-btn'),
            playing: document.getElementById('playing'),
            gameOver: document.getElementById('game-over'),
            startScreen: document.getElementById('start-screen'),
            finalScore: document.getElementById('final-score'),
            highScore: document.getElementById('high-score'),
            startBtn: document.getElementById('start-btn'),
            restartBtn: document.getElementById('restart-btn')
        };

        // 初始化游戏
        function initGame() {
            elements.startScreen.style.display = 'block';
            elements.playing.style.display = 'none';
            elements.gameOver.style.display = 'none';
        }

        // 开始游戏
        function startGame() {
            gameState = {
                score: 0,
                combo: 0,
                timer: 30,
                currentIdiom: null,
                usedIdioms: [],
                timerInterval: null,
                isPlaying: true
            };

            elements.startScreen.style.display = 'none';
            elements.playing.style.display = 'block';
            elements.gameOver.style.display = 'none';

            updateStats();
            nextQuestion();
        }

        // 下一题
        function nextQuestion() {
            // 重置状态
            clearInterval(gameState.timerInterval);
            gameState.timer = 30;
            elements.timer.textContent = gameState.timer;
            elements.feedback.classList.remove('show');
            elements.nextBtn.style.display = 'none';

            // 启用所有选项按钮
            const optionBtns = elements.options.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct', 'wrong');
            });

            // 选择新题目
            let availableIdioms = idioms.filter(idiom => !gameState.usedIdioms.includes(idiom));
            if (availableIdioms.length === 0) {
                // 所有成语都用过了，重置
                gameState.usedIdioms = [];
                availableIdioms = idioms;
            }

            const randomIndex = Math.floor(Math.random() * availableIdioms.length);
            gameState.currentIdiom = availableIdioms[randomIndex];
            gameState.usedIdioms.push(gameState.currentIdiom);

            // 显示题目
            elements.emojiHint.textContent = gameState.currentIdiom.hint;

            // 生成选项
            generateOptions();

            // 开始倒计时
            startTimer();
        }

        // 生成选项
        function generateOptions() {
            const options = [gameState.currentIdiom.answer];
            
            // 添加错误选项
            while (options.length < 4) {
                const randomIdiom = idioms[Math.floor(Math.random() * idioms.length)];
                if (!options.includes(randomIdiom.answer)) {
                    options.push(randomIdiom.answer);
                }
            }

            // 随机排序
            options.sort(() => Math.random() - 0.5);

            // 渲染选项
            elements.options.innerHTML = '';
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.addEventListener('click', () => checkAnswer(option, btn));
                elements.options.appendChild(btn);
            });
        }

        // 检查答案
        function checkAnswer(selected, btn) {
            if (!gameState.isPlaying) return;

            clearInterval(gameState.timerInterval);
            const isCorrect = selected === gameState.currentIdiom.answer;

            // 禁用所有选项
            const optionBtns = elements.options.querySelectorAll('.option-btn');
            optionBtns.forEach(b => b.disabled = true);

            // 标记正确/错误
            if (isCorrect) {
                btn.classList.add('correct');
                gameState.combo++;
                const baseScore = 100;
                const comboBonus = Math.min(gameState.combo - 1, 5) * 20;
                gameState.score += baseScore + comboBonus;
            } else {
                btn.classList.add('wrong');
                // 显示正确答案
                optionBtns.forEach(b => {
                    if (b.textContent === gameState.currentIdiom.answer) {
                        b.classList.add('correct');
                    }
                });
                gameState.combo = 0;
            }

            updateStats();
            showFeedback(isCorrect);
        }

        // 显示反馈
        function showFeedback(isCorrect) {
            elements.feedbackTitle.textContent = isCorrect ? '🎉 回答正确！' : '😅 回答错误';
            elements.feedbackTitle.className = `feedback-title ${isCorrect ? 'correct' : 'wrong'}`;

            const meaningHtml = `
                <h4>${gameState.currentIdiom.answer}</h4>
                <p><strong>释义：</strong>${gameState.currentIdiom.meaning}</p>
                <p><strong>出处：</strong>${gameState.currentIdiom.origin}</p>
            `;
            elements.idiomMeaning.innerHTML = meaningHtml;

            elements.feedback.classList.add('show');
            elements.nextBtn.style.display = 'inline-block';
        }

        // 开始倒计时
        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                elements.timer.textContent = gameState.timer;

                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    timeOut();
                }
            }, 1000);
        }

        // 超时处理
        function timeOut() {
            gameState.isPlaying = false;
            gameState.combo = 0;

            // 禁用所有选项
            const optionBtns = elements.options.querySelectorAll('.option-btn');
            optionBtns.forEach(b => b.disabled = true);

            // 显示正确答案
            optionBtns.forEach(b => {
                if (b.textContent === gameState.currentIdiom.answer) {
                    b.classList.add('correct');
                }
            });

            updateStats();
            showFeedback(false);
        }

        // 更新统计
        function updateStats() {
            elements.score.textContent = gameState.score;
            elements.combo.textContent = gameState.combo;
        }

        // 游戏结束
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);

            elements.playing.style.display = 'none';
            elements.gameOver.style.display = 'block';

            elements.finalScore.textContent = gameState.score;

            // 更新最高分
            const highScore = localStorage.getItem('kan-tu-cai-cheng-yu-high-score') || 0;
            if (gameState.score > highScore) {
                localStorage.setItem('kan-tu-cai-cheng-yu-high-score', gameState.score);
                elements.highScore.innerHTML = `<span class="new-record">新纪录！</span> 最高分: ${gameState.score}`;
            } else {
                elements.highScore.textContent = `最高分: ${highScore}`;
            }
        }

        // 事件监听
        elements.startBtn.addEventListener('click', startGame);
        elements.restartBtn.addEventListener('click', startGame);
        elements.nextBtn.addEventListener('click', nextQuestion);

        // 初始化
        initGame();
    </script>
</body>
</html>
