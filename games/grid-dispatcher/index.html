<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电网调度官：峰谷挑战</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #151f32;
      --panel-2: #1b2840;
      --line: #334765;
      --text: #ebf2ff;
      --muted: #9fb2cf;
      --ok: #60e7a9;
      --warn: #ffd47f;
      --bad: #ff8e98;
      --accent: #86b9ff;
      --chip: #223353;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(900px 460px at 12% -15%, #21375d 0%, transparent 55%),
        radial-gradient(900px 480px at 88% 120%, #223155 0%, transparent 55%),
        linear-gradient(180deg, #0b1220, #080e1a 70%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(21,31,50,.95), rgba(14,22,37,.97));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.16rem, 3.8vw, 1.62rem);
      letter-spacing: .3px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: .94rem;
    }

    .stats {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .k {
      color: var(--muted);
      font-size: .77rem;
      letter-spacing: .2px;
    }

    .v {
      margin-top: 4px;
      font-weight: 800;
      font-size: 1.04rem;
      font-variant-numeric: tabular-nums;
    }

    .scenario {
      margin-top: 12px;
      background: linear-gradient(180deg, #1b2740, #162134);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .scenario-top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .title-chip {
      background: var(--chip);
      border: 1px solid #425c87;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .83rem;
      color: #cfe1ff;
      font-weight: 700;
      white-space: nowrap;
    }

    .scenario-note {
      margin-top: 8px;
      color: #d4e0f5;
      font-size: .92rem;
      line-height: 1.45;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #2a3d60;
      color: var(--text);
      padding: 10px 13px;
      font-size: .93rem;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .ghost { background: #243651; }
    .danger { background: #5c3343; border-color: #7f4a5b; }

    .grid {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #152137;
    }

    .head, .row {
      display: grid;
      grid-template-columns: 1.2fr 1.4fr .9fr .9fr .95fr .95fr;
      gap: 8px;
      align-items: center;
      padding: 10px;
    }

    .head {
      background: #1a2943;
      color: #c7d8f5;
      font-size: .82rem;
      font-weight: 700;
      border-bottom: 1px solid #334b70;
    }

    .row {
      border-top: 1px solid #2c415f;
      min-height: 64px;
    }

    .src {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .src b { font-size: .92rem; }
    .src small { color: var(--muted); font-size: .77rem; }

    .slider-wrap {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      gap: 6px;
      align-items: center;
    }

    .mini {
      padding: 5px 0;
      font-size: .9rem;
      font-weight: 900;
      background: #31486f;
      border-radius: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .num {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-align: center;
      font-size: .92rem;
    }

    .result {
      margin-top: 10px;
      background: #192741;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font-size: .92rem;
      line-height: 1.5;
      color: #d8e6ff;
      min-height: 84px;
    }

    .bars {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meter {
      background: #162437;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
    }

    .meter label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 5px;
    }

    .bar {
      height: 11px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #344c6f;
      background: #0f1828;
    }

    .bar i {
      display: block;
      height: 100%;
      width: 60%;
      background: linear-gradient(90deg, #87d0ff, #7ea0ff);
      transition: width .25s ease;
    }

    .end {
      margin-top: 10px;
      background: #16253c;
      border: 1px dashed #4d668e;
      border-radius: 12px;
      padding: 10px;
      line-height: 1.55;
      font-size: .93rem;
      display: none;
    }

    .end.show { display: block; }

    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .bad { color: var(--bad); font-weight: 700; }

    @media (max-width: 920px) {
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .head, .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .head { display: none; }
      .row {
        padding: 10px;
        border-top: 1px solid #2f4464;
      }
      .bars { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>⚡ 电网调度官：峰谷挑战</h1>
    <p class="sub">你要在 8 个时段里平衡供需、预算与碳排。可调节 5 类电源出力，系统会按天气与事件结算实际供电，目标是稳定供电并拿高评级。</p>

    <section class="stats" aria-live="polite">
      <article class="stat"><div class="k">时段</div><div class="v" id="round">1 / 8</div></article>
      <article class="stat"><div class="k">总分</div><div class="v" id="score">0</div></article>
      <article class="stat"><div class="k">预算余额</div><div class="v" id="money">1600</div></article>
      <article class="stat"><div class="k">碳预算余额</div><div class="v" id="carbon">1200</div></article>
      <article class="stat"><div class="k">供电可靠性</div><div class="v" id="reliability">100</div></article>
      <article class="stat"><div class="k">平均偏差</div><div class="v" id="avgGap">0%</div></article>
    </section>

    <section class="scenario" id="scenario">
      <div class="scenario-top">
        <div class="title-chip" id="scenarioName">时段场景</div>
        <div class="title-chip" id="demandChip">需求：0 MW</div>
      </div>
      <div class="scenario-note" id="scenarioNote">-</div>
    </section>

    <section class="actions">
      <button id="autoBtn">自动分配（稳健）</button>
      <button id="runBtn">执行调度</button>
      <button id="nextBtn" class="ghost" disabled>下一时段</button>
      <button id="restartBtn" class="danger">重开战役</button>
    </section>

    <section class="grid">
      <div class="head">
        <div>电源</div>
        <div>出力调节</div>
        <div>计划(MW)</div>
        <div>预计实发</div>
        <div>成本</div>
        <div>碳排</div>
      </div>
      <div id="rows"></div>
    </section>

    <section class="result" id="result">准备就绪：请先调节各电源出力，再执行调度。</section>

    <section class="bars">
      <article class="meter">
        <label><span>本时段供需平衡</span><span id="balanceText">-</span></label>
        <div class="bar"><i id="balanceBar" style="width:50%"></i></div>
      </article>
      <article class="meter">
        <label><span>策略健康度</span><span id="healthText">-</span></label>
        <div class="bar"><i id="healthBar" style="width:0%"></i></div>
      </article>
    </section>

    <section class="end" id="end"></section>
  </main>

  <script>
    (() => {
      const MAX_ROUND = 8;

      const SOURCES = [
        { id: 'solar', name: '光伏', icon: '☀️', max: 90, cost: 2, emission: 0, hint: '低成本，受天气影响大' },
        { id: 'wind', name: '风电', icon: '🌬️', max: 80, cost: 3, emission: 0, hint: '零碳，波动明显' },
        { id: 'hydro', name: '水电', icon: '💧', max: 70, cost: 4, emission: 1, hint: '稳定调峰，中等成本' },
        { id: 'gas', name: '燃气', icon: '🔥', max: 110, cost: 6, emission: 4, hint: '响应快，成本较高' },
        { id: 'coal', name: '煤电', icon: '🪨', max: 140, cost: 5, emission: 7, hint: '大出力，高碳排' }
      ];

      const SCENARIOS = [
        {
          name: '晨间爬坡',
          demand: 220,
          note: '居民与工业负荷同步上升，需快速补足峰值。',
          mult: { solar: 0.75, wind: 0.9, hydro: 1, gas: 1, coal: 1 },
          uncertainty: { solar: 0.06, wind: 0.12 }
        },
        {
          name: '午间强光',
          demand: 210,
          note: '光照极佳，推荐提升新能源占比，压低成本与碳排。',
          mult: { solar: 1.28, wind: 0.95, hydro: 1, gas: 1, coal: 1 },
          uncertainty: { solar: 0.07, wind: 0.1 }
        },
        {
          name: '冷空气过境',
          demand: 250,
          note: '风力增强但波动更大，需准备稳定电源兜底。',
          mult: { solar: 0.7, wind: 1.3, hydro: 1, gas: 1, coal: 1 },
          uncertainty: { solar: 0.09, wind: 0.18 }
        },
        {
          name: '晚高峰',
          demand: 300,
          note: '全城用电高峰，要求供需误差尽量控制在 5% 以内。',
          mult: { solar: 0.42, wind: 0.88, hydro: 1, gas: 1.04, coal: 1.02 },
          uncertainty: { solar: 0.05, wind: 0.1 }
        },
        {
          name: '燃气检修',
          demand: 265,
          note: '燃气机组部分检修，可用上限下降 25%。',
          mult: { solar: 0.92, wind: 0.96, hydro: 1.06, gas: 0.75, coal: 1.03 },
          uncertainty: { solar: 0.06, wind: 0.12 },
          cap: { gas: 0.75 }
        },
        {
          name: '工业抢电',
          demand: 320,
          note: '临时大单接入，负荷突增，考验调峰策略。',
          mult: { solar: 0.68, wind: 0.86, hydro: 1.02, gas: 1.08, coal: 1.04 },
          uncertainty: { solar: 0.08, wind: 0.11 }
        },
        {
          name: '水位回升',
          demand: 245,
          note: '来水改善，水电可承担更多基荷。',
          mult: { solar: 0.95, wind: 0.92, hydro: 1.25, gas: 0.95, coal: 0.95 },
          uncertainty: { solar: 0.06, wind: 0.1 }
        },
        {
          name: '终局保供',
          demand: 340,
          note: '连续阴天 + 寒潮，终局压力测试。',
          mult: { solar: 0.35, wind: 0.78, hydro: 1.05, gas: 1.1, coal: 1.06 },
          uncertainty: { solar: 0.05, wind: 0.12 }
        }
      ];

      const E = {
        round: document.getElementById('round'),
        score: document.getElementById('score'),
        money: document.getElementById('money'),
        carbon: document.getElementById('carbon'),
        reliability: document.getElementById('reliability'),
        avgGap: document.getElementById('avgGap'),
        scenarioName: document.getElementById('scenarioName'),
        demandChip: document.getElementById('demandChip'),
        scenarioNote: document.getElementById('scenarioNote'),
        rows: document.getElementById('rows'),
        autoBtn: document.getElementById('autoBtn'),
        runBtn: document.getElementById('runBtn'),
        nextBtn: document.getElementById('nextBtn'),
        restartBtn: document.getElementById('restartBtn'),
        result: document.getElementById('result'),
        balanceText: document.getElementById('balanceText'),
        balanceBar: document.getElementById('balanceBar'),
        healthText: document.getElementById('healthText'),
        healthBar: document.getElementById('healthBar'),
        end: document.getElementById('end')
      };

      const state = {
        round: 1,
        score: 0,
        money: 1600,
        carbonUsed: 0,
        carbonCap: 1200,
        reliability: 100,
        gaps: [],
        plan: {},
        executed: false,
        history: []
      };

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function currentScenario() {
        return SCENARIOS[state.round - 1];
      }

      function sourceCap(src, scenario) {
        const ratio = scenario.cap?.[src.id] ?? 1;
        return Math.floor(src.max * ratio);
      }

      function initPlan() {
        const scenario = currentScenario();
        state.plan = {};
        SOURCES.forEach((src) => {
          state.plan[src.id] = Math.floor(sourceCap(src, scenario) * 0.2);
        });
        autoPlan();
      }

      function estimateForSource(src, scenario, val) {
        const mult = scenario.mult[src.id] ?? 1;
        const predicted = Math.round(val * mult);
        const cost = Math.round(val * src.cost);
        const emission = Math.round(predicted * src.emission);
        return { predicted, cost, emission, mult };
      }

      function totalEstimate() {
        const scenario = currentScenario();
        let supply = 0;
        let cost = 0;
        let emission = 0;

        for (const src of SOURCES) {
          const val = state.plan[src.id] || 0;
          const est = estimateForSource(src, scenario, val);
          supply += est.predicted;
          cost += est.cost;
          emission += est.emission;
        }

        return { supply, cost, emission };
      }

      function renderRows() {
        const scenario = currentScenario();
        E.rows.innerHTML = '';

        for (const src of SOURCES) {
          const val = state.plan[src.id] || 0;
          const cap = sourceCap(src, scenario);
          const est = estimateForSource(src, scenario, val);

          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div class="src">
              <b>${src.icon} ${src.name}</b>
              <small>${src.hint}（上限 ${cap} MW）</small>
            </div>
            <div class="slider-wrap">
              <button class="mini" data-act="minus" data-id="${src.id}">-</button>
              <input type="range" min="0" max="${cap}" step="1" value="${val}" data-id="${src.id}" />
              <button class="mini" data-act="plus" data-id="${src.id}">+</button>
            </div>
            <div class="num">${val}</div>
            <div class="num">${est.predicted}</div>
            <div class="num">${est.cost}</div>
            <div class="num">${est.emission}</div>
          `;

          E.rows.appendChild(row);
        }

        bindRowEvents();
      }

      function bindRowEvents() {
        E.rows.querySelectorAll('input[type="range"]').forEach((input) => {
          input.addEventListener('input', () => {
            const id = input.dataset.id;
            state.plan[id] = Number(input.value);
            renderRows();
            renderEstimateHint();
          });
        });

        E.rows.querySelectorAll('button.mini').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const src = SOURCES.find(s => s.id === id);
            const cap = sourceCap(src, currentScenario());
            const step = 5;
            if (btn.dataset.act === 'minus') {
              state.plan[id] = clamp((state.plan[id] || 0) - step, 0, cap);
            } else {
              state.plan[id] = clamp((state.plan[id] || 0) + step, 0, cap);
            }
            renderRows();
            renderEstimateHint();
          });
        });
      }

      function renderScenario() {
        const s = currentScenario();
        E.scenarioName.textContent = `场景：${s.name}`;
        E.demandChip.textContent = `需求：${s.demand} MW`;
        E.scenarioNote.textContent = `${s.note}（风光存在实时波动，执行时会结算实际发电）`;
      }

      function avgGapPct() {
        if (!state.gaps.length) return 0;
        return state.gaps.reduce((a, b) => a + b, 0) / state.gaps.length;
      }

      function renderStats() {
        E.round.textContent = `${Math.min(state.round, MAX_ROUND)} / ${MAX_ROUND}`;
        E.score.textContent = Math.round(state.score);
        E.money.textContent = Math.round(state.money);
        E.carbon.textContent = Math.round(state.carbonCap - state.carbonUsed);
        E.reliability.textContent = Math.round(state.reliability);
        E.avgGap.textContent = `${avgGapPct().toFixed(1)}%`;

        const est = totalEstimate();
        const demand = currentScenario().demand;
        const gapRate = Math.abs(est.supply - demand) / demand;
        const balancePct = clamp(100 - gapRate * 170, 0, 100);
        E.balanceBar.style.width = `${balancePct}%`;
        E.balanceText.textContent = `${est.supply} / ${demand} MW`;

        const health = clamp(
          (state.reliability * 0.5) +
          (clamp(state.money, -400, 1600) / 1600) * 30 +
          (clamp(state.carbonCap - state.carbonUsed, -300, 1200) / 1200) * 20,
          0,
          100
        );
        E.healthBar.style.width = `${health}%`;
        E.healthText.textContent = `${Math.round(health)} / 100`;

        E.runBtn.disabled = state.executed || state.round > MAX_ROUND;
        E.nextBtn.disabled = !state.executed || state.round > MAX_ROUND;
      }

      function renderEstimateHint() {
        const s = currentScenario();
        const est = totalEstimate();
        const diff = est.supply - s.demand;
        const sign = diff >= 0 ? '+' : '';
        const severity = Math.abs(diff) <= s.demand * 0.05 ? 'ok' : Math.abs(diff) <= s.demand * 0.12 ? 'warn' : 'bad';
        const cls = severity === 'ok' ? 'ok' : severity === 'warn' ? 'warn' : 'bad';

        E.result.innerHTML = [
          `计划预估：供电 <b>${est.supply} MW</b>，需求 <b>${s.demand} MW</b>，偏差 <span class="${cls}">${sign}${diff} MW</span>。`,
          `预计成本 <b>${est.cost}</b>，预计碳排 <b>${est.emission}</b>。点击“执行调度”进行实际结算。`
        ].join('<br>');
      }

      function autoPlan() {
        const s = currentScenario();
        const plan = {};
        SOURCES.forEach(src => plan[src.id] = 0);

        let target = s.demand;

        const order = [...SOURCES].sort((a, b) => {
          const wa = a.cost + a.emission * 0.45;
          const wb = b.cost + b.emission * 0.45;
          return wa - wb;
        });

        for (const src of order) {
          const cap = sourceCap(src, s);
          const mult = s.mult[src.id] ?? 1;
          if (mult <= 0.05) continue;
          const needed = Math.ceil(target / mult);
          const out = clamp(needed, 0, cap);
          plan[src.id] = out;
          target -= Math.round(out * mult);
          if (target <= 0) break;
        }

        if (target > 0) {
          for (const src of SOURCES) {
            const cap = sourceCap(src, s);
            const room = cap - plan[src.id];
            if (room <= 0) continue;
            const add = Math.min(room, Math.ceil(target / ((s.mult[src.id] ?? 1) || 1)));
            plan[src.id] += add;
            target -= Math.round(add * (s.mult[src.id] ?? 1));
            if (target <= 0) break;
          }
        }

        state.plan = plan;
      }

      function executeRound() {
        if (state.executed || state.round > MAX_ROUND) return;

        const s = currentScenario();
        const real = {};

        let supply = 0;
        let cost = 0;
        let emission = 0;

        for (const src of SOURCES) {
          const planVal = state.plan[src.id] || 0;
          const baseMult = s.mult[src.id] ?? 1;
          const uncertainty = s.uncertainty?.[src.id] ?? 0;
          const realMult = clamp(baseMult + rand(-uncertainty, uncertainty), 0.18, 1.65);

          const actual = Math.round(planVal * realMult);
          const srcCost = Math.round(planVal * src.cost);
          const srcEmission = Math.round(actual * src.emission);

          real[src.id] = { planVal, actual, realMult };
          supply += actual;
          cost += srcCost;
          emission += srcEmission;
        }

        const diff = supply - s.demand;
        const absRate = Math.abs(diff) / s.demand;

        let roundScore = 140 - absRate * 220 - cost * 0.05 - emission * 0.06;

        if (absRate <= 0.03) {
          roundScore += 28;
        } else if (absRate <= 0.08) {
          roundScore += 14;
        }

        if (diff < -s.demand * 0.15) {
          roundScore -= 36;
          state.reliability -= 12;
        } else if (diff > s.demand * 0.2) {
          roundScore -= 18;
          state.reliability -= 8;
        } else {
          state.reliability += (absRate <= 0.05 ? 2 : -absRate * 22);
        }

        state.reliability = clamp(state.reliability, 0, 100);

        state.money -= cost;
        state.carbonUsed += emission;
        state.score += Math.max(0, roundScore);
        state.gaps.push(absRate * 100);

        const tone = absRate <= 0.05 ? 'ok' : absRate <= 0.12 ? 'warn' : 'bad';

        const renewText = ['solar', 'wind']
          .map(id => {
            const it = real[id];
            return `${id === 'solar' ? '光伏' : '风电'}倍率 ${it.realMult.toFixed(2)}x`;
          })
          .join('，');

        E.result.innerHTML = [
          `实际结算：供电 <b>${supply} MW</b>，需求 <b>${s.demand} MW</b>，偏差 <span class="${tone}">${diff >= 0 ? '+' : ''}${diff} MW</span>。`,
          `${renewText}。本轮成本 <b>${cost}</b>，碳排 <b>${emission}</b>，得分 <b>${Math.max(0, roundScore).toFixed(1)}</b>。`
        ].join('<br>');

        state.history.push({
          round: state.round,
          name: s.name,
          demand: s.demand,
          supply,
          diff,
          cost,
          emission,
          score: Math.max(0, roundScore)
        });

        state.executed = true;

        if (isTerminalFail()) {
          finish(false);
          return;
        }

        renderStats();
      }

      function isTerminalFail() {
        return state.money < -120 || state.reliability <= 0 || (state.carbonUsed - state.carbonCap) > 180;
      }

      function nextRound() {
        if (!state.executed) return;

        if (state.round >= MAX_ROUND) {
          finish(true);
          return;
        }

        state.round += 1;
        state.executed = false;
        initPlan();
        renderScenario();
        renderRows();
        renderEstimateHint();
        renderStats();
      }

      function rating(success) {
        const rel = state.reliability;
        const moneyLeft = state.money;
        const carbonLeft = state.carbonCap - state.carbonUsed;

        if (success && rel >= 85 && moneyLeft >= 260 && carbonLeft >= 240) return 'S';
        if (success && rel >= 75 && moneyLeft >= 80 && carbonLeft >= 80) return 'A';
        if (success && rel >= 65 && moneyLeft >= -40 && carbonLeft >= -40) return 'B';
        if (success) return 'C';
        return 'D';
      }

      function finish(reachedEnd) {
        const success = reachedEnd && state.reliability >= 65 && state.money >= -40 && (state.carbonUsed <= state.carbonCap + 40);
        const rank = rating(success);

        E.end.classList.add('show');

        const rows = state.history
          .map(h => `时段${h.round} ${h.name}：供需差 ${h.diff >= 0 ? '+' : ''}${h.diff} MW，成本 ${h.cost}，碳排 ${h.emission}`)
          .join('<br>');

        E.end.innerHTML = success
          ? `
            <span class="ok">调度成功：你完成了 8 时段保供任务。</span><br>
            评级：<b>${rank}</b> ｜ 总分：<b>${Math.round(state.score)}</b> ｜ 可靠性：<b>${Math.round(state.reliability)}</b><br>
            预算余额：<b>${Math.round(state.money)}</b> ｜ 碳预算余额：<b>${Math.round(state.carbonCap - state.carbonUsed)}</b><br>
            <br><b>回合记录：</b><br>${rows}
          `
          : `
            <span class="bad">调度失败：系统稳定性未达标。</span><br>
            评级：<b>${rank}</b> ｜ 总分：<b>${Math.round(state.score)}</b> ｜ 可靠性：<b>${Math.round(state.reliability)}</b><br>
            预算余额：<b>${Math.round(state.money)}</b> ｜ 碳预算余额：<b>${Math.round(state.carbonCap - state.carbonUsed)}</b><br>
            建议：优先保证供需误差 < 8%，用水电/燃气稳住尖峰，控制煤电占比。<br>
            <br><b>回合记录：</b><br>${rows}
          `;

        E.runBtn.disabled = true;
        E.nextBtn.disabled = true;
        E.autoBtn.disabled = true;
      }

      function reset() {
        state.round = 1;
        state.score = 0;
        state.money = 1600;
        state.carbonUsed = 0;
        state.carbonCap = 1200;
        state.reliability = 100;
        state.gaps = [];
        state.plan = {};
        state.executed = false;
        state.history = [];

        E.end.classList.remove('show');
        E.end.innerHTML = '';
        E.autoBtn.disabled = false;
        E.runBtn.disabled = false;
        E.nextBtn.disabled = true;

        initPlan();
        renderScenario();
        renderRows();
        renderEstimateHint();
        renderStats();
      }

      E.autoBtn.addEventListener('click', () => {
        if (state.executed) return;
        autoPlan();
        renderRows();
        renderEstimateHint();
        renderStats();
      });

      E.runBtn.addEventListener('click', executeRound);
      E.nextBtn.addEventListener('click', nextRound);
      E.restartBtn.addEventListener('click', reset);

      reset();
    })();
  </script>
</body>
</html>
