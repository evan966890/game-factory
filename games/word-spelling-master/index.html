<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>单词拼写大师</title>
  <style>
    :root {
      --bg: #f6fbff;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5b7188;
      --primary: #0a7d8c;
      --primary-dark: #075a65;
      --ok: #137f3f;
      --bad: #b23232;
      --border: #d9e6ef;
      --radius: 16px;
      --gold: #ffd700;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #e9f7ff 0%, var(--bg) 45%, #f3fff6 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(7, 90, 101, 0.12);
      padding: 18px;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0 0 6px;
      line-height: 1.25;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 16px;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius);
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .combo {
      color: var(--gold);
    }

    .time-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .time-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ok), var(--primary));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .time-fill.warning {
      background: linear-gradient(90deg, #ff6b6b, #ee5a24);
    }

    .emoji-container {
      text-align: center;
      padding: 24px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-hint {
      font-size: 4rem;
      line-height: 1.2;
    }

    .word-display {
      text-align: center;
      padding: 16px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 20px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .letter-slot {
      width: 40px;
      height: 50px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text);
      background: var(--card);
    }

    .letter-slot.filled {
      border-style: solid;
      border-color: var(--primary);
      background: rgba(10, 125, 140, 0.1);
    }

    .letter-slot.correct {
      border-color: var(--ok);
      background: rgba(19, 127, 63, 0.1);
      color: var(--ok);
    }

    .letter-slot.wrong {
      border-color: var(--bad);
      background: rgba(178, 50, 50, 0.1);
      color: var(--bad);
    }

    .letter-pool {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 16px;
      background: var(--bg);
      border-radius: var(--radius);
    }

    .letter-btn {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .letter-btn:hover {
      border-color: var(--primary);
      background: rgba(10, 125, 140, 0.05);
    }

    .letter-btn:active {
      transform: scale(0.95);
    }

    .letter-btn.used {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .letter-btn.correct {
      border-color: var(--ok);
      background: rgba(19, 127, 63, 0.1);
      color: var(--ok);
    }

    .letter-btn.wrong {
      border-color: var(--bad);
      background: rgba(178, 50, 50, 0.1);
      color: var(--bad);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(10, 125, 140, 0.3);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #c5d5e0;
    }

    .result-panel {
      display: none;
      text-align: center;
      padding: 20px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .result-panel.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .result-title {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .result-title.correct {
      color: var(--ok);
    }

    .result-title.wrong {
      color: var(--bad);
    }

    .word-meaning {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .word-pronunciation {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    .game-over {
      display: none;
      text-align: center;
      padding: 30px 20px;
    }

    .game-over.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .final-score {
      font-size: 3rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .high-score {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .new-record {
      color: var(--gold);
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @media (max-width: 400px) {
      .emoji-hint {
        font-size: 3rem;
      }
      
      .letter-slot {
        width: 32px;
        height: 40px;
        font-size: 1.2rem;
      }
      
      .letter-btn {
        width: 36px;
        height: 36px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>单词拼写大师</h1>
    <p class="subtitle">根据图片提示拼写英文单词</p>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">得分</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">连击</div>
        <div class="stat-value combo" id="combo">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">最高分</div>
        <div class="stat-value" id="highScore">0</div>
      </div>
    </div>
    
    <div class="time-bar">
      <div class="time-fill" id="timeFill"></div>
    </div>
    
    <div class="emoji-container">
      <div class="emoji-hint" id="emojiHint">🍎</div>
    </div>
    
    <div class="word-display" id="wordDisplay">
      <!-- Letter slots will be generated by JavaScript -->
    </div>
    
    <div class="letter-pool" id="letterPool">
      <!-- Letter buttons will be generated by JavaScript -->
    </div>
    
    <div class="action-buttons">
      <button class="btn btn-secondary" id="clearBtn">清除</button>
      <button class="btn btn-primary" id="submitBtn">提交</button>
    </div>
    
    <div class="result-panel" id="resultPanel">
      <div class="result-title" id="resultTitle">正确！</div>
      <div class="word-meaning" id="wordMeaning"></div>
      <div class="word-pronunciation" id="wordPronunciation"></div>
    </div>
    
    <div class="game-over" id="gameOver">
      <h2>游戏结束</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="high-score" id="highScoreDisplay">最高分：0</div>
      <button class="btn btn-primary" id="restartBtn">再来一局</button>
    </div>
  </div>

  <script>
    // 单词数据库
    const words = [
      { word: "apple", emoji: "🍎", meaning: "苹果", pronunciation: "/ˈæp.əl/" },
      { word: "banana", emoji: "🍌", meaning: "香蕉", pronunciation: "/bəˈnæn.ə/" },
      { word: "cat", emoji: "🐱", meaning: "猫", pronunciation: "/kæt/" },
      { word: "dog", emoji: "🐶", meaning: "狗", pronunciation: "/dɒɡ/" },
      { word: "elephant", emoji: "🐘", meaning: "大象", pronunciation: "/ˈel.ɪ.fənt/" },
      { word: "fish", emoji: "🐟", meaning: "鱼", pronunciation: "/fɪʃ/" },
      { word: "grape", emoji: "🍇", meaning: "葡萄", pronunciation: "/ɡreɪp/" },
      { word: "house", emoji: "🏠", meaning: "房子", pronunciation: "/haʊs/" },
      { word: "ice", emoji: "🧊", meaning: "冰", pronunciation: "/aɪs/" },
      { word: "juice", emoji: "🧃", meaning: "果汁", pronunciation: "/dʒuːs/" },
      { word: "kite", emoji: "🪁", meaning: "风筝", pronunciation: "/kaɪt/" },
      { word: "lion", emoji: "🦁", meaning: "狮子", pronunciation: "/ˈlaɪ.ən/" },
      { word: "moon", emoji: "🌙", meaning: "月亮", pronunciation: "/muːn/" },
      { word: "nest", emoji: "🪺", meaning: "鸟巢", pronunciation: "/nest/" },
      { word: "orange", emoji: "🍊", meaning: "橙子", pronunciation: "/ˈɒr.ɪndʒ/" },
      { word: "pencil", emoji: "✏️", meaning: "铅笔", pronunciation: "/ˈpen.səl/" },
      { word: "queen", emoji: "👑", meaning: "女王", pronunciation: "/kwiːn/" },
      { word: "rainbow", emoji: "🌈", meaning: "彩虹", pronunciation: "/ˈreɪn.bəʊ/" },
      { word: "sun", emoji: "☀️", meaning: "太阳", pronunciation: "/sʌn/" },
      { word: "tree", emoji: "🌳", meaning: "树", pronunciation: "/triː/" }
    ];

    // 游戏状态
    let gameState = {
      score: 0,
      combo: 0,
      timeLeft: 30,
      maxTime: 30,
      currentWord: null,
      letterPool: [],
      currentSpelling: [],
      isGameOver: false,
      highScore: parseInt(localStorage.getItem('word-spelling-master-highscore') || '0')
    };

    // DOM 元素
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const highScoreEl = document.getElementById('highScore');
    const timeFillEl = document.getElementById('timeFill');
    const emojiHintEl = document.getElementById('emojiHint');
    const wordDisplayEl = document.getElementById('wordDisplay');
    const letterPoolEl = document.getElementById('letterPool');
    const clearBtn = document.getElementById('clearBtn');
    const submitBtn = document.getElementById('submitBtn');
    const resultPanelEl = document.getElementById('resultPanel');
    const resultTitleEl = document.getElementById('resultTitle');
    const wordMeaningEl = document.getElementById('wordMeaning');
    const wordPronunciationEl = document.getElementById('wordPronunciation');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const highScoreDisplayEl = document.getElementById('highScoreDisplay');
    const restartBtn = document.getElementById('restartBtn');

    // 初始化游戏
    function initGame() {
      gameState.score = 0;
      gameState.combo = 0;
      gameState.timeLeft = gameState.maxTime;
      gameState.isGameOver = false;
      
      updateStats();
      loadNewQuestion();
      startTimer();
      
      gameOverEl.classList.remove('show');
      resultPanelEl.classList.remove('show');
    }

    // 更新统计显示
    function updateStats() {
      scoreEl.textContent = gameState.score;
      comboEl.textContent = gameState.combo;
      highScoreEl.textContent = gameState.highScore;
    }

    // 加载新题目
    function loadNewQuestion() {
      // 随机选择单词
      const randomIndex = Math.floor(Math.random() * words.length);
      gameState.currentWord = words[randomIndex];
      
      // 显示 emoji 提示
      emojiHintEl.textContent = gameState.currentWord.emoji;
      
      // 重置当前拼写
      gameState.currentSpelling = new Array(gameState.currentWord.word.length).fill('');
      
      // 生成字母池
      generateLetterPool();
      
      // 渲染单词显示区域
      renderWordDisplay();
      
      // 隐藏结果面板
      resultPanelEl.classList.remove('show');
    }

    // 生成字母池
    function generateLetterPool() {
      const word = gameState.currentWord.word;
      const letters = word.split('');
      
      // 添加一些随机干扰字母
      const alphabet = 'abcdefghijklmnopqrstuvwxyz';
      while (letters.length < 12) {
        const randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
        if (!letters.includes(randomLetter)) {
          letters.push(randomLetter);
        }
      }
      
      // 随机打乱字母顺序
      gameState.letterPool = shuffleArray(letters);
      
      // 渲染字母池
      renderLetterPool();
    }

    // 数组随机打乱
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    // 渲染单词显示区域
    function renderWordDisplay() {
      wordDisplayEl.innerHTML = '';
      
      for (let i = 0; i < gameState.currentWord.word.length; i++) {
        const slot = document.createElement('div');
        slot.className = 'letter-slot';
        slot.dataset.index = i;
        
        if (gameState.currentSpelling[i]) {
          slot.textContent = gameState.currentSpelling[i];
          slot.classList.add('filled');
        }
        
        slot.addEventListener('click', () => removeLetter(i));
        wordDisplayEl.appendChild(slot);
      }
    }

    // 渲染字母池
    function renderLetterPool() {
      letterPoolEl.innerHTML = '';
      
      gameState.letterPool.forEach((letter, index) => {
        const btn = document.createElement('button');
        btn.className = 'letter-btn';
        btn.textContent = letter;
        btn.dataset.index = index;
        
        // 检查这个字母是否已经被使用
        const usedCount = gameState.currentSpelling.filter(l => l === letter).length;
        const totalCount = gameState.currentWord.word.split('').filter(l => l === letter).length;
        if (usedCount >= totalCount) {
          btn.classList.add('used');
          btn.disabled = true;
        }
        
        btn.addEventListener('click', () => addLetter(letter, index));
        letterPoolEl.appendChild(btn);
      });
    }

    // 添加字母到拼写区域
    function addLetter(letter, poolIndex) {
      // 找到第一个空位
      const emptyIndex = gameState.currentSpelling.findIndex(l => l === '');
      if (emptyIndex === -1) return;
      
      gameState.currentSpelling[emptyIndex] = letter;
      
      // 更新显示
      renderWordDisplay();
      renderLetterPool();
    }

    // 从拼写区域移除字母
    function removeLetter(index) {
      if (!gameState.currentSpelling[index]) return;
      
      gameState.currentSpelling[index] = '';
      
      // 更新显示
      renderWordDisplay();
      renderLetterPool();
    }

    // 清除所有字母
    clearBtn.addEventListener('click', () => {
      gameState.currentSpelling = new Array(gameState.currentWord.word.length).fill('');
      renderWordDisplay();
      renderLetterPool();
    });

    // 提交答案
    submitBtn.addEventListener('click', () => {
      if (gameState.isGameOver) return;
      
      const userAnswer = gameState.currentSpelling.join('');
      const correctAnswer = gameState.currentWord.word;
      
      const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
      
      // 禁用所有按钮
      submitBtn.disabled = true;
      clearBtn.disabled = true;
      
      // 标记正确/错误
      if (isCorrect) {
        handleCorrectAnswer();
      } else {
        handleWrongAnswer();
      }
      
      // 显示结果
      showResult(isCorrect);
      
      // 2秒后加载下一题或结束游戏
      setTimeout(() => {
        if (!gameState.isGameOver) {
          submitBtn.disabled = false;
          clearBtn.disabled = false;
          loadNewQuestion();
        }
      }, 2000);
    });

    // 处理正确答案
    function handleCorrectAnswer() {
      gameState.combo++;
      const baseScore = 10;
      const comboBonus = gameState.combo * 5;
      const totalScore = baseScore + comboBonus;
      gameState.score += totalScore;
      
      // 增加时间奖励
      gameState.timeLeft = Math.min(gameState.timeLeft + 3, gameState.maxTime);
      
      updateStats();
    }

    // 处理错误答案
    function handleWrongAnswer() {
      gameState.combo = 0;
      updateStats();
    }

    // 显示结果
    function showResult(isCorrect) {
      resultTitleEl.textContent = isCorrect ? '正确！' : '错误！';
      resultTitleEl.className = `result-title ${isCorrect ? 'correct' : 'wrong'}`;
      wordMeaningEl.textContent = `${gameState.currentWord.word} - ${gameState.currentWord.meaning}`;
      wordPronunciationEl.textContent = `发音：${gameState.currentWord.pronunciation}`;
      resultPanelEl.classList.add('show');
    }

    // 开始计时器
    function startTimer() {
      const timer = setInterval(() => {
        if (gameState.isGameOver) {
          clearInterval(timer);
          return;
        }
        
        gameState.timeLeft--;
        updateTimeBar();
        
        if (gameState.timeLeft <= 0) {
          clearInterval(timer);
          endGame();
        }
      }, 1000);
    }

    // 更新时间条
    function updateTimeBar() {
      const percentage = (gameState.timeLeft / gameState.maxTime) * 100;
      timeFillEl.style.width = `${percentage}%`;
      
      if (percentage <= 30) {
        timeFillEl.classList.add('warning');
      } else {
        timeFillEl.classList.remove('warning');
      }
    }

    // 结束游戏
    function endGame() {
      gameState.isGameOver = true;
      
      // 更新最高分
      if (gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem('word-spelling-master-highscore', gameState.highScore.toString());
        highScoreDisplayEl.innerHTML = `最高分：<span class="new-record">${gameState.highScore} 🎉 新纪录！</span>`;
      } else {
        highScoreDisplayEl.textContent = `最高分：${gameState.highScore}`;
      }
      
      finalScoreEl.textContent = gameState.score;
      gameOverEl.classList.add('show');
    }

    // 重新开始游戏
    restartBtn.addEventListener('click', initGame);

    // 启动游戏
    initGame();
  </script>
</body>
</html>
