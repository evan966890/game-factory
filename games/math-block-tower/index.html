<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学方块塔 - Math Block Tower</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-area {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #f0f4ff 0%, #e6eeff 100%);
            overflow: hidden;
        }

        .tower {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        .block {
            width: 80%;
            max-width: 200px;
            height: 30px;
            border-radius: 5px;
            margin: 2px 0;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .block.perfect {
            animation: perfectPulse 0.5s ease;
        }

        @keyframes perfectPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .current-block {
            position: absolute;
            width: 80%;
            max-width: 200px;
            height: 30px;
            border-radius: 5px;
            background: #ff6b6b;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: left 0.1s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            animation: fadeInOut 2s ease infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 300px;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .math-question {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            color: #667eea;
        }

        .math-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
        }

        .math-input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 10px;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-over.active {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 350px;
        }

        .game-over-title {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .high-score {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .achievements {
            margin: 20px 0;
            text-align: left;
        }

        .achievement {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }

        .achievement.unlocked {
            background: #d4edda;
            color: #155724;
        }

        .achievement-icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .combo-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
        }

        .combo-display.active {
            display: block;
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .difficulty-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">数学方块塔</div>
            <div class="score-display">
                <div class="score-item">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">高度</div>
                    <div class="score-value" id="height">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="high-score">0</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="game-area">
            <div class="tower" id="tower"></div>
            <div class="current-block" id="current-block">点击放置</div>
            <div class="instructions" id="instructions">点击屏幕放置方块</div>
            <div class="combo-display" id="combo-display">连击 x1</div>
            <div class="difficulty-badge" id="difficulty-badge">加法</div>
        </div>

        <div class="modal" id="math-modal">
            <div class="modal-content">
                <div class="modal-title">数学挑战！</div>
                <div class="math-question" id="math-question">5 + 3 = ?</div>
                <input type="number" class="math-input" id="math-input" placeholder="输入答案" autofocus>
                <button class="btn btn-primary" id="submit-answer">提交答案</button>
            </div>
        </div>

        <div class="game-over" id="game-over">
            <div class="game-over-content">
                <div class="game-over-title">游戏结束</div>
                <div class="final-score" id="final-score">0</div>
                <div class="high-score" id="final-high-score">最高分: 0</div>
                <div class="achievements" id="achievements"></div>
                <button class="btn btn-primary" id="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            score: 0,
            height: 0,
            highScore: 0,
            combo: 0,
            difficulty: 0, // 0: 加法, 1: 减法, 2: 乘法, 3: 除法
            blocks: [],
            currentBlock: null,
            isPlaying: false,
            isPaused: false,
            achievements: {
                height50: false,
                correct50: false,
                perfect10: false,
                combo5: false
            },
            correctAnswers: 0,
            perfectPlacements: 0
        };

        // DOM 元素
        const elements = {
            tower: document.getElementById('tower'),
            currentBlock: document.getElementById('current-block'),
            instructions: document.getElementById('instructions'),
            score: document.getElementById('score'),
            height: document.getElementById('height'),
            highScore: document.getElementById('high-score'),
            comboDisplay: document.getElementById('combo-display'),
            difficultyBadge: document.getElementById('difficulty-badge'),
            mathModal: document.getElementById('math-modal'),
            mathQuestion: document.getElementById('math-question'),
            mathInput: document.getElementById('math-input'),
            submitAnswer: document.getElementById('submit-answer'),
            gameOver: document.getElementById('game-over'),
            finalScore: document.getElementById('final-score'),
            finalHighScore: document.getElementById('final-high-score'),
            achievements: document.getElementById('achievements'),
            restartBtn: document.getElementById('restart-btn'),
            gameArea: document.getElementById('game-area')
        };

        // 颜色渐变
        const colors = [
            '#ff6b6b', '#ff8e72', '#ffb347', '#ffd93d', '#6bcb77',
            '#4d96ff', '#6c5ce7', '#a29bfe', '#fd79a8', '#e84393'
        ];

        // 初始化游戏
        function initGame() {
            loadHighScore();
            resetGame();
            startGame();
        }

        // 重置游戏状态
        function resetGame() {
            gameState.score = 0;
            gameState.height = 0;
            gameState.combo = 0;
            gameState.difficulty = 0;
            gameState.blocks = [];
            gameState.isPlaying = false;
            gameState.isPaused = false;
            gameState.correctAnswers = 0;
            gameState.perfectPlacements = 0;
            
            elements.tower.innerHTML = '';
            elements.currentBlock.style.display = 'flex';
            elements.instructions.style.display = 'block';
            elements.mathModal.classList.remove('active');
            elements.gameOver.classList.remove('active');
            
            updateDisplay();
            updateDifficultyBadge();
        }

        // 开始游戏
        function startGame() {
            gameState.isPlaying = true;
            createCurrentBlock();
            animateCurrentBlock();
        }

        // 创建当前方块
        function createCurrentBlock() {
            const block = document.createElement('div');
            block.className = 'current-block';
            block.id = 'current-block';
            block.textContent = '点击放置';
            block.style.backgroundColor = colors[gameState.height % colors.length];
            block.style.top = '50px';
            block.style.left = '0px';
            
            elements.gameArea.appendChild(block);
            elements.currentBlock = block;
            
            // 添加点击事件
            block.addEventListener('click', placeBlock);
            elements.gameArea.addEventListener('click', (e) => {
                if (e.target === elements.gameArea) {
                    placeBlock();
                }
            });
        }

        // 动画当前方块
        let animationId;
        let direction = 1;
        let position = 0;
        const speed = 3;

        function animateCurrentBlock() {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            const gameAreaWidth = elements.gameArea.offsetWidth;
            const blockWidth = elements.currentBlock.offsetWidth;
            const maxX = gameAreaWidth - blockWidth;
            
            position += direction * speed;
            
            if (position <= 0) {
                position = 0;
                direction = 1;
            } else if (position >= maxX) {
                position = maxX;
                direction = -1;
            }
            
            elements.currentBlock.style.left = position + 'px';
            animationId = requestAnimationFrame(animateCurrentBlock);
        }

        // 放置方块
        function placeBlock() {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            cancelAnimationFrame(animationId);
            
            const lastBlock = gameState.blocks[gameState.blocks.length - 1];
            const currentLeft = position;
            const currentWidth = elements.currentBlock.offsetWidth;
            const gameAreaWidth = elements.gameArea.offsetWidth;
            
            // 计算对齐度
            let alignment = 1;
            if (lastBlock) {
                const lastLeft = lastBlock.left;
                const lastWidth = lastBlock.width;
                const overlap = Math.min(currentLeft + currentWidth, lastLeft + lastWidth) - 
                               Math.max(currentLeft, lastLeft);
                const minWidth = Math.min(currentWidth, lastWidth);
                alignment = Math.max(0, overlap / minWidth);
            }
            
            // 计算分数
            let points = Math.floor(10 * alignment);
            if (alignment >= 0.9) {
                points *= 2;
                gameState.perfectPlacements++;
                elements.currentBlock.classList.add('perfect');
                setTimeout(() => elements.currentBlock.classList.remove('perfect'), 500);
            }
            
            gameState.score += points;
            gameState.height++;
            
            // 更新连击
            if (alignment >= 0.8) {
                gameState.combo++;
                if (gameState.combo > 1) {
                    elements.comboDisplay.textContent = `连击 x${gameState.combo}`;
                    elements.comboDisplay.classList.add('active');
                }
            } else {
                gameState.combo = 0;
                elements.comboDisplay.classList.remove('active');
            }
            
            // 添加方块到塔
            const blockData = {
                left: currentLeft,
                width: currentWidth,
                color: colors[gameState.height % colors.length],
                alignment: alignment
            };
            gameState.blocks.push(blockData);
            
            // 创建方块元素
            const blockElement = document.createElement('div');
            blockElement.className = 'block';
            blockElement.style.backgroundColor = blockData.color;
            blockElement.style.width = blockData.width + 'px';
            blockElement.style.marginLeft = blockData.left + 'px';
            blockElement.textContent = gameState.height;
            
            elements.tower.appendChild(blockElement);
            
            // 检查是否需要弹出数学题
            if (gameState.height % 5 === 0) {
                showMathQuestion();
            } else {
                // 创建新方块
                createCurrentBlock();
                animateCurrentBlock();
            }
            
            updateDisplay();
            checkAchievements();
        }

        // 显示数学题
        function showMathQuestion() {
            gameState.isPaused = true;
            
            const question = generateMathQuestion();
            elements.mathQuestion.textContent = question.text;
            elements.mathInput.value = '';
            elements.mathModal.classList.add('active');
            elements.mathInput.focus();
            
            // 存储正确答案
            elements.mathInput.dataset.answer = question.answer;
        }

        // 生成数学题
        function generateMathQuestion() {
            const difficulty = gameState.difficulty;
            let num1, num2, operator, answer;
            
            switch (difficulty) {
                case 0: // 加法
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    operator = '+';
                    answer = num1 + num2;
                    break;
                case 1: // 减法
                    num1 = Math.floor(Math.random() * 10) + 5;
                    num2 = Math.floor(Math.random() * num1);
                    operator = '-';
                    answer = num1 - num2;
                    break;
                case 2: // 乘法
                    num1 = Math.floor(Math.random() * 5) + 1;
                    num2 = Math.floor(Math.random() * 5) + 1;
                    operator = '×';
                    answer = num1 * num2;
                    break;
                case 3: // 除法
                    num2 = Math.floor(Math.random() * 5) + 1;
                    answer = Math.floor(Math.random() * 5) + 1;
                    num1 = num2 * answer;
                    operator = '÷';
                    break;
            }
            
            return {
                text: `${num1} ${operator} ${num2} = ?`,
                answer: answer
            };
        }

        // 提交答案
        function submitAnswer() {
            const userAnswer = parseInt(elements.mathInput.value);
            const correctAnswer = parseInt(elements.mathInput.dataset.answer);
            
            if (userAnswer === correctAnswer) {
                // 答对
                gameState.correctAnswers++;
                const bonus = 50 * (gameState.difficulty + 1);
                gameState.score += bonus;
                
                // 显示奖励提示
                showBonus(`+${bonus} 奖励！`);
                
                // 更新难度
                updateDifficulty();
            } else {
                // 答错
                showBonus('答错了，继续努力！');
            }
            
            elements.mathModal.classList.remove('active');
            gameState.isPaused = false;
            
            // 创建新方块
            createCurrentBlock();
            animateCurrentBlock();
            
            updateDisplay();
            checkAchievements();
        }

        // 显示奖励提示
        function showBonus(text) {
            const bonus = document.createElement('div');
            bonus.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 20px 40px;
                border-radius: 10px;
                font-size: 24px;
                font-weight: bold;
                z-index: 1000;
                animation: fadeOut 1s ease forwards;
            `;
            bonus.textContent = text;
            elements.gameArea.appendChild(bonus);
            
            setTimeout(() => bonus.remove(), 1000);
        }

        // 更新难度
        function updateDifficulty() {
            const height = gameState.height;
            if (height >= 30) {
                gameState.difficulty = 3; // 除法
            } else if (height >= 20) {
                gameState.difficulty = 2; // 乘法
            } else if (height >= 10) {
                gameState.difficulty = 1; // 减法
            } else {
                gameState.difficulty = 0; // 加法
            }
            
            updateDifficultyBadge();
        }

        // 更新难度标签
        function updateDifficultyBadge() {
            const difficulties = ['加法', '减法', '乘法', '除法'];
            elements.difficultyBadge.textContent = difficulties[gameState.difficulty];
        }

        // 更新显示
        function updateDisplay() {
            elements.score.textContent = gameState.score;
            elements.height.textContent = gameState.height;
            elements.highScore.textContent = gameState.highScore;
        }

        // 检查成就
        function checkAchievements() {
            if (gameState.height >= 50 && !gameState.achievements.height50) {
                gameState.achievements.height50 = true;
                showAchievement('🏗️ 建筑大师', '堆叠达到 50 层');
            }
            
            if (gameState.correctAnswers >= 50 && !gameState.achievements.correct50) {
                gameState.achievements.correct50 = true;
                showAchievement('🧮 数学天才', '答对 50 道题');
            }
            
            if (gameState.perfectPlacements >= 10 && !gameState.achievements.perfect10) {
                gameState.achievements.perfect10 = true;
                showAchievement('🎯 完美主义', '完美放置 10 次');
            }
            
            if (gameState.combo >= 5 && !gameState.achievements.combo5) {
                gameState.achievements.combo5 = true;
                showAchievement('🔥 连击高手', '达成 5 连击');
            }
        }

        // 显示成就
        function showAchievement(icon, text) {
            const achievement = document.createElement('div');
            achievement.style.cssText = `
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 25px;
                font-weight: bold;
                z-index: 1000;
                animation: slideDown 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            `;
            achievement.innerHTML = `${icon} ${text}`;
            elements.gameArea.appendChild(achievement);
            
            setTimeout(() => achievement.remove(), 3000);
        }

        // 游戏结束
        function gameOver() {
            gameState.isPlaying = false;
            cancelAnimationFrame(animationId);
            
            // 更新最高分
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                saveHighScore();
            }
            
            // 显示游戏结束界面
            elements.finalScore.textContent = gameState.score;
            elements.finalHighScore.textContent = `最高分: ${gameState.highScore}`;
            
            // 显示成就
            let achievementsHTML = '';
            if (gameState.achievements.height50) {
                achievementsHTML += '<div class="achievement unlocked"><span class="achievement-icon">🏗️</span>建筑大师</div>';
            }
            if (gameState.achievements.correct50) {
                achievementsHTML += '<div class="achievement unlocked"><span class="achievement-icon">🧮</span>数学天才</div>';
            }
            if (gameState.achievements.perfect10) {
                achievementsHTML += '<div class="achievement unlocked"><span class="achievement-icon">🎯</span>完美主义</div>';
            }
            if (gameState.achievements.combo5) {
                achievementsHTML += '<div class="achievement unlocked"><span class="achievement-icon">🔥</span>连击高手</div>';
            }
            
            if (achievementsHTML) {
                elements.achievements.innerHTML = '<h3>解锁成就</h3>' + achievementsHTML;
            } else {
                elements.achievements.innerHTML = '<p>继续努力解锁成就！</p>';
            }
            
            elements.gameOver.classList.add('active');
        }

        // 保存最高分
        function saveHighScore() {
            localStorage.setItem('mathBlockTower_highScore', gameState.highScore);
            localStorage.setItem('mathBlockTower_achievements', JSON.stringify(gameState.achievements));
        }

        // 加载最高分
        function loadHighScore() {
            const savedHighScore = localStorage.getItem('mathBlockTower_highScore');
            const savedAchievements = localStorage.getItem('mathBlockTower_achievements');
            
            if (savedHighScore) {
                gameState.highScore = parseInt(savedHighScore);
            }
            
            if (savedAchievements) {
                gameState.achievements = JSON.parse(savedAchievements);
            }
        }

        // 事件监听
        elements.submitAnswer.addEventListener('click', submitAnswer);
        elements.mathInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
        elements.restartBtn.addEventListener('click', () => {
            resetGame();
            startGame();
        });

        // 添加 CSS 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); }
                to { transform: translate(-50%, 0); }
            }
        `;
        document.head.appendChild(style);

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
