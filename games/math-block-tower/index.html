<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>数学方块塔</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #eaeaea;
      --muted: #a0a0a0;
      --primary: #0f3460;
      --primary-dark: #0a2647;
      --ok: #4ecca3;
      --bad: #e94560;
      --border: #2a2a4a;
      --radius: 16px;
      --block-size: 60px;
      --tower-width: 200px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      overflow: hidden;
    }

    .header {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .score-display {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .score-label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .score-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--ok);
    }

    .high-score {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .game-area {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 60vh;
      min-height: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
    }

    .tower {
      position: relative;
      width: var(--tower-width);
      height: 100%;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
    }

    .block {
      width: var(--block-size);
      height: var(--block-size);
      border-radius: 8px;
      position: absolute;
      transition: transform 0.1s ease-out;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .block.falling {
      animation: fall 0.5s ease-in;
    }

    @keyframes fall {
      from { transform: translateY(-100px); }
      to { transform: translateY(0); }
    }

    .block.perfect {
      animation: perfect 0.3s ease-out;
    }

    @keyframes perfect {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .block.miss {
      animation: miss 0.3s ease-out;
    }

    @keyframes miss {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    .current-block {
      position: absolute;
      top: 20px;
      width: var(--block-size);
      height: var(--block-size);
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .current-block:hover {
      transform: scale(1.05);
    }

    .current-block:active {
      transform: scale(0.95);
    }

    .instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      pointer-events: none;
    }

    /* Math Question Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h2 {
      margin: 0 0 16px;
      color: var(--ok);
    }

    .question {
      font-size: 2rem;
      font-weight: bold;
      margin: 20px 0;
      color: var(--text);
    }

    .answer-input {
      width: 100%;
      padding: 12px;
      font-size: 1.5rem;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--primary);
      color: var(--text);
      margin-bottom: 16px;
    }

    .answer-input:focus {
      outline: none;
      border-color: var(--ok);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .reward-info {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Game Over Modal */
    .game-over-modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }

    .game-over-modal h2 {
      margin: 0 0 16px;
      color: var(--bad);
    }

    .final-score {
      font-size: 3rem;
      font-weight: bold;
      color: var(--ok);
      margin: 20px 0;
    }

    .high-score-display {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .restart-btn {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #4ecca3 0%, #2ecc71 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(78, 204, 163, 0.4);
    }

    /* Achievements Panel */
    .achievements-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      width: 200px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
    }

    .achievements-panel h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--ok);
    }

    .achievement {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px;
      background: var(--primary);
      border-radius: 8px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .achievement.unlocked {
      opacity: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .achievement-icon {
      width: 24px;
      height: 24px;
      margin-right: 8px;
      font-size: 1.2rem;
    }

    .achievement-text {
      font-size: 0.8rem;
      flex: 1;
    }

    .achievement-progress {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Difficulty Indicator */
    .difficulty-indicator {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 480px) {
      :root {
        --block-size: 50px;
        --tower-width: 180px;
      }
      
      .header {
        padding: 8px 12px;
      }
      
      .score-value {
        font-size: 1.2rem;
      }
      
      .achievements-panel {
        width: 160px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="score-display">
      <span class="score-label">分数</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="score-display">
      <span class="score-label">最高分</span>
      <span class="high-score" id="high-score">0</span>
    </div>
    <div class="score-display">
      <span class="score-label">层数</span>
      <span class="score-value" id="layers">0</span>
    </div>
  </div>

  <div class="game-area" id="game-area">
    <div class="difficulty-indicator" id="difficulty">加法</div>
    <div class="tower" id="tower"></div>
    <div class="current-block" id="current-block"></div>
    <div class="instructions">点击屏幕放置方块</div>
  </div>

  <!-- Math Question Modal -->
  <div class="modal-overlay" id="math-modal">
    <div class="modal">
      <h2>数学挑战</h2>
      <div class="question" id="question">5 + 3 = ?</div>
      <input type="number" class="answer-input" id="answer-input" placeholder="输入答案" autofocus>
      <button class="submit-btn" id="submit-answer">提交答案</button>
      <div class="reward-info">答对获得 2 倍分数奖励！</div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div class="modal-overlay" id="game-over-modal">
    <div class="game-over-modal">
      <h2>游戏结束</h2>
      <div class="final-score" id="final-score">0</div>
      <div class="high-score-display">最高分: <span id="final-high-score">0</span></div>
      <button class="restart-btn" id="restart-btn">再来一局</button>
    </div>
  </div>

  <!-- Achievements Panel -->
  <div class="achievements-panel" id="achievements-panel">
    <h3>🏆 成就</h3>
    <div id="achievements-list"></div>
  </div>

  <script>
    // Game State
    const state = {
      score: 0,
      highScore: 0,
      layers: 0,
      blocks: [],
      currentBlock: null,
      isPlaying: false,
      isPaused: false,
      difficulty: 'addition', // addition, subtraction, multiplication, division
      mathQuestionsAnswered: 0,
      achievements: {
        layers50: { name: '堆叠大师', desc: '堆叠 50 层', unlocked: false, progress: 0, target: 50 },
        questions50: { name: '数学天才', desc: '答对 50 题', unlocked: false, progress: 0, target: 50 },
        score1000: { name: '千分达人', desc: '达到 1000 分', unlocked: false, progress: 0, target: 1000 },
        perfect10: { name: '完美对齐', desc: '连续 10 次完美对齐', unlocked: false, progress: 0, target: 10 }
      },
      perfectStreak: 0
    };

    // DOM Elements
    const gameArea = document.getElementById('game-area');
    const tower = document.getElementById('tower');
    const currentBlockEl = document.getElementById('current-block');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const layersEl = document.getElementById('layers');
    const difficultyEl = document.getElementById('difficulty');
    const mathModal = document.getElementById('math-modal');
    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('answer-input');
    const submitAnswerBtn = document.getElementById('submit-answer');
    const gameOverModal = document.getElementById('game-over-modal');
    const finalScoreEl = document.getElementById('final-score');
    const finalHighScoreEl = document.getElementById('final-high-score');
    const restartBtn = document.getElementById('restart-btn');
    const achievementsList = document.getElementById('achievements-list');

    // Block colors based on difficulty
    const blockColors = {
      addition: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      subtraction: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
      multiplication: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
      division: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
    };

    // Difficulty names
    const difficultyNames = {
      addition: '加法',
      subtraction: '减法',
      multiplication: '乘法',
      division: '除法'
    };

    // Initialize game
    function init() {
      loadState();
      updateDisplay();
      renderAchievements();
      startGame();
    }

    // Load state from localStorage
    function loadState() {
      const saved = localStorage.getItem('math-block-tower-state');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.highScore = parsed.highScore || 0;
        state.achievements = parsed.achievements || state.achievements;
      }
    }

    // Save state to localStorage
    function saveState() {
      const toSave = {
        highScore: state.highScore,
        achievements: state.achievements
      };
      localStorage.setItem('math-block-tower-state', JSON.stringify(toSave));
    }

    // Start game
    function startGame() {
      state.score = 0;
      state.layers = 0;
      state.blocks = [];
      state.isPlaying = true;
      state.isPaused = false;
      state.difficulty = 'addition';
      state.mathQuestionsAnswered = 0;
      state.perfectStreak = 0;
      
      tower.innerHTML = '';
      updateDisplay();
      spawnNewBlock();
    }

    // Spawn new block
    function spawnNewBlock() {
      if (!state.isPlaying || state.isPaused) return;
      
      const block = document.createElement('div');
      block.className = 'block falling';
      block.style.background = blockColors[state.difficulty];
      block.style.left = '50%';
      block.style.transform = 'translateX(-50%)';
      block.style.bottom = `${state.layers * 60}px`;
      
      tower.appendChild(block);
      state.currentBlock = block;
      
      // Add click handler
      block.addEventListener('click', placeBlock);
      gameArea.addEventListener('click', placeBlock);
    }

    // Place block
    function placeBlock(e) {
      if (!state.isPlaying || state.isPaused || !state.currentBlock) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      const block = state.currentBlock;
      const towerRect = tower.getBoundingClientRect();
      const blockRect = block.getBoundingClientRect();
      
      // Calculate alignment
      const towerCenter = towerRect.left + towerRect.width / 2;
      const blockCenter = blockRect.left + blockRect.width / 2;
      const offset = Math.abs(blockCenter - towerCenter);
      const maxOffset = 30; // pixels
      
      let points = 0;
      let isPerfect = offset < 5;
      
      if (isPerfect) {
        points = 10;
        block.classList.add('perfect');
        state.perfectStreak++;
        checkAchievement('perfect10');
      } else if (offset < maxOffset) {
        points = Math.max(1, Math.floor(10 * (1 - offset / maxOffset)));
        block.classList.remove('falling');
        state.perfectStreak = 0;
      } else {
        // Miss - game over
        block.classList.add('miss');
        setTimeout(() => gameOver(), 300);
        return;
      }
      
      // Update state
      state.score += points;
      state.layers++;
      state.blocks.push(block);
      
      // Update achievements
      state.achievements.layers50.progress = state.layers;
      state.achievements.score1000.progress = state.score;
      checkAchievement('layers50');
      checkAchievement('score1000');
      
      // Check for math question
      if (state.layers % 5 === 0) {
        showMathQuestion();
      } else {
        spawnNewBlock();
      }
      
      updateDisplay();
      saveState();
    }

    // Show math question
    function showMathQuestion() {
      state.isPaused = true;
      mathModal.classList.add('active');
      answerInput.value = '';
      answerInput.focus();
      
      const question = generateQuestion();
      questionEl.textContent = question.text;
      questionEl.dataset.answer = question.answer;
    }

    // Generate math question based on difficulty
    function generateQuestion() {
      let a, b, operator, answer;
      
      switch (state.difficulty) {
        case 'addition':
          a = Math.floor(Math.random() * 20) + 1;
          b = Math.floor(Math.random() * 20) + 1;
          operator = '+';
          answer = a + b;
          break;
        case 'subtraction':
          a = Math.floor(Math.random() * 30) + 10;
          b = Math.floor(Math.random() * a) + 1;
          operator = '-';
          answer = a - b;
          break;
        case 'multiplication':
          a = Math.floor(Math.random() * 12) + 1;
          b = Math.floor(Math.random() * 12) + 1;
          operator = '×';
          answer = a * b;
          break;
        case 'division':
          b = Math.floor(Math.random() * 10) + 2;
          answer = Math.floor(Math.random() * 10) + 1;
          a = b * answer;
          operator = '÷';
          break;
      }
      
      return {
        text: `${a} ${operator} ${b} = ?`,
        answer: answer
      };
    }

    // Submit answer
    function submitAnswer() {
      const userAnswer = parseInt(answerInput.value);
      const correctAnswer = parseInt(questionEl.dataset.answer);
      
      if (userAnswer === correctAnswer) {
        // Correct answer - 2x score bonus
        const bonus = state.layers * 2;
        state.score += bonus;
        state.mathQuestionsAnswered++;
        state.achievements.questions50.progress = state.mathQuestionsAnswered;
        checkAchievement('questions50');
        
        // Show success feedback
        questionEl.textContent = '✓ 正确！';
        questionEl.style.color = 'var(--ok)';
      } else {
        // Wrong answer - no penalty
        questionEl.textContent = `✗ 答案是 ${correctAnswer}`;
        questionEl.style.color = 'var(--bad)';
      }
      
      // Update difficulty based on progress
      updateDifficulty();
      
      setTimeout(() => {
        mathModal.classList.remove('active');
        state.isPaused = false;
        spawnNewBlock();
      }, 1000);
      
      updateDisplay();
      saveState();
    }

    // Update difficulty based on layers
    function updateDifficulty() {
      if (state.layers >= 30) {
        state.difficulty = 'division';
      } else if (state.layers >= 20) {
        state.difficulty = 'multiplication';
      } else if (state.layers >= 10) {
        state.difficulty = 'subtraction';
      } else {
        state.difficulty = 'addition';
      }
      
      difficultyEl.textContent = difficultyNames[state.difficulty];
      currentBlockEl.style.background = blockColors[state.difficulty];
    }

    // Check achievement
    function checkAchievement(key) {
      const achievement = state.achievements[key];
      if (!achievement.unlocked && achievement.progress >= achievement.target) {
        achievement.unlocked = true;
        showAchievementNotification(achievement);
        renderAchievements();
      }
    }

    // Show achievement notification
    function showAchievementNotification(achievement) {
      // Simple notification - could be enhanced
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px 40px;
        border-radius: 16px;
        font-size: 1.2rem;
        z-index: 2000;
        animation: pop 0.5s ease-out;
      `;
      notification.textContent = `🏆 解锁成就: ${achievement.name}`;
      document.body.appendChild(notification);
      
      setTimeout(() => notification.remove(), 2000);
    }

    // Render achievements
    function renderAchievements() {
      achievementsList.innerHTML = '';
      
      for (const [key, achievement] of Object.entries(state.achievements)) {
        const div = document.createElement('div');
        div.className = `achievement ${achievement.unlocked ? 'unlocked' : ''}`;
        div.innerHTML = `
          <div class="achievement-icon">${achievement.unlocked ? '🏆' : '🔒'}</div>
          <div class="achievement-text">
            <div>${achievement.name}</div>
            <div class="achievement-progress">${achievement.progress}/${achievement.target}</div>
          </div>
        `;
        achievementsList.appendChild(div);
      }
    }

    // Update display
    function updateDisplay() {
      scoreEl.textContent = state.score;
      highScoreEl.textContent = state.highScore;
      layersEl.textContent = state.layers;
    }

    // Game over
    function gameOver() {
      state.isPlaying = false;
      
      // Update high score
      if (state.score > state.highScore) {
        state.highScore = state.score;
      }
      
      // Show game over modal
      finalScoreEl.textContent = state.score;
      finalHighScoreEl.textContent = state.highScore;
      gameOverModal.classList.add('active');
      
      saveState();
    }

    // Restart game
    function restartGame() {
      gameOverModal.classList.remove('active');
      startGame();
    }

    // Event listeners
    submitAnswerBtn.addEventListener('click', submitAnswer);
    answerInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
    restartBtn.addEventListener('click', restartGame);

    // Initialize
    init();
  </script>
</body>
</html>
