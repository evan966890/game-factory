<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学方块塔</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div id="score">分数: <span id="score-value">0</span></div>
            <div id="high-score">最高分: <span id="high-score-value">0</span></div>
            <div id="level">难度: <span id="level-value">1</span></div>
        </div>
        <div id="game-area">
            <div id="tower"></div>
            <div id="current-block"></div>
        </div>
        <div id="footer">
            <div id="achievements">成就: <span id="achievement-count">0</span></div>
            <button id="restart-btn">再来一局</button>
        </div>
    </div>

    <!-- 数学题模态框 -->
    <div id="math-modal" class="modal">
        <div class="modal-content">
            <h2>数学挑战</h2>
            <p id="math-question"></p>
            <input type="number" id="math-answer" placeholder="输入答案">
            <button id="submit-answer">提交</button>
            <p id="math-feedback"></p>
        </div>
    </div>

    <!-- 成就通知 -->
    <div id="achievement-notification" class="notification">
        <span id="achievement-text"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
