<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>动物餐厅</title>
  <style>
    :root {
      --bg: #f6fbff;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5b7188;
      --primary: #0a7d8c;
      --primary-dark: #075a65;
      --ok: #137f3f;
      --bad: #b23232;
      --border: #d9e6ef;
      --radius: 16px;
      --gold: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --orange: #f97316;
      --fish: #7dd3fc;
      --fish-dark: #0ea5e9;
      --star: #fcd34d;
      --star-dark: #f59e0b;
      --restaurant: #fef3c7;
      --restaurant-dark: #f59e0b;
      --garden: #d1fae5;
      --garden-dark: #10b981;
      --pond: #dbeafe;
      --pond-dark: #3b82f6;
      --terrace: #fce7f3;
      --terrace-dark: #ec4899;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #e9f7ff 0%, var(--bg) 45%, #f3fff6 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(7, 90, 101, 0.12);
      padding: 18px;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0 0 6px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      background: #f8fcff;
    }

    .stat .label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat .value {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .stat .value.fish {
      color: var(--fish-dark);
    }

    .stat .value.star {
      color: var(--star-dark);
    }

    .stat .value.green {
      color: var(--green);
    }

    .game-container {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #fcfeff;
    }

    .game-area {
      padding: 16px;
      min-height: 300px;
    }

    .restaurant {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--restaurant);
      margin-bottom: 16px;
    }

    .restaurant-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .restaurant-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .restaurant-item:hover {
      background: #e8f4f8;
      border-color: var(--primary);
    }

    .restaurant-item:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .restaurant-item .emoji {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .restaurant-item .name {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .restaurant-item .cost {
      font-size: 0.7rem;
      color: var(--fish-dark);
      font-weight: 700;
    }

    .customers {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--garden);
      margin-bottom: 16px;
    }

    .customers-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .customers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .customer {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .customer:hover {
      background: #e8f4f8;
      border-color: var(--primary);
    }

    .customer:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .customer .emoji {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .customer .name {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .customer .reward {
      font-size: 0.7rem;
      color: var(--fish-dark);
      font-weight: 700;
    }

    .facilities {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--pond);
      margin-bottom: 16px;
    }

    .facilities-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .facilities-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .facility {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .facility:hover {
      background: #e8f4f8;
      border-color: var(--primary);
    }

    .facility:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .facility .emoji {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .facility .name {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .facility .cost {
      font-size: 0.7rem;
      color: var(--fish-dark);
      font-weight: 700;
    }

    .scenes {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--terrace);
      margin-bottom: 16px;
    }

    .scenes-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .scenes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .scene {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .scene:hover {
      background: #e8f4f8;
      border-color: var(--primary);
    }

    .scene:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .scene .emoji {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .scene .name {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .scene .cost {
      font-size: 0.7rem;
      color: var(--fish-dark);
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    .btn.secondary {
      background: var(--fish-dark);
    }

    .btn.secondary:hover {
      background: #0284c7;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>动物餐厅</h1>
    <p class="subtitle">经营餐厅，服务动物顾客，收集小鱼干和星星</p>

    <div class="stats">
      <div class="stat">
        <span class="label">小鱼干</span>
        <span class="value fish" id="fish">0</span>
      </div>
      <div class="stat">
        <span class="label">星星</span>
        <span class="value star" id="stars">0</span>
      </div>
      <div class="stat">
        <span class="label">顾客</span>
        <span class="value green" id="customers">0</span>
      </div>
    </div>

    <div class="game-container">
      <div class="game-area">
        <div class="restaurant">
          <div class="restaurant-title">餐厅</div>
          <div class="restaurant-grid" id="restaurant"></div>
        </div>

        <div class="customers">
          <div class="customers-title">顾客</div>
          <div class="customers-grid" id="customers"></div>
        </div>

        <div class="facilities">
          <div class="facilities-title">设施</div>
          <div class="facilities-grid" id="facilities"></div>
        </div>

        <div class="scenes">
          <div class="scenes-title">场景</div>
          <div class="scenes-grid" id="scenes"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="advertiseBtn">宣传</button>
      <button class="btn secondary" id="resetBtn">重置</button>
    </div>
  </div>

  <script>
    // 游戏配置
    const config = {
      restaurant: [
        { id: 'table', name: '餐桌', emoji: '🪑', cost: 100, capacity: 2 },
        { id: 'kitchen', name: '厨房', emoji: '🍳', cost: 200, capacity: 1 },
        { id: 'counter', name: '柜台', emoji: '🧾', cost: 150, capacity: 1 },
        { id: 'decoration', name: '装饰', emoji: '🎨', cost: 300, capacity: 0 },
        { id: 'music', name: '音乐', emoji: '🎵', cost: 250, capacity: 0 },
        { id: 'lighting', name: '灯光', emoji: '💡', cost: 350, capacity: 0 }
      ],
      customers: [
        { id: 'cat', name: '猫咪', emoji: '🐱', reward: 10, time: 3 },
        { id: 'dog', name: '狗狗', emoji: '🐕', reward: 15, time: 4 },
        { id: 'rabbit', name: '兔子', emoji: '🐰', reward: 12, time: 3 },
        { id: 'bear', name: '熊', emoji: '🐻', reward: 20, time: 5 },
        { id: 'fox', name: '狐狸', emoji: '🦊', reward: 18, time: 4 },
        { id: 'panda', name: '熊猫', emoji: '🐼', reward: 25, time: 6 }
      ],
      facilities: [
        { id: 'garden', name: '花园', emoji: '🌸', cost: 500, effect: { stars: 1 } },
        { id: 'pond', name: '鱼塘', emoji: '🐟', cost: 600, effect: { fish: 5 } },
        { id: 'terrace', name: '露台', emoji: '🌅', cost: 700, effect: { stars: 2 } },
        { id: 'takeout', name: '外卖', emoji: '🛵', cost: 400, effect: { fish: 3 } },
        { id: 'selfservice', name: '自助', emoji: '🍽️', cost: 450, effect: { stars: 1 } },
        { id: 'bar', name: '酒吧', emoji: '🍸', cost: 550, effect: { fish: 4 } }
      ],
      scenes: [
        { id: 'restaurant', name: '餐厅', emoji: '🍽️', cost: 0, unlocked: true },
        { id: 'kitchen', name: '厨房', emoji: '🍳', cost: 200, unlocked: false },
        { id: 'selfservice', name: '自助', emoji: '🍽️', cost: 300, unlocked: false },
        { id: 'takeout', name: '外卖', emoji: '🛵', cost: 400, unlocked: false },
        { id: 'garden', name: '花园', emoji: '🌸', cost: 500, unlocked: false },
        { id: 'pond', name: '鱼塘', emoji: '🐟', cost: 600, unlocked: false },
        { id: 'terrace', name: '露台', emoji: '🌅', cost: 700, unlocked: false }
      ]
    };

    // 游戏状态
    let fish = 0;
    let stars = 0;
    let customers = 0;
    let restaurant = [];
    let facilities = [];
    let scenes = JSON.parse(JSON.stringify(config.scenes));
    let currentScene = 'restaurant';
    let gameLoop = null;

    // DOM 元素
    const fishEl = document.getElementById('fish');
    const starsEl = document.getElementById('stars');
    const customersEl = document.getElementById('customers');
    const restaurantEl = document.getElementById('restaurant');
    const customersEl = document.getElementById('customers');
    const facilitiesEl = document.getElementById('facilities');
    const scenesEl = document.getElementById('scenes');
    const advertiseBtn = document.getElementById('advertiseBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 初始化游戏
    function initGame() {
      fish = 0;
      stars = 0;
      customers = 0;
      restaurant = [];
      facilities = [];
      scenes = JSON.parse(JSON.stringify(config.scenes));
      currentScene = 'restaurant';

      // 加载保存的游戏
      loadGame();

      // 更新显示
      updateStats();
      updateRestaurant();
      updateCustomers();
      updateFacilities();
      updateScenes();

      // 开始游戏循环
      startGameLoop();
    }

    // 加载游戏
    function loadGame() {
      const saved = localStorage.getItem('dong-wu-can-ting');
      if (saved) {
        const data = JSON.parse(saved);
        fish = data.fish || 0;
        stars = data.stars || 0;
        customers = data.customers || 0;
        restaurant = data.restaurant || [];
        facilities = data.facilities || [];
        scenes = data.scenes || JSON.parse(JSON.stringify(config.scenes));
        currentScene = data.currentScene || 'restaurant';
      }
    }

    // 保存游戏
    function saveGame() {
      const data = {
        fish,
        stars,
        customers,
        restaurant,
        facilities,
        scenes,
        currentScene
      };
      localStorage.setItem('dong-wu-can-ting', JSON.stringify(data));
    }

    // 开始游戏循环
    function startGameLoop() {
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(() => {
        // 自动收集资源
        collectResources();
        updateStats();
        saveGame();
      }, 1000);
    }

    // 更新统计信息
    function updateStats() {
      fishEl.textContent = fish;
      starsEl.textContent = stars;
      customersEl.textContent = customers;
    }

    // 更新餐厅显示
    function updateRestaurant() {
      restaurantEl.innerHTML = '';
      config.restaurant.forEach(item => {
        const owned = restaurant.some(r => r.id === item.id);
        const canAfford = fish >= item.cost;

        const itemEl = document.createElement('div');
        itemEl.className = 'restaurant-item';
        itemEl.innerHTML = `
          <div class="emoji">${item.emoji}</div>
          <div class="name">${item.name}</div>
          <div class="cost">${item.cost}</div>
        `;
        if (!owned && canAfford) {
          itemEl.addEventListener('click', () => buyRestaurant(item));
        } else {
          itemEl.disabled = true;
        }
        restaurantEl.appendChild(itemEl);
      });
    }

    // 更新顾客显示
    function updateCustomers() {
      customersEl.innerHTML = '';
      config.customers.forEach(customer => {
        const canServe = restaurant.length > 0;

        const customerEl = document.createElement('div');
        customerEl.className = 'customer';
        customerEl.innerHTML = `
          <div class="emoji">${customer.emoji}</div>
          <div class="name">${customer.name}</div>
          <div class="reward">+${customer.reward}</div>
        `;
        if (canServe) {
          customerEl.addEventListener('click', () => serveCustomer(customer));
        } else {
          customerEl.disabled = true;
        }
        customersEl.appendChild(customerEl);
      });
    }

    // 更新设施显示
    function updateFacilities() {
      facilitiesEl.innerHTML = '';
      config.facilities.forEach(facility => {
        const owned = facilities.some(f => f.id === facility.id);
        const canAfford = fish >= facility.cost;

        const facilityEl = document.createElement('div');
        facilityEl.className = 'facility';
        facilityEl.innerHTML = `
          <div class="emoji">${facility.emoji}</div>
          <div class="name">${facility.name}</div>
          <div class="cost">${facility.cost}</div>
        `;
        if (!owned && canAfford) {
          facilityEl.addEventListener('click', () => buyFacility(facility));
        } else {
          facilityEl.disabled = true;
        }
        facilitiesEl.appendChild(facilityEl);
      });
    }

    // 更新场景显示
    function updateScenes() {
      scenesEl.innerHTML = '';
      scenes.forEach(scene => {
        const unlocked = scene.unlocked;
        const canAfford = fish >= scene.cost;

        const sceneEl = document.createElement('div');
        sceneEl.className = 'scene';
        sceneEl.innerHTML = `
          <div class="emoji">${scene.emoji}</div>
          <div class="name">${scene.name}</div>
          <div class="cost">${scene.cost}</div>
        `;
        if (!unlocked && canAfford) {
          sceneEl.addEventListener('click', () => unlockScene(scene));
        } else if (unlocked) {
          sceneEl.addEventListener('click', () => switchScene(scene));
        } else {
          sceneEl.disabled = true;
        }
        scenesEl.appendChild(sceneEl);
      });
    }

    // 购买餐厅
    function buyRestaurant(item) {
      if (fish >= item.cost) {
        fish -= item.cost;
        restaurant.push(item);
        updateStats();
        updateRestaurant();
        updateCustomers();
        saveGame();
        alert(`购买成功！获得 ${item.name}`);
      }
    }

    // 服务顾客
    function serveCustomer(customer) {
      if (restaurant.length > 0) {
        fish += customer.reward;
        customers++;
        updateStats();
        saveGame();
        alert(`服务成功！获得 ${customer.reward} 小鱼干`);
      }
    }

    // 购买设施
    function buyFacility(facility) {
      if (fish >= facility.cost) {
        fish -= facility.cost;
        facilities.push(facility);
        if (facility.effect.stars) stars += facility.effect.stars;
        if (facility.effect.fish) fish += facility.effect.fish;
        updateStats();
        updateFacilities();
        saveGame();
        alert(`购买成功！获得 ${facility.name}`);
      }
    }

    // 解锁场景
    function unlockScene(scene) {
      if (fish >= scene.cost) {
        fish -= scene.cost;
        scene.unlocked = true;
        updateStats();
        updateScenes();
        saveGame();
        alert(`解锁成功！获得 ${scene.name}`);
      }
    }

    // 切换场景
    function switchScene(scene) {
      if (scene.unlocked) {
        currentScene = scene.id;
        updateScenes();
        saveGame();
        alert(`切换成功！当前场景：${scene.name}`);
      }
    }

    // 收集资源
    function collectResources() {
      // 设施加成
      facilities.forEach(facility => {
        if (facility.effect.fish) fish += facility.effect.fish;
      });

      // 场景加成
      if (currentScene === 'garden') stars += 1;
      if (currentScene === 'pond') fish += 2;
      if (currentScene === 'terrace') stars += 2;
    }

    // 宣传
    function advertise() {
      // 随机招揽顾客
      const randomCustomer = config.customers[Math.floor(Math.random() * config.customers.length)];
      fish += randomCustomer.reward;
      customers++;
      updateStats();
      saveGame();
      alert(`宣传成功！招揽了 ${randomCustomer.name}，获得 ${randomCustomer.reward} 小鱼干`);
    }

    // 重置游戏
    function resetGame() {
      if (confirm('确定要重置游戏吗？所有进度将丢失。')) {
        localStorage.removeItem('dong-wu-can-ting');
        initGame();
      }
    }

    // 事件监听
    advertiseBtn.addEventListener('click', advertise);
    resetBtn.addEventListener('click', resetGame);

    // 开始游戏
    initGame();
  </script>
</body>
</html>
