<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>单词拼写挑战</title><style>body{margin:0;font-family:-apple-system,"PingFang SC",sans-serif;background:#f6fff8;color:#123;padding:16px}.app{max-width:680px;margin:auto;background:#fff;border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08)}h1{margin:0 0 6px}.muted{color:#567}.card{background:#eefaf1;border-radius:10px;padding:12px;margin:10px 0}.word{font-size:2rem;letter-spacing:.35rem;text-align:center;font-weight:700}.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}button{border:0;border-radius:10px;padding:10px;background:#22c55e;color:#fff;font-size:1rem}button.sec{background:#64748b}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.chip{background:#d1fae5;border-radius:8px;padding:6px 10px}.msg{min-height:24px;font-weight:700}.ok{color:#15803d}.bad{color:#b91c1c}</style></head><body><main class="app"><h1>单词拼写挑战</h1><div class="muted">根据中文提示，按顺序选择字母完成英文单词。</div><div class="card"><div id="cn"></div><div class="word" id="mask"></div></div><div class="chips" id="picked"></div><div class="opts" id="opts"></div><p class="msg" id="msg"></p><p>得分：<b id="score">0</b>｜题号：<b id="idx">1</b>/<b id="total">0</b></p><button id="next">下一题</button> <button class="sec" id="reset">重置</button></main><script>const Q=[['苹果','APPLE'],['猫','CAT'],['太阳','SUN'],['书','BOOK'],['水','WATER'],['学校','SCHOOL'],['老师','TEACHER'],['朋友','FRIEND']];let i=0,score=0,pick=[];const cn=cnEl=>document.getElementById(cnEl),pool=()=>{const ans=Q[i][1].split('');const extra='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').sort(()=>Math.random()-.5).slice(0,Math.max(2,8-ans.length));return [...ans,...extra].sort(()=>Math.random()-.5)};function render(){if(i>=Q.length)i=0;pick=[];const [z,w]=Q[i];cn('cn').textContent='提示：'+z;cn('mask').textContent='_ '.repeat(w.length).trim();cn('picked').innerHTML='';cn('msg').textContent='';cn('msg').className='msg';cn('score').textContent=score;cn('idx').textContent=i+1;cn('total').textContent=Q.length;const opts=cn('opts');opts.innerHTML='';pool().forEach(ch=>{const b=document.createElement('button');b.textContent=ch;b.onclick=()=>choose(ch,b);opts.appendChild(b)})}function choose(ch,b){b.disabled=true;b.style.opacity=.45;pick.push(ch);cn('picked').innerHTML=pick.map(x=>`<span class="chip">${x}</span>`).join('');const ans=Q[i][1];cn('mask').textContent=pick.concat(Array(ans.length-pick.length).fill('_')).join(' ');if(pick.length===ans.length){if(pick.join('')===ans){score+=10;cn('msg').textContent='正确！+10';cn('msg').className='msg ok'}else{cn('msg').textContent='不对，正确答案：'+ans;cn('msg').className='msg bad'}}cn('score').textContent=score}cn('next').onclick=()=>{i++;render()};cn('reset').onclick=()=>{i=0;score=0;render()};render();</script></body></html>
