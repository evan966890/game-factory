<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小数闯关小队</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --ok: #16a34a;
      --bad: #dc2626;
      --text: #1f2937;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #e8edff, #f8fbff);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .app {
      width: min(720px, 100%);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15);
      padding: 18px;
    }
    .title { margin: 0 0 8px; font-size: clamp(1.4rem, 4vw, 2rem); }
    .muted { color: var(--muted); margin: 0 0 14px; }
    .row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      background: #eef2ff;
      color: #312e81;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .card {
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fff;
    }
    .question {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      text-align: center;
      margin: 8px 0;
      letter-spacing: 1px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    @media (min-width: 640px) {
      .options { grid-template-columns: 1fr 1fr; }
    }
    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-size: 1rem;
    }
    .option {
      padding: 12px;
      background: #f8fafc;
      border: 2px solid #dbeafe;
      font-weight: 600;
      color: #1e3a8a;
      min-height: 52px;
    }
    .option:hover, .option:focus-visible {
      background: #eef2ff;
      border-color: #818cf8;
      outline: none;
    }
    .primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      margin-top: 8px;
    }
    .primary:hover { background: var(--primary-dark); }
    .feedback {
      min-height: 24px;
      font-weight: 700;
      text-align: center;
      margin: 10px 0;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .hidden { display: none; }
    .kbd {
      background: #111827;
      color: #fff;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 0.85rem;
    }
    .result-score {
      font-size: 2rem;
      text-align: center;
      margin: 8px 0 6px;
      color: #312e81;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <section id="startScreen">
      <h1 class="title">小数闯关小队</h1>
      <p class="muted">三年级数学挑战：完成 10 题小数加减法，看看你能拿几分！</p>
      <div class="card">
        <p>玩法：</p>
        <ul>
          <li>每题选择 1 个正确答案</li>
          <li>可点击选项，也可按键盘 <span class="kbd">1</span>~<span class="kbd">4</span> 作答</li>
          <li>答对得 10 分，满分 100 分</li>
        </ul>
      </div>
      <button id="startBtn" class="primary">开始闯关</button>
    </section>

    <section id="gameScreen" class="hidden">
      <div class="row">
        <span class="pill" id="progress">第 1 / 10 题</span>
        <span class="pill" id="score">得分：0</span>
      </div>
      <div class="card">
        <div id="question" class="question">0.3 + 0.2 = ?</div>
      </div>
      <div class="options" id="options"></div>
      <div id="feedback" class="feedback"></div>
    </section>

    <section id="resultScreen" class="hidden">
      <h2 class="title">闯关完成！</h2>
      <p class="result-score" id="finalScore">80 分</p>
      <p class="muted" id="resultText">你的小数计算很棒！</p>
      <button id="restartBtn" class="primary">再玩一次</button>
    </section>
  </main>

  <script>
    const TOTAL = 10;
    let current = 0;
    let score = 0;
    let questions = [];

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const finalScoreEl = document.getElementById('finalScore');
    const resultTextEl = document.getElementById('resultText');

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function toOneDecimal(n) {
      return Number((n / 10).toFixed(1));
    }

    function makeQuestion() {
      const a = toOneDecimal(randInt(1, 99));
      const b = toOneDecimal(randInt(1, 99));
      const useAdd = Math.random() < 0.5;

      let text, answer;
      if (useAdd) {
        answer = Number((a + b).toFixed(1));
        text = `${a.toFixed(1)} + ${b.toFixed(1)} = ?`;
      } else {
        const big = Math.max(a, b);
        const small = Math.min(a, b);
        answer = Number((big - small).toFixed(1));
        text = `${big.toFixed(1)} - ${small.toFixed(1)} = ?`;
      }

      const choices = new Set([answer]);
      while (choices.size < 4) {
        const delta = toOneDecimal(randInt(-15, 15));
        const candidate = Number((answer + delta).toFixed(1));
        if (candidate >= 0 && candidate !== answer) choices.add(candidate);
      }

      const options = Array.from(choices).sort(() => Math.random() - 0.5);
      return { text, answer, options };
    }

    function buildQuestions() {
      questions = Array.from({ length: TOTAL }, makeQuestion);
    }

    function showScreen(name) {
      startScreen.classList.toggle('hidden', name !== 'start');
      gameScreen.classList.toggle('hidden', name !== 'game');
      resultScreen.classList.toggle('hidden', name !== 'result');
    }

    function renderQuestion() {
      const q = questions[current];
      progressEl.textContent = `第 ${current + 1} / ${TOTAL} 题`;
      scoreEl.textContent = `得分：${score}`;
      questionEl.textContent = q.text;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      optionsEl.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = `${idx + 1}. ${opt.toFixed(1)}`;
        btn.addEventListener('click', () => chooseOption(idx));
        optionsEl.appendChild(btn);
      });
    }

    function chooseOption(idx) {
      const q = questions[current];
      const selected = q.options[idx];
      const correct = Number(selected.toFixed(1)) === Number(q.answer.toFixed(1));

      if (correct) {
        score += 10;
        feedbackEl.textContent = '✅ 回答正确！';
        feedbackEl.className = 'feedback ok';
      } else {
        feedbackEl.textContent = `❌ 正确答案是 ${q.answer.toFixed(1)}`;
        feedbackEl.className = 'feedback bad';
      }

      optionsEl.querySelectorAll('button').forEach((b) => b.disabled = true);
      scoreEl.textContent = `得分：${score}`;

      setTimeout(() => {
        current += 1;
        if (current >= TOTAL) return finishGame();
        renderQuestion();
      }, 700);
    }

    function finishGame() {
      showScreen('result');
      finalScoreEl.textContent = `${score} 分`;
      if (score >= 90) {
        resultTextEl.textContent = '太厉害了！你已经是小数计算高手！';
      } else if (score >= 70) {
        resultTextEl.textContent = '表现很不错，再练练就能满分！';
      } else {
        resultTextEl.textContent = '继续加油！多练几次会越来越快。';
      }
    }

    function startGame() {
      current = 0;
      score = 0;
      buildQuestions();
      showScreen('game');
      renderQuestion();
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () => {
      showScreen('start');
    });

    window.addEventListener('keydown', (e) => {
      if (gameScreen.classList.contains('hidden')) return;
      const key = Number(e.key);
      if (key >= 1 && key <= 4) {
        const btn = optionsEl.querySelectorAll('button')[key - 1];
        if (btn && !btn.disabled) btn.click();
      }
    });
  </script>
</body>
</html>
