<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>分数平衡实验室</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --ink: #1a2440;
      --muted: #5f6b8a;
      --good: #0f9d58;
      --bad: #d93025;
      --primary: #3367d6;
      --accent: #ffb300;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", sans-serif;
      background: linear-gradient(180deg, #eef4ff, #fefcff);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .app {
      width: min(760px, 100%);
      padding: 16px 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(26, 36, 64, 0.08);
    }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .hint { margin: 0; color: var(--muted); font-size: 0.95rem; line-height: 1.4; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      text-align: center;
    }
    .stat {
      background: #f8faff;
      border-radius: 10px;
      padding: 10px 6px;
    }
    .stat .label { color: var(--muted); font-size: 0.75rem; }
    .stat .value { font-weight: 700; font-size: 1.1rem; margin-top: 4px; }
    .balance-wrap {
      display: grid;
      gap: 10px;
      align-items: center;
    }
    .fractions {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      text-align: center;
    }
    .frac {
      display: inline-grid;
      grid-template-rows: auto 1px auto;
      justify-items: center;
      font-size: 2rem;
      font-weight: 700;
      min-width: 90px;
    }
    .frac .line {
      width: 64px;
      background: #27304a;
      height: 2px;
      margin: 5px 0;
    }
    .sign {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      min-width: 34px;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      background: #edf3ff;
      color: #1f325f;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--primary); color: white; }
    .feedback { min-height: 24px; font-weight: 700; }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .progress {
      height: 10px;
      border-radius: 999px;
      background: #e8eeff;
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4d7cff, #7c9dff);
      transition: width .2s ease;
    }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .frac { font-size: 1.7rem; min-width: 70px; }
      .sign { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>⚖️ 分数平衡实验室</h1>
      <p class="hint">判断左边分数和右边分数的大小关系，10 题一局。连对会触发加分奖励！</p>
    </section>

    <section class="card stats">
      <div class="stat"><div class="label">题目</div><div class="value" id="round">1/10</div></div>
      <div class="stat"><div class="label">得分</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">连对</div><div class="value" id="streak">0</div></div>
      <div class="stat"><div class="label">剩余秒数</div><div class="value" id="time">60</div></div>
    </section>

    <section class="card balance-wrap">
      <div class="fractions">
        <div class="frac" aria-label="左边分数"><span id="lNum">1</span><span class="line"></span><span id="lDen">2</span></div>
        <div class="sign">?</div>
        <div class="frac" aria-label="右边分数"><span id="rNum">3</span><span class="line"></span><span id="rDen">4</span></div>
      </div>

      <div class="choices">
        <button data-op="<">左边 &lt; 右边</button>
        <button data-op=">">左边 &gt; 右边</button>
        <button data-op="=">左边 = 右边</button>
        <button id="skip">跳过（-2 分）</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="progress"><div id="bar"></div></div>
      <div class="row">
        <button class="primary" id="restart">重新开始</button>
        <span class="hint">提示：交叉相乘能快速比较大小</span>
      </div>
    </section>
  </main>

  <script>
    const TOTAL = 10;
    let index = 0, score = 0, streak = 0, timeLeft = 60, timer = null, locked = false;
    let current = null;

    const el = id => document.getElementById(id);
    const lNum = el('lNum'), lDen = el('lDen'), rNum = el('rNum'), rDen = el('rDen');
    const round = el('round'), scoreEl = el('score'), streakEl = el('streak'), timeEl = el('time');
    const feedback = el('feedback'), bar = el('bar');

    function gcd(a,b){ while(b){ [a,b]=[b,a%b]; } return a; }
    function simplify(n,d){ const g=gcd(n,d); return [n/g,d/g]; }

    function randFrac() {
      let d = 2 + Math.floor(Math.random()*11);
      let n = 1 + Math.floor(Math.random()*(d*2-1));
      return simplify(n,d);
    }

    function relation(a,b,c,d){
      const left = a*d, right = c*b;
      return left === right ? '=' : (left > right ? '>' : '<');
    }

    function nextQuestion() {
      if (index >= TOTAL || timeLeft <= 0) return finish();
      locked = false;
      let a,b,c,d,rel;
      do {
        [a,b] = randFrac();
        [c,d] = randFrac();
        rel = relation(a,b,c,d);
      } while (a===c && b===d);
      current = {a,b,c,d,rel};
      lNum.textContent = a; lDen.textContent = b;
      rNum.textContent = c; rDen.textContent = d;
      round.textContent = `${index+1}/${TOTAL}`;
      bar.style.width = `${(index/TOTAL)*100}%`;
      feedback.textContent = '';
      feedback.className = 'feedback';
    }

    function applyAnswer(op){
      if (locked || !current) return;
      locked = true;
      const ok = op === current.rel;
      if (ok) {
        streak += 1;
        score += 10 + Math.min(10, streak * 2);
        feedback.textContent = `✅ 正确！奖励 ${10 + Math.min(10, streak * 2)} 分`;
        feedback.className = 'feedback good';
      } else {
        streak = 0;
        score = Math.max(0, score - 5);
        feedback.textContent = `❌ 答错了，正确答案是 “${current.rel}”`;
        feedback.className = 'feedback bad';
      }
      index += 1;
      refreshStats();
      setTimeout(nextQuestion, 650);
    }

    function skip(){
      if (locked || !current) return;
      streak = 0;
      score = Math.max(0, score - 2);
      feedback.textContent = '⏭ 已跳过，-2 分';
      feedback.className = 'feedback bad';
      index += 1;
      refreshStats();
      setTimeout(nextQuestion, 450);
    }

    function refreshStats(){
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      timeEl.textContent = timeLeft;
    }

    function finish(){
      clearInterval(timer);
      bar.style.width = '100%';
      const acc = Math.round((index / TOTAL) * 100);
      feedback.textContent = `🎉 结束！总分 ${score}，完成 ${index}/${TOTAL} 题`;
      feedback.className = 'feedback good';
      current = null;
    }

    function start(){
      clearInterval(timer);
      index = 0; score = 0; streak = 0; timeLeft = 60; locked = false;
      refreshStats();
      nextQuestion();
      timer = setInterval(() => {
        timeLeft -= 1;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) finish();
      }, 1000);
    }

    document.querySelectorAll('[data-op]').forEach(btn => {
      btn.addEventListener('click', () => applyAnswer(btn.dataset.op));
    });
    el('skip').addEventListener('click', skip);
    el('restart').addEventListener('click', start);

    start();
  </script>
</body>
</html>
