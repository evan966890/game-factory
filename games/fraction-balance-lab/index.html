<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>分数平衡实验室</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --ok:#22c55e; --bad:#ef4444; --text:#e5e7eb; --sub:#94a3b8; --accent:#38bdf8; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:linear-gradient(180deg,#0b1024,#111827);color:var(--text)}
    .wrap{max-width:760px;margin:0 auto;padding:16px}
    .card{background:rgba(17,24,39,.9);border:1px solid #263247;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
    h1{font-size:24px;margin:0 0 8px} .sub{color:var(--sub);margin:0 0 12px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
    .pill{background:#1f2937;border-radius:10px;padding:8px;text-align:center}
    .pill b{display:block;font-size:20px;color:var(--accent)}
    .q{font-size:28px;text-align:center;margin:18px 0}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{border:0;border-radius:12px;padding:12px;font-size:18px;background:#1d4ed8;color:white;font-weight:700}
    button:active{transform:scale(.98)}
    .msg{min-height:24px;text-align:center;margin:12px 0;font-weight:700}
    .ok{color:var(--ok)} .bad{color:var(--bad)}
    .controls{display:flex;gap:8px;justify-content:center;margin-top:8px}
    .ghost{background:#334155}
    @media (max-width:560px){ .q{font-size:24px} button{font-size:16px;padding:11px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>⚖️ 分数平衡实验室</h1>
      <p class="sub">判断哪一边更大，10 题冲刺！训练分数比较与约分直觉。</p>
      <div class="stats">
        <div class="pill">题号<b id="round">1/10</b></div>
        <div class="pill">得分<b id="score">0</b></div>
        <div class="pill">连击<b id="combo">0</b></div>
      </div>
      <div class="q" id="question">1/2 ? 1/3</div>
      <div class="choices">
        <button data-v="left">左边更大</button>
        <button data-v="equal">一样大</button>
        <button data-v="right">右边更大</button>
        <button data-v="skip" class="ghost">跳过本题</button>
      </div>
      <div class="msg" id="msg"></div>
      <div class="controls">
        <button id="restart" class="ghost">重新开始</button>
      </div>
    </div>
  </div>
<script>
(() => {
  const TOTAL = 10;
  const el = id => document.getElementById(id);
  const roundEl = el('round'), scoreEl = el('score'), comboEl = el('combo'), qEl = el('question'), msgEl = el('msg');
  let i=1, score=0, combo=0, current=null;

  function gcd(a,b){ while(b){ [a,b]=[b,a%b]; } return a; }
  function simp(n,d){ const g=gcd(n,d); return [n/g,d/g]; }
  function val([n,d]){ return n/d; }
  function frac(){
    const d = 2 + Math.floor(Math.random()*10);
    const n = 1 + Math.floor(Math.random()*(d-1));
    return simp(n,d);
  }
  function buildQ(){
    let l=frac(), r=frac();
    if(Math.random()<0.2){ r=l.slice(); }
    const lv=val(l), rv=val(r);
    const ans = lv===rv?'equal':(lv>rv?'left':'right');
    return {l,r,ans};
  }
  function render(){
    roundEl.textContent = `${i}/${TOTAL}`;
    scoreEl.textContent = score;
    comboEl.textContent = combo;
    qEl.textContent = `${current.l[0]}/${current.l[1]}  ?  ${current.r[0]}/${current.r[1]}`;
  }
  function next(){
    if(i > TOTAL){
      qEl.textContent = `完成！总分 ${score}`;
      msgEl.className='msg';
      msgEl.textContent = score>=80?'太棒了，分数比较达人！':'继续练习，你会更快！';
      return;
    }
    current = buildQ();
    render();
  }
  function judge(choice){
    if(i > TOTAL) return;
    if(choice==='skip'){ combo=0; msgEl.className='msg'; msgEl.textContent='已跳过'; i++; return next(); }
    if(choice===current.ans){
      combo++; score += 10 + Math.min(combo,5);
      msgEl.className='msg ok'; msgEl.textContent='✅ 正确';
    }else{
      combo=0; score = Math.max(0, score-4);
      msgEl.className='msg bad'; msgEl.textContent=`❌ 错了，答案是「${current.ans==='left'?'左边更大':current.ans==='right'?'右边更大':'一样大'}」`;
    }
    i++; setTimeout(next, 450);
  }
  document.querySelectorAll('button[data-v]').forEach(b=>b.addEventListener('click',()=>judge(b.dataset.v)));
  el('restart').addEventListener('click',()=>{ i=1;score=0;combo=0;msgEl.textContent='';next(); });
  next();
})();
</script>
</body>
</html>
