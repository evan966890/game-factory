<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>分数平衡实验室</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --accent:#22d3ee; --ok:#22c55e; --bad:#ef4444; --text:#e5e7eb; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:linear-gradient(160deg,#020617,#0f172a 60%,#1f2937);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:14px}
    .app{width:min(760px,100%);background:rgba(17,24,39,.9);border:1px solid #334155;border-radius:18px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
    h1{font-size:1.3rem;margin:0 0 10px}.meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.95rem;color:#cbd5e1}
    .pill{background:#1e293b;padding:6px 10px;border-radius:999px}
    .balance{margin:14px 0;padding:14px;border-radius:14px;background:#0b1220;border:1px solid #334155}
    .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
    .pan{min-height:80px;border:1px dashed #475569;border-radius:12px;padding:12px;text-align:center;background:#0f172a}
    .eq{font-size:1.7rem;font-weight:700;color:#93c5fd}
    .expr{font-size:1.25rem;line-height:1.4}
    .choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    button{border:none;border-radius:12px;padding:12px 10px;background:#1d4ed8;color:white;font-size:1rem;font-weight:600}
    button:active{transform:translateY(1px)}
    .actions{display:flex;gap:10px;margin-top:10px}
    .ghost{background:#334155}.good{background:var(--ok)}.bad{background:var(--bad)}
    .msg{margin-top:10px;min-height:24px;font-weight:600}
    .bar{height:10px;background:#1e293b;border-radius:999px;overflow:hidden;margin-top:10px}
    .fill{height:100%;background:linear-gradient(90deg,#22d3ee,#818cf8);width:0}
    @media (max-width:560px){.choices{grid-template-columns:1fr}.expr{font-size:1.1rem}}
  </style>
</head>
<body>
  <main class="app">
    <h1>⚖️ 分数平衡实验室</h1>
    <div class="meta">
      <div class="pill">目标：10 题中答对至少 8 题</div>
      <div class="pill">模式：30 秒限时</div>
      <div class="pill" id="score">得分：0</div>
      <div class="pill" id="timer">剩余：30s</div>
    </div>

    <section class="balance">
      <div class="row">
        <div class="pan"><div class="expr" id="leftExpr">-</div></div>
        <div class="eq" id="relation">?</div>
        <div class="pan"><div class="expr" id="rightExpr">-</div></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="msg" id="msg"></div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="actions">
        <button class="ghost" id="skipBtn">跳过（-1分）</button>
        <button class="ghost" id="restartBtn">重新挑战</button>
      </div>
    </section>
  </main>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const scoreEl = $('score'), timerEl = $('timer'), leftEl = $('leftExpr'), rightEl = $('rightExpr'), relationEl = $('relation');
  const choicesEl = $('choices'), msgEl = $('msg'), fillEl = $('fill');
  const restartBtn = $('restartBtn'), skipBtn = $('skipBtn');

  let score = 0, solved = 0, total = 10, timeLeft = 30, current = null, lock = false, timer = null;

  const gcd = (a,b)=>b?gcd(b,a%b):Math.abs(a);
  const simp = (n,d)=>{ const g=gcd(n,d); return [n/g,d/g]; };
  const add = (a,b,c,d)=> simp(a*d+c*b,b*d);
  const val = (n,d)=> n/d;
  const fmt = (n,d)=> d===1?`${n}`:`${n}/${d}`;

  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

  function makeExpr(){
    const a=randInt(1,9), b=randInt(2,12), c=randInt(1,9), d=randInt(2,12);
    const op = Math.random()<0.5 ? '+' : '−';
    const [n,den] = op==='+' ? add(a,b,c,d) : add(a,b,-c,d);
    return { text:`${fmt(a,b)} ${op} ${fmt(c,d)}`, value:val(n,den) };
  }

  function newQuestion(){
    lock=false; msgEl.textContent=''; msgEl.className='msg';
    const L = makeExpr(), R = makeExpr();
    current = { L, R, ans: L.value===R.value ? '=' : (L.value>R.value?'>':'<') };
    leftEl.textContent=L.text; rightEl.textContent=R.text; relationEl.textContent='?';
    renderChoices();
  }

  function renderChoices(){
    const arr = ['>','<','='].sort(()=>Math.random()-0.5);
    choicesEl.innerHTML='';
    arr.forEach(ch=>{
      const btn=document.createElement('button');
      btn.textContent = ch==='>'?'左边更大 (>)': ch==='<'?'右边更大 (<)':'两边相等 (=)';
      btn.addEventListener('click',()=>judge(ch,btn));
      choicesEl.appendChild(btn);
    });
  }

  function judge(ch,btn){
    if(lock||!current) return; lock=true;
    relationEl.textContent=current.ans;
    solved++;
    if(ch===current.ans){ score+=2; msgEl.textContent='✅ 正确！+2 分'; msgEl.classList.add('good'); btn.classList.add('good'); }
    else { score=Math.max(0,score-1); msgEl.textContent=`❌ 正确答案是 ${current.ans}，-1 分`; msgEl.classList.add('bad'); btn.classList.add('bad'); }
    updateMeta();
    setTimeout(()=> solved>=total||timeLeft<=0 ? finish() : newQuestion(), 700);
  }

  function skip(){
    if(lock||!current) return;
    score=Math.max(0,score-1); solved++;
    msgEl.textContent='⏭️ 已跳过，-1 分'; msgEl.className='msg bad';
    relationEl.textContent=current.ans;
    updateMeta();
    setTimeout(()=> solved>=total||timeLeft<=0 ? finish() : newQuestion(), 500);
  }

  function updateMeta(){
    scoreEl.textContent = `得分：${score}`;
    timerEl.textContent = `剩余：${timeLeft}s`;
    fillEl.style.width = `${(solved/total)*100}%`;
  }

  function finish(){
    clearInterval(timer); lock=true;
    const pass = score >= 12;
    msgEl.className='msg ' + (pass?'good':'bad');
    msgEl.textContent = pass
      ? `🎉 挑战成功！最终 ${score} 分（目标 12 分）`
      : `📘 挑战结束：${score} 分。再来一局冲击 12 分！`;
    relationEl.textContent='✓';
  }

  function start(){
    score=0; solved=0; timeLeft=30; lock=false;
    updateMeta(); newQuestion();
    clearInterval(timer);
    timer=setInterval(()=>{ timeLeft--; updateMeta(); if(timeLeft<=0) finish(); },1000);
  }

  restartBtn.addEventListener('click',start);
  skipBtn.addEventListener('click',skip);
  start();
})();
</script>
</body>
</html>
