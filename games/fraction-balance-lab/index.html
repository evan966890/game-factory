<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数平衡实验室</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --card: #ffffff;
      --text: #1f2a44;
      --primary: #4f46e5;
      --ok: #16a34a;
      --bad: #dc2626;
      --muted: #667085;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(79,70,229,0.12);
      margin-bottom: 12px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    p { margin: 6px 0; color: var(--muted); }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      text-align: center;
    }
    .hud .item { background: #f8faff; border-radius: 12px; padding: 10px; }
    .label { font-size: .8rem; color: var(--muted); }
    .value { font-size: 1.1rem; font-weight: 700; }

    .balance {
      display: grid;
      grid-template-columns: 1fr 90px 1fr;
      gap: 8px;
      align-items: end;
      margin-top: 12px;
    }
    .pan {
      background: #eef2ff;
      border-radius: 14px;
      min-height: 140px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 2px solid #dbe3ff;
      text-align: center;
    }
    .eq {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      align-self: center;
    }
    .expr { font-size: 1.3rem; font-weight: 700; }
    .decimal { font-size: .9rem; color: var(--muted); margin-top: 4px; }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: none;
      background: #e8ebff;
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    .primary { background: var(--primary); color: #fff; width: 100%; margin-top: 10px; }
    .msg { min-height: 24px; font-weight: 700; margin-top: 8px; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    @media (max-width: 560px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .balance { grid-template-columns: 1fr; }
      .eq { font-size: 2.3rem; }
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>⚖️ 分数平衡实验室</h1>
      <p>比较左右两边分数表达式，选择正确符号（&lt;、=、&gt;）。10 题一局，练习分数大小与通分直觉。</p>
    </section>

    <section class="card hud">
      <div class="item"><div class="label">题号</div><div class="value" id="qNo">1 / 10</div></div>
      <div class="item"><div class="label">得分</div><div class="value" id="score">0</div></div>
      <div class="item"><div class="label">连对</div><div class="value" id="combo">0</div></div>
      <div class="item"><div class="label">最高连对</div><div class="value" id="best">0</div></div>
    </section>

    <section class="card">
      <div class="balance">
        <div class="pan">
          <div class="expr" id="leftExpr">1/2 + 1/4</div>
          <div class="decimal" id="leftDec">= 0.75</div>
        </div>
        <div class="eq">?</div>
        <div class="pan">
          <div class="expr" id="rightExpr">3/4</div>
          <div class="decimal" id="rightDec">= 0.75</div>
        </div>
      </div>
      <div class="choices">
        <button data-op="<">左边 &lt; 右边</button>
        <button data-op="=">左边 = 右边</button>
        <button data-op=">">左边 &gt; 右边</button>
        <button id="skipBtn">换一题（不计分）</button>
      </div>
      <div class="msg" id="msg"></div>
      <button class="primary" id="restartBtn">重新开始（10题）</button>
    </section>
  </main>

  <script>
    const TOTAL = 10;
    let idx = 0, score = 0, combo = 0, best = 0, finished = false;
    let current = null;

    const els = {
      qNo: document.getElementById('qNo'),
      score: document.getElementById('score'),
      combo: document.getElementById('combo'),
      best: document.getElementById('best'),
      leftExpr: document.getElementById('leftExpr'),
      rightExpr: document.getElementById('rightExpr'),
      leftDec: document.getElementById('leftDec'),
      rightDec: document.getElementById('rightDec'),
      msg: document.getElementById('msg')
    };

    const rInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    const frac = () => ({ n:rInt(1,9), d:rInt(2,10) });
    const val = f => f.n / f.d;
    const fmt = f => `${f.n}/${f.d}`;

    function buildSide() {
      const mode = rInt(1,3);
      if (mode === 1) {
        const a = frac();
        return { text: fmt(a), value: val(a) };
      }
      const a = frac(), b = frac();
      if (mode === 2) {
        return { text: `${fmt(a)} + ${fmt(b)}`, value: val(a)+val(b) };
      }
      return { text: `${fmt(a)} - ${fmt(b)}`, value: val(a)-val(b) };
    }

    function genQuestion() {
      let L, R, diff;
      do {
        L = buildSide();
        R = buildSide();
        diff = L.value - R.value;
      } while (Math.abs(diff) < 0.03 || L.value < 0 || R.value < 0);

      const ans = diff > 0 ? '>' : diff < 0 ? '<' : '=';
      return { L, R, ans };
    }

    function updateHud() {
      els.qNo.textContent = `${Math.min(idx+1, TOTAL)} / ${TOTAL}`;
      els.score.textContent = score;
      els.combo.textContent = combo;
      els.best.textContent = best;
    }

    function renderQ() {
      current = genQuestion();
      els.leftExpr.textContent = current.L.text;
      els.rightExpr.textContent = current.R.text;
      els.leftDec.textContent = `≈ ${current.L.value.toFixed(2)}`;
      els.rightDec.textContent = `≈ ${current.R.value.toFixed(2)}`;
      els.msg.textContent = '';
      els.msg.className = 'msg';
      updateHud();
    }

    function finish() {
      finished = true;
      els.msg.textContent = `本局完成！得分 ${score}/${TOTAL}，最高连对 ${best}`;
      els.msg.className = 'msg ok';
      els.qNo.textContent = `${TOTAL} / ${TOTAL}`;
    }

    function next() {
      idx++;
      if (idx >= TOTAL) finish();
      else renderQ();
    }

    function judge(op) {
      if (finished) return;
      if (op === current.ans) {
        score++; combo++; best = Math.max(best, combo);
        els.msg.textContent = '✅ 正确！';
        els.msg.className = 'msg ok';
      } else {
        combo = 0;
        els.msg.textContent = `❌ 错了，正确答案是 ${current.ans}`;
        els.msg.className = 'msg bad';
      }
      updateHud();
      setTimeout(next, 420);
    }

    document.querySelectorAll('[data-op]').forEach(btn => {
      btn.addEventListener('click', () => judge(btn.dataset.op));
    });

    document.getElementById('skipBtn').addEventListener('click', () => {
      if (!finished) renderQ();
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      idx = 0; score = 0; combo = 0; best = 0; finished = false;
      renderQ();
    });

    renderQ();
  </script>
</body>
</html>
