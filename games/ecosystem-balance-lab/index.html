<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生态平衡实验室</title>
  <style>
    :root { color-scheme: light; --bg:#f4fbf7; --card:#fff; --text:#13322a; --ok:#1b9c68; --warn:#f39c12; --bad:#e74c3c; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:860px;margin:0 auto;padding:16px}
    .card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:12px}
    h1{margin:0 0 6px;font-size:1.45rem}
    p{margin:6px 0;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:10px}
    .stat{padding:12px;border-radius:12px;background:#eef7f3}
    .big{font-size:1.4rem;font-weight:700}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin:10px 0}
    input[type="range"]{width:100%}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:600;background:#0d8b5a;color:#fff}
    button.secondary{background:#3a6ea5}
    button:active{transform:translateY(1px)}
    .hint{font-size:.95rem;color:#355b4f}
    .tag{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.85rem;font-weight:700}
    .ok{background:#ddf6ea;color:#0f774e}.warn{background:#fff3dc;color:#9b6408}.bad{background:#fde4e1;color:#9f271c}
    @media (max-width:560px){.stats{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>🌿 生态平衡实验室</h1>
      <p>目标：让草、兔子、狐狸三者维持平衡。每回合你可以调整“保护草地”“控制捕猎”等政策，撑过 <strong>10 回合</strong> 即获胜。</p>
      <p class="hint">学习点：食物链、承载力、种群波动。</p>
    </section>

    <section class="card stats">
      <div class="stat"><div>🌱 草地资源</div><div id="grass" class="big">60</div></div>
      <div class="stat"><div>🐇 兔子数量</div><div id="rabbit" class="big">35</div></div>
      <div class="stat"><div>🦊 狐狸数量</div><div id="fox" class="big">8</div></div>
      <div class="stat"><div>⏱️ 回合</div><div id="turn" class="big">1 / 10</div></div>
    </section>

    <section class="card">
      <div class="row">
        <label for="policyGrass"><strong>草地保护强度</strong>（提高草增长）</label>
        <span id="policyGrassVal">50%</span>
      </div>
      <input id="policyGrass" type="range" min="0" max="100" value="50" />

      <div class="row">
        <label for="policyHunt"><strong>狐狸捕猎限制</strong>（越高越少兔子被吃）</label>
        <span id="policyHuntVal">40%</span>
      </div>
      <input id="policyHunt" type="range" min="0" max="100" value="40" />

      <div class="btns" style="margin-top:12px">
        <button id="nextBtn">执行下一回合</button>
        <button id="resetBtn" class="secondary">重新开始</button>
      </div>
      <p id="status" style="margin-top:12px"></p>
      <p id="analysis" class="hint"></p>
    </section>
  </main>

  <script>
    const init = { grass: 60, rabbit: 35, fox: 8, turn: 1, maxTurn: 10, over: false };
    let s = { ...init };

    const el = id => document.getElementById(id);
    const grassEl = el('grass'), rabbitEl = el('rabbit'), foxEl = el('fox'), turnEl = el('turn');
    const statusEl = el('status'), analysisEl = el('analysis');
    const policyGrass = el('policyGrass'), policyHunt = el('policyHunt');
    const pgVal = el('policyGrassVal'), phVal = el('policyHuntVal');

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function rnd(n) { return Math.round(n); }

    function badge(text, type) {
      return `<span class="tag ${type}">${text}</span>`;
    }

    function updateUI() {
      grassEl.textContent = rnd(s.grass);
      rabbitEl.textContent = rnd(s.rabbit);
      foxEl.textContent = rnd(s.fox);
      turnEl.textContent = `${s.turn} / ${s.maxTurn}`;
      pgVal.textContent = `${policyGrass.value}%`;
      phVal.textContent = `${policyHunt.value}%`;
    }

    function ecosystemStep() {
      const gPolicy = Number(policyGrass.value) / 100;
      const hPolicy = Number(policyHunt.value) / 100;

      // 草增长：基础 + 保护加成 - 兔子消耗
      const grassGrowth = 8 + gPolicy * 10;
      const rabbitEat = s.rabbit * (0.6 + Math.random() * 0.2);
      s.grass = clamp(s.grass + grassGrowth - rabbitEat, 0, 140);

      // 兔子增长：受草资源正向影响，受狐狸捕食影响
      const rabbitBirth = s.rabbit * (0.10 + s.grass / 800);
      const predation = s.fox * (1.9 - hPolicy * 1.2) * (0.9 + Math.random() * 0.2);
      s.rabbit = clamp(s.rabbit + rabbitBirth - predation, 0, 180);

      // 狐狸增长：有兔子才增长，兔子太少会下降
      const foxBirth = s.rabbit > 25 ? s.fox * 0.12 : s.fox * 0.02;
      const foxDeath = s.rabbit < 15 ? s.fox * 0.22 : s.fox * 0.08;
      s.fox = clamp(s.fox + foxBirth - foxDeath, 0, 60);

      const stable = s.grass > 20 && s.grass < 120 && s.rabbit > 12 && s.rabbit < 120 && s.fox > 3 && s.fox < 35;

      let mood = badge('波动中', 'warn');
      if (stable) mood = badge('生态较稳定', 'ok');
      if (s.grass === 0 || s.rabbit === 0 || s.fox === 0) mood = badge('生态崩溃', 'bad');

      statusEl.innerHTML = `${mood}`;

      if (s.grass === 0) analysisEl.textContent = '草地耗尽：兔子食物不足，后续会连锁崩溃。';
      else if (s.rabbit === 0) analysisEl.textContent = '兔子灭绝：狐狸将因食物短缺大幅下降。';
      else if (s.fox === 0) analysisEl.textContent = '狐狸灭绝：兔子可能短期暴涨并过度消耗草地。';
      else if (stable) analysisEl.textContent = '做得好！当前政策让食物链保持在相对健康区间。';
      else analysisEl.textContent = '尝试提高草地保护或调整捕猎限制，减少极端波动。';

      if (s.grass === 0 || s.rabbit === 0 || s.fox === 0) {
        s.over = true;
        statusEl.innerHTML += ' 本局失败。';
      }
    }

    function nextTurn() {
      if (s.over) return;
      ecosystemStep();
      if (!s.over) {
        if (s.turn >= s.maxTurn) {
          s.over = true;
          statusEl.innerHTML = `${badge('挑战成功', 'ok')} 你成功维持了 10 回合生态平衡！`;
          analysisEl.textContent = '你理解了“资源—猎物—捕食者”之间的动态关系。';
        } else {
          s.turn += 1;
        }
      }
      updateUI();
    }

    function reset() {
      s = { ...init };
      statusEl.innerHTML = '';
      analysisEl.textContent = '调节两个政策后点击“执行下一回合”。';
      updateUI();
    }

    policyGrass.addEventListener('input', updateUI);
    policyHunt.addEventListener('input', updateUI);
    el('nextBtn').addEventListener('click', nextTurn);
    el('resetBtn').addEventListener('click', reset);

    reset();
  </script>
</body>
</html>
