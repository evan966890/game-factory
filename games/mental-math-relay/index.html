<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>心算接力赛</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22d3ee;
      --good: #22c55e;
      --bad: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1e293b 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .app {
      width: min(720px, 100%);
      background: color-mix(in oklab, var(--card) 92%, black);
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .35);
    }
    h1 { margin: 4px 0 6px; font-size: clamp(1.4rem, 3.8vw, 2rem); }
    .sub { color: var(--muted); margin-bottom: 14px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .stat b { display:block; font-size: 1.2rem; margin-top: 2px; }
    .qbox {
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px;
      background: #0b1220;
      text-align: center;
      margin-bottom: 12px;
    }
    .q { font-size: clamp(1.4rem, 6vw, 2.4rem); letter-spacing: .03em; min-height: 2.2em; display:grid; place-items:center; }
    .row { display:flex; gap:10px; }
    input, button {
      border-radius: 12px;
      border: 1px solid #475569;
      padding: 12px 14px;
      font-size: 1rem;
    }
    input {
      flex: 1;
      background: #020617;
      color: var(--text);
    }
    button {
      background: var(--accent);
      color: #062b33;
      font-weight: 700;
      border: none;
    }
    button.secondary { background: #334155; color: #e2e8f0; }
    .feedback {
      margin-top: 10px;
      min-height: 1.5em;
      text-align: center;
      font-weight: 600;
    }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .log {
      margin-top: 12px;
      border-top: 1px dashed #334155;
      padding-top: 10px;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.5;
      max-height: 150px;
      overflow: auto;
    }
    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>心算接力赛</h1>
    <div class="sub">90 秒内连续答题，连击越高分数加成越大！</div>

    <section class="stats" aria-live="polite">
      <div class="stat">剩余时间<b id="time">90</b></div>
      <div class="stat">得分<b id="score">0</b></div>
      <div class="stat">连击<b id="combo">0</b></div>
      <div class="stat">正确率<b id="acc">0%</b></div>
    </section>

    <section class="qbox">
      <div id="question" class="q">点击“开始游戏”</div>
      <div class="row">
        <input id="answer" type="number" inputmode="numeric" placeholder="输入答案" aria-label="答案" />
        <button id="submit">提交答案</button>
        <button id="start" class="secondary">开始游戏</button>
      </div>
      <div id="feedback" class="feedback"></div>
    </section>

    <section class="log" id="log">准备好挑战了吗？</section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const timeEl = $('time');
    const scoreEl = $('score');
    const comboEl = $('combo');
    const accEl = $('acc');
    const qEl = $('question');
    const ansEl = $('answer');
    const feedbackEl = $('feedback');
    const logEl = $('log');

    let timer = null;
    let left = 90;
    let score = 0;
    let combo = 0;
    let total = 0;
    let correct = 0;
    let current = null;
    let playing = false;

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function nextQuestion() {
      const level = score < 120 ? 1 : score < 260 ? 2 : 3;
      const ops = level === 1 ? ['+', '-'] : level === 2 ? ['+', '-', '×'] : ['+', '-', '×', '÷'];
      const op = ops[rand(0, ops.length - 1)];
      let a, b, answer;

      if (op === '+') {
        a = rand(5, 80);
        b = rand(5, 80);
        answer = a + b;
      } else if (op === '-') {
        a = rand(20, 99);
        b = rand(5, a - 1);
        answer = a - b;
      } else if (op === '×') {
        a = rand(2, 12);
        b = rand(2, 12);
        answer = a * b;
      } else {
        b = rand(2, 12);
        answer = rand(2, 12);
        a = b * answer;
      }
      current = { text: `${a} ${op} ${b} = ?`, answer };
      qEl.textContent = current.text;
      ansEl.value = '';
      ansEl.focus();
    }

    function updateStats() {
      timeEl.textContent = left;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      accEl.textContent = total ? `${Math.round((correct / total) * 100)}%` : '0%';
    }

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = msg;
      logEl.prepend(line);
      while (logEl.children.length > 12) logEl.removeChild(logEl.lastChild);
    }

    function submit() {
      if (!playing || !current) return;
      const val = Number(ansEl.value);
      if (!Number.isFinite(val)) return;
      total++;
      if (val === current.answer) {
        correct++;
        combo++;
        const bonus = Math.min(combo, 8);
        score += 10 + bonus * 2;
        feedbackEl.className = 'feedback good';
        feedbackEl.textContent = `✅ 正确！+${10 + bonus * 2} 分`;
        log(`答对 ${current.text.replace('?', current.answer)}（连击 ${combo}）`);
      } else {
        combo = 0;
        score = Math.max(0, score - 5);
        feedbackEl.className = 'feedback bad';
        feedbackEl.textContent = `❌ 错误，正确答案是 ${current.answer}（-5 分）`;
        log(`答错 ${current.text} 你写了 ${val}`);
      }
      updateStats();
      nextQuestion();
    }

    function start() {
      if (playing) return;
      left = 90;
      score = 0;
      combo = 0;
      total = 0;
      correct = 0;
      playing = true;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      logEl.innerHTML = '';
      updateStats();
      nextQuestion();

      timer = setInterval(() => {
        left--;
        updateStats();
        if (left <= 0) {
          clearInterval(timer);
          playing = false;
          qEl.textContent = '时间到！';
          feedbackEl.className = 'feedback good';
          feedbackEl.textContent = `🎉 本轮得分 ${score}，正确率 ${accEl.textContent}`;
          log(`游戏结束：得分 ${score}，共答 ${total} 题，正确 ${correct} 题`);
        }
      }, 1000);
    }

    $('submit').addEventListener('click', submit);
    $('start').addEventListener('click', start);
    ansEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
