<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>分数运算对决</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --bad: #ef4444;
      --accent: #38bdf8;
      --accent2: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .app {
      width: min(760px, 100%);
      background: color-mix(in srgb, var(--panel) 88%, black);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.25rem, 2.8vw, 1.8rem); }
    .sub { color: var(--muted); margin-bottom: 14px; font-size: .95rem; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .chip {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      font-size: .88rem;
    }
    .chip b { display: block; font-size: 1.05rem; color: var(--accent); }
    .card {
      background: linear-gradient(160deg, color-mix(in srgb, var(--card) 92%, black), #111827);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .q {
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      margin: 8px 0 12px;
      line-height: 1.5;
      text-align: center;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }
    button.opt, .primary {
      background: linear-gradient(145deg, #1e40af, #1d4ed8);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
    }
    button.opt:active, .primary:active { transform: translateY(1px); }
    .primary { background: linear-gradient(145deg, var(--accent), var(--accent2)); color: #0b1020; }
    .feedback { min-height: 24px; margin-top: 10px; font-weight: 700; text-align: center; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .footer { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .hint { text-align: center; color: var(--muted); font-size: .9rem; margin-top: 8px; }
    .result { text-align: center; }
    .result h2 { margin: 0 0 8px; }
    .result p { margin: 4px 0; color: var(--muted); }
    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>分数运算对决</h1>
    <div class="sub">12 题闯关：加/减/乘/除混合运算，选出最简分数答案。</div>

    <section class="stats" aria-live="polite">
      <div class="chip">题号<b id="round">1/12</b></div>
      <div class="chip">得分<b id="score">0</b></div>
      <div class="chip">连击<b id="streak">0</b></div>
      <div class="chip">正确率<b id="accuracy">0%</b></div>
    </section>

    <section id="panel" class="card"></section>

    <div class="footer">
      <button class="primary" id="restartBtn" hidden>再来一局</button>
    </div>
    <div class="hint">规则：答对 +10 分，连续答对有连击加分，答错会显示正确答案。</div>
  </main>

  <script>
    const TOTAL = 12;
    let state = {
      i: 0,
      score: 0,
      correct: 0,
      streak: 0,
      current: null,
      locked: false,
    };

    const panel = document.getElementById('panel');
    const roundEl = document.getElementById('round');
    const scoreEl = document.getElementById('score');
    const streakEl = document.getElementById('streak');
    const accEl = document.getElementById('accuracy');
    const restartBtn = document.getElementById('restartBtn');

    const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

    function simp(n, d) {
      if (d < 0) { n = -n; d = -d; }
      const g = gcd(Math.abs(n), Math.abs(d));
      return { n: n / g, d: d / g };
    }

    function txt(f) {
      const s = simp(f.n, f.d);
      return s.d === 1 ? String(s.n) : `${s.n}/${s.d}`;
    }

    function eq(a, b) {
      const x = simp(a.n, a.d), y = simp(b.n, b.d);
      return x.n === y.n && x.d === y.d;
    }

    function makeFraction(maxN = 12, maxD = 12) {
      let n = rand(1, maxN), d = rand(2, maxD);
      return simp(n, d);
    }

    function operate(a, b, op) {
      if (op === '+') return simp(a.n * b.d + b.n * a.d, a.d * b.d);
      if (op === '-') return simp(a.n * b.d - b.n * a.d, a.d * b.d);
      if (op === '×') return simp(a.n * b.n, a.d * b.d);
      return simp(a.n * b.d, a.d * b.n);
    }

    function genQuestion() {
      const ops = ['+', '-', '×', '÷'];
      const op = ops[rand(0, ops.length - 1)];
      let a = makeFraction(), b = makeFraction();
      if (op === '÷') {
        while (b.n === 0) b = makeFraction();
      }
      let ans = operate(a, b, op);
      if (Math.abs(ans.n) > 40 || ans.d > 48 || ans.n === 0) {
        return genQuestion();
      }

      const opts = [ans];
      while (opts.length < 4) {
        const deltaN = rand(-3, 3) || 1;
        const deltaD = rand(-2, 2);
        let fake = simp(ans.n + deltaN, Math.max(1, ans.d + deltaD));
        if (Math.abs(fake.n) > 60) fake = simp(rand(-25, 25) || 1, rand(1, 20));
        if (!opts.some(o => eq(o, fake))) opts.push(fake);
      }

      for (let i = opts.length - 1; i > 0; i--) {
        const j = rand(0, i);
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }

      return { prompt: `${txt(a)} ${op} ${txt(b)} = ?`, ans, opts };
    }

    function updateStats() {
      roundEl.textContent = `${Math.min(state.i + 1, TOTAL)}/${TOTAL}`;
      scoreEl.textContent = state.score;
      streakEl.textContent = state.streak;
      const pct = state.i === 0 ? 0 : Math.round((state.correct / state.i) * 100);
      accEl.textContent = `${pct}%`;
    }

    function renderQuestion() {
      state.current = genQuestion();
      state.locked = false;
      panel.innerHTML = `
        <div class="q">${state.current.prompt}</div>
        <div class="options"></div>
        <div class="feedback" id="fb"></div>
      `;
      const options = panel.querySelector('.options');
      state.current.opts.forEach((o) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = txt(o);
        btn.addEventListener('click', () => answer(o));
        options.appendChild(btn);
      });
      updateStats();
    }

    function answer(choice) {
      if (state.locked) return;
      state.locked = true;
      state.i += 1;
      const fb = document.getElementById('fb');

      if (eq(choice, state.current.ans)) {
        state.correct += 1;
        state.streak += 1;
        const bonus = Math.min(8, state.streak - 1);
        state.score += 10 + bonus;
        fb.className = 'feedback ok';
        fb.textContent = `✅ 正确！连击 +${bonus}`;
      } else {
        state.streak = 0;
        fb.className = 'feedback bad';
        fb.textContent = `❌ 错了，正确答案是 ${txt(state.current.ans)}`;
      }

      updateStats();
      setTimeout(() => {
        if (state.i >= TOTAL) return renderResult();
        renderQuestion();
      }, 700);
    }

    function renderResult() {
      const acc = Math.round((state.correct / TOTAL) * 100);
      let level = '继续练习';
      if (acc >= 90) level = '分数大师';
      else if (acc >= 75) level = '运算高手';
      else if (acc >= 60) level = '进步明显';

      panel.innerHTML = `
        <div class="result">
          <h2>本局完成：${level}</h2>
          <p>总分：<b>${state.score}</b></p>
          <p>正确：<b>${state.correct}/${TOTAL}</b>（${acc}%）</p>
          <p>目标：下局把正确率提升到 ${Math.min(100, acc + 10)}%</p>
        </div>
      `;
      restartBtn.hidden = false;
      roundEl.textContent = `${TOTAL}/${TOTAL}`;
    }

    function reset() {
      state = { i: 0, score: 0, correct: 0, streak: 0, current: null, locked: false };
      restartBtn.hidden = true;
      renderQuestion();
    }

    restartBtn.addEventListener('click', reset);
    reset();
  </script>
</body>
</html>
