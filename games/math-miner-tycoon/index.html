<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学矿工大亨</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #FF9800;
            --background-color: #1a1a2e;
            --card-color: #16213e;
            --text-color: #ffffff;
            --gold-color: #FFD700;
            --success-color: #4CAF50;
            --danger-color: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--background-color) 0%, #0f3460 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--gold-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--card-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--gold-color);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .miner-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .miner-container:active {
            transform: scale(0.95);
        }

        .miner {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .miner-face {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #DEB887, #D2B48C);
            border-radius: 50%;
            position: relative;
        }

        .miner-eye {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            top: 40px;
        }

        .miner-eye.left {
            left: 30px;
        }

        .miner-eye.right {
            right: 30px;
        }

        .miner-mouth {
            position: absolute;
            width: 40px;
            height: 20px;
            border-bottom: 4px solid #333;
            border-radius: 0 0 20px 20px;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .miner-hat {
            position: absolute;
            width: 140px;
            height: 60px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 70px 70px 0 0;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .click-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #8B4513;
            font-size: 14px;
            animation: coinFloat 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes coinFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
        }

        .click-count {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin-top: 10px;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--card-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .panel h3 {
            margin-bottom: 15px;
            color: var(--secondary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: background 0.3s;
        }

        .upgrade-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .upgrade-info {
            flex: 1;
        }

        .upgrade-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upgrade-desc {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .upgrade-cost {
            color: var(--gold-color);
            font-weight: bold;
            margin-right: 10px;
        }

        .upgrade-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upgrade-btn:hover {
            background: #45a049;
        }

        .upgrade-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .achievement-icon {
            width: 40px;
            height: 40px;
            background: var(--secondary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .achievement-icon.locked {
            background: #666;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-progress {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success-color);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .math-problem {
            font-size: 2rem;
            margin: 20px 0;
            color: var(--gold-color);
        }

        .math-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid var(--secondary-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 20px;
        }

        .math-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .modal-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin: 0 10px;
        }

        .modal-btn:hover {
            background: #45a049;
        }

        .modal-btn.cancel {
            background: var(--danger-color);
        }

        .modal-btn.cancel:hover {
            background: #d32f2f;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-color);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1001;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--danger-color);
        }

        @media (max-width: 600px) {
            .panels {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .miner-container {
                width: 150px;
                height: 150px;
            }

            .miner-face {
                width: 90px;
                height: 90px;
            }

            .miner-hat {
                width: 105px;
                height: 45px;
                top: -22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ 数学矿工大亨</h1>
            <p>点击挖矿，学习数学，成为大亨！</p>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="gold-display">0</div>
                <div class="stat-label">💰 金币</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="click-power-display">1</div>
                <div class="stat-label">⚡ 点击产出</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="auto-power-display">0</div>
                <div class="stat-label">🤖 自动产出/秒</div>
            </div>
        </div>

        <div class="game-area">
            <div class="miner-container" id="miner">
                <div class="miner">
                    <div class="miner-hat"></div>
                    <div class="miner-face">
                        <div class="miner-eye left"></div>
                        <div class="miner-eye right"></div>
                        <div class="miner-mouth"></div>
                    </div>
                </div>
                <div class="click-effect" id="click-effect"></div>
            </div>
            <div class="click-count">点击次数: <span id="click-count">0</span></div>
        </div>

        <div class="panels">
            <div class="panel">
                <h3>🔧 升级商店</h3>
                <div id="upgrades-container">
                    <!-- Upgrades will be generated by JavaScript -->
                </div>
            </div>

            <div class="panel">
                <h3>🏆 成就系统</h3>
                <div id="achievements-container">
                    <!-- Achievements will be generated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Math Problem Modal -->
    <div class="modal" id="math-modal">
        <div class="modal-content">
            <h2>🧮 数学挑战</h2>
            <p>答对获得2倍金币奖励！</p>
            <div class="math-problem" id="math-problem">5 + 3 = ?</div>
            <input type="number" class="math-input" id="math-answer" placeholder="输入答案" autofocus>
            <div>
                <button class="modal-btn" id="submit-answer">提交答案</button>
                <button class="modal-btn cancel" id="skip-problem">跳过</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        // Game State
        const gameState = {
            gold: 0,
            clickCount: 0,
            clickPower: 1,
            autoPower: 0,
            mathProblemCount: 0,
            correctAnswers: 0,
            upgrades: {
                clickPower: { level: 0, baseCost: 10, costMultiplier: 1.5 },
                autoMiner: { level: 0, baseCost: 50, costMultiplier: 1.8 },
                goldMultiplier: { level: 0, baseCost: 100, costMultiplier: 2.0 }
            },
            achievements: {
                firstClick: { unlocked: false, name: "第一次点击", desc: "点击矿工1次", target: 1 },
                click100: { unlocked: false, name: "点击达人", desc: "点击矿工100次", target: 100 },
                math10: { unlocked: false, name: "数学新手", desc: "答对10道数学题", target: 10 },
                math100: { unlocked: false, name: "数学大师", desc: "答对100道数学题", target: 100 },
                gold1000: { unlocked: false, name: "小富翁", desc: "累计获得1000金币", target: 1000 },
                gold10000: { unlocked: false, name: "大亨", desc: "累计获得10000金币", target: 10000 }
            },
            totalGoldEarned: 0,
            lastSave: Date.now()
        };

        // DOM Elements
        const goldDisplay = document.getElementById('gold-display');
        const clickPowerDisplay = document.getElementById('click-power-display');
        const autoPowerDisplay = document.getElementById('auto-power-display');
        const clickCountDisplay = document.getElementById('click-count');
        const miner = document.getElementById('miner');
        const clickEffect = document.getElementById('click-effect');
        const upgradesContainer = document.getElementById('upgrades-container');
        const achievementsContainer = document.getElementById('achievements-container');
        const mathModal = document.getElementById('math-modal');
        const mathProblem = document.getElementById('math-problem');
        const mathAnswer = document.getElementById('math-answer');
        const submitAnswer = document.getElementById('submit-answer');
        const skipProblem = document.getElementById('skip-problem');
        const notification = document.getElementById('notification');

        // Upgrade Definitions
        const upgradeDefinitions = [
            {
                id: 'clickPower',
                name: '强化镐子',
                desc: '每次点击获得更多金币',
                effect: (level) => `+${level} 点击产出`
            },
            {
                id: 'autoMiner',
                name: '矿工机器人',
                desc: '自动产出金币',
                effect: (level) => `+${level * 2} 金币/秒`
            },
            {
                id: 'goldMultiplier',
                name: '财富倍增',
                desc: '所有金币产出增加',
                effect: (level) => `+${level * 10}% 金币`
            }
        ];

        // Math Problem Generator
        function generateMathProblem() {
            const difficulty = Math.min(Math.floor(gameState.correctAnswers / 10), 3);
            let num1, num2, operator, answer;

            switch (difficulty) {
                case 0: // Addition
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    operator = '+';
                    answer = num1 + num2;
                    break;
                case 1: // Subtraction
                    num1 = Math.floor(Math.random() * 10) + 5;
                    num2 = Math.floor(Math.random() * num1) + 1;
                    operator = '-';
                    answer = num1 - num2;
                    break;
                case 2: // Multiplication
                    num1 = Math.floor(Math.random() * 5) + 1;
                    num2 = Math.floor(Math.random() * 5) + 1;
                    operator = '×';
                    answer = num1 * num2;
                    break;
                case 3: // Division
                    num2 = Math.floor(Math.random() * 5) + 1;
                    answer = Math.floor(Math.random() * 5) + 1;
                    num1 = num2 * answer;
                    operator = '÷';
                    break;
            }

            return { num1, num2, operator, answer };
        }

        // Show Math Problem
        function showMathProblem() {
            const problem = generateMathProblem();
            mathProblem.textContent = `${problem.num1} ${problem.operator} ${problem.num2} = ?`;
            mathProblem.dataset.answer = problem.answer;
            mathAnswer.value = '';
            mathModal.classList.add('active');
            mathAnswer.focus();
        }

        // Check Math Answer
        function checkMathAnswer() {
            const userAnswer = parseInt(mathAnswer.value);
            const correctAnswer = parseInt(mathProblem.dataset.answer);

            if (userAnswer === correctAnswer) {
                // Correct answer - give 2x gold reward
                const reward = gameState.clickPower * 10;
                gameState.gold += reward;
                gameState.totalGoldEarned += reward;
                gameState.correctAnswers++;
                showNotification(`正确！获得 ${reward} 金币奖励！`, 'success');
                checkAchievements();
            } else {
                showNotification(`错误！正确答案是 ${correctAnswer}`, 'error');
            }

            mathModal.classList.remove('active');
            updateDisplay();
            saveGame();
        }

        // Skip Math Problem
        function skipMathProblem() {
            mathModal.classList.remove('active');
        }

        // Click Handler
        function handleClick() {
            gameState.clickCount++;
            gameState.mathProblemCount++;

            // Calculate gold with multiplier
            const multiplier = 1 + (gameState.upgrades.goldMultiplier.level * 0.1);
            const goldEarned = Math.floor(gameState.clickPower * multiplier);
            gameState.gold += goldEarned;
            gameState.totalGoldEarned += goldEarned;

            // Show coin animation
            showCoinAnimation();

            // Check for math problem (every 10 clicks)
            if (gameState.mathProblemCount % 10 === 0) {
                setTimeout(showMathProblem, 500);
            }

            updateDisplay();
            checkAchievements();
            saveGame();
        }

        // Show Coin Animation
        function showCoinAnimation() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '+';
            coin.style.left = `${Math.random() * 150 + 25}px`;
            coin.style.top = `${Math.random() * 150 + 25}px`;
            clickEffect.appendChild(coin);

            setTimeout(() => {
                coin.remove();
            }, 1000);
        }

        // Buy Upgrade
        function buyUpgrade(upgradeId) {
            const upgrade = gameState.upgrades[upgradeId];
            const definition = upgradeDefinitions.find(u => u.id === upgradeId);
            const cost = Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, upgrade.level));

            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                upgrade.level++;

                // Apply upgrade effects
                if (upgradeId === 'clickPower') {
                    gameState.clickPower = 1 + upgrade.level;
                } else if (upgradeId === 'autoMiner') {
                    gameState.autoPower = upgrade.level * 2;
                }

                showNotification(`升级成功！${definition.name} 等级 ${upgrade.level}`, 'success');
                updateDisplay();
                saveGame();
            } else {
                showNotification(`金币不足！需要 ${cost} 金币`, 'error');
            }
        }

        // Check Achievements
        function checkAchievements() {
            const achievements = gameState.achievements;

            // First Click
            if (!achievements.firstClick.unlocked && gameState.clickCount >= 1) {
                achievements.firstClick.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.firstClick.name}`, 'success');
            }

            // Click 100
            if (!achievements.click100.unlocked && gameState.clickCount >= 100) {
                achievements.click100.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.click100.name}`, 'success');
            }

            // Math 10
            if (!achievements.math10.unlocked && gameState.correctAnswers >= 10) {
                achievements.math10.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.math10.name}`, 'success');
            }

            // Math 100
            if (!achievements.math100.unlocked && gameState.correctAnswers >= 100) {
                achievements.math100.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.math100.name}`, 'success');
            }

            // Gold 1000
            if (!achievements.gold1000.unlocked && gameState.totalGoldEarned >= 1000) {
                achievements.gold1000.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.gold1000.name}`, 'success');
            }

            // Gold 10000
            if (!achievements.gold10000.unlocked && gameState.totalGoldEarned >= 10000) {
                achievements.gold10000.unlocked = true;
                showNotification(`🏆 解锁成就：${achievements.gold10000.name}`, 'success');
            }

            updateAchievementsDisplay();
        }

        // Update Display
        function updateDisplay() {
            goldDisplay.textContent = formatNumber(gameState.gold);
            clickPowerDisplay.textContent = gameState.clickPower;
            autoPowerDisplay.textContent = gameState.autoPower;
            clickCountDisplay.textContent = gameState.clickCount;

            updateUpgradesDisplay();
        }

        // Update Upgrades Display
        function updateUpgradesDisplay() {
            upgradesContainer.innerHTML = '';

            upgradeDefinitions.forEach(definition => {
                const upgrade = gameState.upgrades[definition.id];
                const cost = Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, upgrade.level));
                const canAfford = gameState.gold >= cost;

                const upgradeElement = document.createElement('div');
                upgradeElement.className = 'upgrade-item';
                upgradeElement.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${definition.name} (Lv.${upgrade.level})</div>
                        <div class="upgrade-desc">${definition.desc} - ${definition.effect(upgrade.level)}</div>
                    </div>
                    <div class="upgrade-cost">💰 ${formatNumber(cost)}</div>
                    <button class="upgrade-btn" ${!canAfford ? 'disabled' : ''} onclick="buyUpgrade('${definition.id}')">
                        购买
                    </button>
                `;
                upgradesContainer.appendChild(upgradeElement);
            });
        }

        // Update Achievements Display
        function updateAchievementsDisplay() {
            achievementsContainer.innerHTML = '';

            Object.entries(gameState.achievements).forEach(([key, achievement]) => {
                const progress = Math.min(
                    key === 'firstClick' || key === 'click100' ? gameState.clickCount :
                    key === 'math10' || key === 'math100' ? gameState.correctAnswers :
                    gameState.totalGoldEarned,
                    achievement.target
                );
                const progressPercent = (progress / achievement.target) * 100;

                const achievementElement = document.createElement('div');
                achievementElement.className = 'achievement-item';
                achievementElement.innerHTML = `
                    <div class="achievement-icon ${achievement.unlocked ? '' : 'locked'}">
                        ${achievement.unlocked ? '🏆' : '🔒'}
                    </div>
                    <div class="achievement-info">
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-progress">${achievement.desc} (${progress}/${achievement.target})</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                `;
                achievementsContainer.appendChild(achievementElement);
            });
        }

        // Show Notification
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.className = `notification ${type} show`;

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Format Number
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Save Game
        function saveGame() {
            gameState.lastSave = Date.now();
            localStorage.setItem('mathMinerTycoon', JSON.stringify(gameState));
        }

        // Load Game
        function loadGame() {
            const saved = localStorage.getItem('mathMinerTycoon');
            if (saved) {
                const loadedState = JSON.parse(saved);
                Object.assign(gameState, loadedState);

                // Calculate offline earnings
                const now = Date.now();
                const timeDiff = (now - gameState.lastSave) / 1000; // seconds
                if (timeDiff > 0 && gameState.autoPower > 0) {
                    const offlineEarnings = Math.floor(gameState.autoPower * timeDiff);
                    gameState.gold += offlineEarnings;
                    gameState.totalGoldEarned += offlineEarnings;
                    showNotification(`离线收益：+${formatNumber(offlineEarnings)} 金币`, 'success');
                }
            }
        }

        // Auto Mining
        function autoMine() {
            if (gameState.autoPower > 0) {
                const multiplier = 1 + (gameState.upgrades.goldMultiplier.level * 0.1);
                const goldEarned = Math.floor(gameState.autoPower * multiplier);
                gameState.gold += goldEarned;
                gameState.totalGoldEarned += goldEarned;
                updateDisplay();
            }
        }

        // Initialize Game
        function initGame() {
            loadGame();
            updateDisplay();
            updateAchievementsDisplay();

            // Event Listeners
            miner.addEventListener('click', handleClick);
            submitAnswer.addEventListener('click', checkMathAnswer);
            skipProblem.addEventListener('click', skipMathProblem);
            mathAnswer.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkMathAnswer();
            });

            // Auto save every 30 seconds
            setInterval(saveGame, 30000);

            // Auto mine every second
            setInterval(autoMine, 1000);
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
