<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>面积单位换算冲刺</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --ok:#22c55e; --bad:#ef4444; --accent:#38bdf8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:linear-gradient(160deg,#020617,#111827); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .wrap { width:min(92vw,720px); background:rgba(17,24,39,.92); border:1px solid #1f2937; border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    h1 { margin:0 0 8px; font-size:1.5rem; }
    .sub { opacity:.8; margin:0 0 14px; font-size:.95rem; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .pill { background:#0b1220; border:1px solid #243042; border-radius:999px; padding:6px 12px; font-size:.9rem; }
    .q { font-size:1.25rem; font-weight:700; margin:10px 0 14px; line-height:1.4; }
    .opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button { appearance:none; border:none; border-radius:12px; padding:14px 12px; background:#1f2937; color:var(--text); font-size:1rem; font-weight:600; border:1px solid #334155; }
    button:active { transform:scale(.98); }
    button.good { background:rgba(34,197,94,.2); border-color:var(--ok); }
    button.bad { background:rgba(239,68,68,.2); border-color:var(--bad); }
    .foot { margin-top:14px; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
    .start, .next { background:linear-gradient(135deg,#0ea5e9,#2563eb); border:none; }
    .hide { display:none; }
    @media (max-width:560px){ .opts{grid-template-columns:1fr;} .q{font-size:1.1rem;} }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>面积单位换算冲刺</h1>
    <p class="sub">10 题闯关，训练 cm² / m² / hm² / km² 快速换算。</p>
    <div class="row">
      <span class="pill" id="prog">第 0 / 10 题</span>
      <span class="pill" id="score">得分：0</span>
      <span class="pill" id="streak">连对：0</span>
    </div>
    <section id="panelStart">
      <p>规则：每题四选一，答对 +10 分，连续答对每题额外 +2 分（上限 +10）。</p>
      <button class="start" id="btnStart">开始挑战</button>
    </section>
    <section id="panelGame" class="hide">
      <div class="q" id="question">题目加载中...</div>
      <div class="opts" id="options"></div>
      <div class="foot">
        <span id="tip">请选择答案</span>
        <button class="next hide" id="btnNext">下一题</button>
      </div>
    </section>
    <section id="panelEnd" class="hide">
      <h2 id="finalTitle">挑战完成！</h2>
      <p id="finalText"></p>
      <button class="start" id="btnRestart">再来一局</button>
    </section>
  </main>

  <script>
    const TOTAL = 10;
    const units = [
      {u:'cm²', f:1},
      {u:'m²', f:10000},
      {u:'hm²', f:100000000},
      {u:'km²', f:10000000000}
    ];

    const el = id => document.getElementById(id);
    const panelStart = el('panelStart'), panelGame = el('panelGame'), panelEnd = el('panelEnd');
    const questionEl = el('question'), optionsEl = el('options'), tipEl = el('tip');
    const progEl = el('prog'), scoreEl = el('score'), streakEl = el('streak');
    const btnNext = el('btnNext');

    let idx = 0, score = 0, streak = 0, currentAnswer = null, locked = false;

    function rand(n){ return Math.floor(Math.random()*n); }
    function pick(arr){ return arr[rand(arr.length)]; }

    function makeQuestion(){
      let from = pick(units), to = pick(units);
      while (to.u === from.u) to = pick(units);

      const baseChoices = [1,2,3,4,5,6,8,10,12,15,20,25,30,40,50,60,75,80,90,100];
      let num = pick(baseChoices);

      const factor = from.f / to.f;
      let answer = num * factor;

      if (!Number.isInteger(answer)) {
        const divisors = [2,4,5,8,10,20,25,50,100];
        const d = pick(divisors);
        num = Math.max(1, Math.floor(num / d) * d);
        answer = num * factor;
      }

      const q = `${num} ${from.u} = ? ${to.u}`;
      const opts = new Set([answer]);
      const spreads = [0.5, 0.8, 1.2, 1.5, 2, 10, 100, 1000, 10000];
      while (opts.size < 4) {
        const s = pick(spreads);
        const sign = Math.random() > 0.5 ? 1 : -1;
        let wrong = answer * s;
        if (!Number.isInteger(answer)) wrong = +(wrong.toFixed(2));
        if (Math.abs(wrong - answer) < 1e-9 || wrong <= 0) {
          wrong = answer + sign * (Math.abs(answer) < 10 ? rand(9)+1 : rand(50)+5);
        }
        opts.add(wrong);
      }
      return { q, answer, opts: [...opts].sort(() => Math.random() - 0.5) };
    }

    function updateHUD(){
      progEl.textContent = `第 ${idx} / ${TOTAL} 题`;
      scoreEl.textContent = `得分：${score}`;
      streakEl.textContent = `连对：${streak}`;
    }

    function renderQuestion(){
      locked = false;
      btnNext.classList.add('hide');
      tipEl.textContent = '请选择答案';
      const data = makeQuestion();
      currentAnswer = data.answer;
      questionEl.textContent = data.q;
      optionsEl.innerHTML = '';
      data.opts.forEach(v => {
        const b = document.createElement('button');
        b.textContent = Number.isInteger(v) ? String(v) : String(v.toFixed(2));
        b.addEventListener('click', () => onAnswer(b, v));
        optionsEl.appendChild(b);
      });
      updateHUD();
    }

    function onAnswer(btn, v){
      if (locked) return;
      locked = true;
      const buttons = [...optionsEl.querySelectorAll('button')];
      const ok = Math.abs(v - currentAnswer) < 1e-9;
      if (ok) {
        streak++;
        const bonus = Math.min(10, Math.max(0, (streak - 1) * 2));
        score += 10 + bonus;
        btn.classList.add('good');
        tipEl.textContent = `回答正确！本题 +${10+bonus}`;
      } else {
        streak = 0;
        btn.classList.add('bad');
        const rightBtn = buttons.find(x => Math.abs(Number(x.textContent) - currentAnswer) < 1e-9);
        if (rightBtn) rightBtn.classList.add('good');
        tipEl.textContent = `答错了，正确答案是 ${Number.isInteger(currentAnswer)?currentAnswer:currentAnswer.toFixed(2)}`;
      }
      idx++;
      updateHUD();
      btnNext.classList.remove('hide');
    }

    btnNext.addEventListener('click', () => {
      if (idx >= TOTAL) return endGame();
      renderQuestion();
    });

    function startGame(){
      idx = 0; score = 0; streak = 0;
      panelStart.classList.add('hide');
      panelEnd.classList.add('hide');
      panelGame.classList.remove('hide');
      renderQuestion();
    }

    function endGame(){
      panelGame.classList.add('hide');
      panelEnd.classList.remove('hide');
      let rank = '继续加油';
      if (score >= 120) rank = '面积换算达人';
      else if (score >= 90) rank = '换算小能手';
      el('finalTitle').textContent = `挑战完成：${rank}`;
      el('finalText').textContent = `你本局得分 ${score} 分。多练几局，建立面积单位换算直觉！`;
    }

    el('btnStart').addEventListener('click', startGame);
    el('btnRestart').addEventListener('click', startGame);
  </script>
</body>
</html>
