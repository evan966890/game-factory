<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行星排序实验室</title>
  <style>
    :root{--bg:#0b1024;--card:#121a3a;--text:#f2f5ff;--muted:#9aa7d8;--ok:#3ddc97;--bad:#ff6b6b;--btn:#344488}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#1c2758,var(--bg));color:var(--text);min-height:100vh;padding:12px}
    .app{max-width:560px;margin:0 auto;background:var(--card);border-radius:16px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;text-align:center;font-size:28px}.desc{margin:0 0 12px;text-align:center;color:var(--muted);font-size:14px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.box{background:#1a2450;border-radius:10px;padding:8px;text-align:center;font-size:13px}.box strong{display:block;font-size:18px}
    ul{list-style:none;padding:0;margin:0;display:grid;gap:8px}.planet{background:#1a2450;border:1px solid #32428b;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;touch-action:none}
    .planet.dragging{opacity:.5}.tag{font-size:12px;color:var(--muted)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;border-radius:10px;min-height:44px;color:#fff;background:var(--btn);font-weight:700}
    #checkBtn{background:#4f7cff}#resetBtn{background:#4b5b9e}
    #feedback{min-height:24px;margin-top:10px;text-align:center;font-weight:700}
    .ok{color:var(--ok)}.bad{color:var(--bad)}
  </style>
</head>
<body>
  <main class="app">
    <h1>行星排序实验室</h1>
    <p class="desc">把行星按“离太阳由近到远”排序（不含地球外小行星带等）。</p>
    <section class="stats">
      <div class="box">得分<strong id="score">0</strong></div>
      <div class="box">完成轮次<strong id="round">0</strong></div>
      <div class="box">准确率<strong id="acc">0%</strong></div>
    </section>
    <ul id="list" aria-label="可拖动行星列表"></ul>
    <div class="actions">
      <button id="checkBtn">检查顺序</button>
      <button id="resetBtn">重新洗牌</button>
    </div>
    <div id="feedback"></div>
  </main>

<script>
(() => {
  const planets = ["水星","金星","地球","火星","木星","土星","天王星","海王星"];
  const list = document.getElementById('list');
  const scoreEl = document.getElementById('score');
  const roundEl = document.getElementById('round');
  const accEl = document.getElementById('acc');
  const feedback = document.getElementById('feedback');

  let score = 0, round = 0, win = 0;
  let dragEl = null;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function render(items){
    list.innerHTML = '';
    items.forEach(name => {
      const li = document.createElement('li');
      li.className = 'planet';
      li.draggable = true;
      li.dataset.name = name;
      li.innerHTML = `<span>${name}</span><span class="tag">拖动排序</span>`;
      bindDrag(li);
      list.appendChild(li);
    });
  }

  function bindDrag(el){
    el.addEventListener('dragstart', () => { dragEl = el; el.classList.add('dragging'); });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragEl = null; });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if(!dragEl || dragEl===el) return;
      const rect = el.getBoundingClientRect();
      const next = (e.clientY - rect.top) > rect.height/2;
      list.insertBefore(dragEl, next ? el.nextSibling : el);
    });

    let touchY = 0;
    el.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; dragEl = el; }, {passive:true});
    el.addEventListener('touchmove', e => {
      if(!dragEl) return;
      const y = e.touches[0].clientY;
      const target = document.elementFromPoint(e.touches[0].clientX, y)?.closest('.planet');
      if(target && target !== dragEl){
        const rect = target.getBoundingClientRect();
        const next = (y - rect.top) > rect.height/2;
        list.insertBefore(dragEl, next ? target.nextSibling : target);
      }
      touchY = y;
    }, {passive:true});
    el.addEventListener('touchend', ()=>{ dragEl = null; });
  }

  function currentOrder(){
    return [...list.children].map(li => li.dataset.name);
  }

  function updateStats(){
    scoreEl.textContent = score;
    roundEl.textContent = round;
    accEl.textContent = round ? Math.round((win/round)*100) + '%' : '0%';
  }

  function newRound(){
    render(shuffle(planets));
    feedback.textContent = '';
    feedback.className = '';
  }

  document.getElementById('checkBtn').addEventListener('click', ()=>{
    round++;
    const ok = JSON.stringify(currentOrder()) === JSON.stringify(planets);
    if(ok){
      win++; score += 20;
      feedback.textContent = '✅ 排序正确！你掌握了太阳系顺序。';
      feedback.className = 'ok';
      setTimeout(newRound, 800);
    }else{
      score = Math.max(0, score - 5);
      feedback.textContent = '❌ 还不对，提示：最靠近太阳的是水星。';
      feedback.className = 'bad';
    }
    updateStats();
  });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    score = 0; round = 0; win = 0;
    updateStats();
    newRound();
  });

  updateStats();
  newRound();
})();
</script>
</body>
</html>
