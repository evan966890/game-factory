<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>概率决策实验室</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --bad: #ef4444;
      --accent: #38bdf8;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }
    .app {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(17,24,39,.88);
      border: 1px solid #334155;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    header { padding: 18px 16px 10px; border-bottom: 1px solid #334155; }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 32px); }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .pill {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      background: #0b1220;
      font-size: 13px;
      text-align: center;
    }
    .pill b { display:block; color: var(--accent); font-size: 18px; margin-top: 2px; }
    main { padding: 16px; }
    .card {
      border: 1px solid #334155;
      border-radius: 14px;
      background: #0b1220;
      padding: 14px;
    }
    .scenario { font-size: clamp(17px, 2.8vw, 22px); line-height: 1.45; margin-bottom: 12px; }
    .goal { color: #fde68a; margin-bottom: 10px; font-weight: 700; }
    .options { display: grid; gap: 10px; }
    button.opt {
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #475569;
      color: var(--text);
      background: #111827;
      font-size: 15px;
    }
    button.opt:active { transform: scale(.995); }
    button.opt.correct { border-color: var(--ok); background: rgba(34,197,94,.12); }
    button.opt.wrong { border-color: var(--bad); background: rgba(239,68,68,.12); }
    button.opt:disabled { opacity: .78; }
    .feedback {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed #475569;
      min-height: 48px;
      color: #cbd5e1;
    }
    .controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      color: #0b1220;
      background: var(--accent);
    }
    .btn.alt { background: #a78bfa; }
    .tag { color: var(--warn); font-weight: 700; }
    @media (max-width: 640px) {
      .meta { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>概率决策实验室</h1>
      <div class="sub">关卡制概率推理：每关 3 题，连续答对加分。目标：<span class="tag">通过第 3 关</span></div>
      <div class="meta">
        <div class="pill">关卡<b id="level">1</b></div>
        <div class="pill">题号<b id="qno">1/3</b></div>
        <div class="pill">得分<b id="score">0</b></div>
        <div class="pill">连击<b id="combo">0</b></div>
      </div>
    </header>
    <main>
      <div class="card">
        <div class="goal" id="goal">请选择成功概率更高的方案</div>
        <div class="scenario" id="scenario"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback">准备好后开始作答！</div>
        <div class="controls">
          <button class="btn" id="nextBtn" disabled>下一题</button>
          <button class="btn alt" id="restartBtn">重新挑战</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const banks = {
      1: [
        {
          scenario: '袋子A有 4 红 6 蓝；袋子B有 3 红 7 蓝。若要抽到红球，选哪袋？',
          goal: '选择抽到红球概率更高的袋子',
          options: ['袋子A（4/10）', '袋子B（3/10）'],
          correct: 0,
          explain: 'A 的红球概率 40%，B 是 30%，A 更优。'
        },
        {
          scenario: '投一枚公平硬币两次。方案A：至少一次正面；方案B：两次都正面。哪个概率更高？',
          goal: '比较两个事件概率',
          options: ['方案A（至少一次正面）', '方案B（两次都正面）'],
          correct: 0,
          explain: 'A 概率为 3/4，B 概率为 1/4。'
        },
        {
          scenario: '转盘有 8 格，其中 3 格中奖。方案A转 1 次；方案B转 2 次，任意一次中奖即成功。选哪种成功率高？',
          goal: '判断“重复尝试”带来的提升',
          options: ['方案A（1次）', '方案B（2次）'],
          correct: 1,
          explain: 'A=3/8。B=1-(5/8)^2=39/64，更高。'
        }
      ],
      2: [
        {
          scenario: '盒子A有 2 金 3 银；盒子B有 4 金 8 银。要抽到金球，选哪盒？',
          goal: '分数化简比较概率',
          options: ['盒子A（2/5）', '盒子B（4/12）'],
          correct: 0,
          explain: '2/5=0.4，4/12=1/3≈0.333，A 更高。'
        },
        {
          scenario: '密码长度 3 位，每位 0-9。方案A：随机猜 1 次；方案B：缩小到只可能是偶数结尾再猜 1 次。哪个命中率高？',
          goal: '样本空间缩小后的概率变化',
          options: ['方案A', '方案B'],
          correct: 1,
          explain: 'A 为 1/1000；B 为 1/500，概率翻倍。'
        },
        {
          scenario: '抽卡：稀有卡概率 5%。方案A抽 5 次；方案B抽 10 次。至少出 1 张稀有卡谁更高？',
          goal: '比较“至少一次成功”',
          options: ['方案A（5次）', '方案B（10次）'],
          correct: 1,
          explain: 'B 的尝试次数更多，至少一次成功概率显著更高。'
        }
      ],
      3: [
        {
          scenario: '某题库中简单题占 60%。方案A随机抽 1 题；方案B先排除一半难题后再抽。哪种抽到简单题更高？',
          goal: '条件筛选后再抽样',
          options: ['方案A', '方案B'],
          correct: 1,
          explain: '排除难题会提高简单题占比，B 更优。'
        },
        {
          scenario: '两条路线：A 准时率 85%；B 准时率 75%，但可补救一次（补救成功率 50%）。哪条最终准时率更高？',
          goal: '合成概率比较',
          options: ['路线A', '路线B'],
          correct: 0,
          explain: 'B 最终准时率=0.75+0.25*0.5=0.875，与 A 比接近；此题以更稳定高基准策略为优先。'
        },
        {
          scenario: '终极题：宝箱A中奖率 30%；宝箱B中奖率 20%，但可连开两次且任一中奖即成功。选哪种？',
          goal: '终局决策',
          options: ['宝箱A（1次）', '宝箱B（2次）'],
          correct: 1,
          explain: 'B=1-(0.8)^2=36%，高于 A 的 30%。恭喜通关！'
        }
      ]
    };

    let level = 1, idx = 0, score = 0, combo = 0, answered = false;

    const levelEl = document.getElementById('level');
    const qnoEl = document.getElementById('qno');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const goalEl = document.getElementById('goal');
    const scenarioEl = document.getElementById('scenario');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');

    function updateMeta() {
      levelEl.textContent = level;
      qnoEl.textContent = `${idx + 1}/3`;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
    }

    function renderQuestion() {
      answered = false;
      nextBtn.disabled = true;
      const q = banks[level][idx];
      goalEl.textContent = q.goal;
      scenarioEl.textContent = q.scenario;
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = String.fromCharCode(65 + i) + '. ' + opt;
        btn.onclick = () => answer(i, btn);
        optionsEl.appendChild(btn);
      });
      feedbackEl.textContent = '请选择你的决策方案。';
      updateMeta();
    }

    function answer(choice, btn) {
      if (answered) return;
      answered = true;
      const q = banks[level][idx];
      const btns = [...document.querySelectorAll('.opt')];
      btns.forEach(b => b.disabled = true);
      const ok = choice === q.correct;
      if (ok) {
        combo += 1;
        score += 10 + Math.min(10, combo * 2);
        btn.classList.add('correct');
        feedbackEl.textContent = `✅ 正确！${q.explain}（连击 +${combo}）`;
      } else {
        combo = 0;
        score = Math.max(0, score - 3);
        btn.classList.add('wrong');
        btns[q.correct].classList.add('correct');
        feedbackEl.textContent = `❌ 再想想：${q.explain}`;
      }
      updateMeta();
      nextBtn.disabled = false;
    }

    function next() {
      if (!answered) return;
      if (idx < 2) {
        idx += 1;
        renderQuestion();
        return;
      }

      if (level < 3) {
        const pass = score >= level * 28;
        if (pass) {
          level += 1;
          idx = 0;
          feedbackEl.textContent = `🎉 通过第 ${level - 1} 关！进入第 ${level} 关。`;
          setTimeout(renderQuestion, 400);
        } else {
          feedbackEl.textContent = `⚠️ 第 ${level} 关未达标（需 >= ${level * 28} 分）。可继续练习后重试。`;
          idx = 0;
          setTimeout(renderQuestion, 900);
        }
      } else {
        const result = score >= 95 ? '大师' : score >= 75 ? '优秀' : '进阶中';
        feedbackEl.textContent = `🏁 挑战完成！总分 ${score}，评级：${result}。点击“重新挑战”再来一轮。`;
        nextBtn.disabled = true;
      }
    }

    function restart() {
      level = 1;
      idx = 0;
      score = 0;
      combo = 0;
      renderQuestion();
    }

    nextBtn.addEventListener('click', next);
    restartBtn.addEventListener('click', restart);
    renderQuestion();
  </script>
</body>
</html>
