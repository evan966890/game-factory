<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>方块堆叠塔</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #eaeaea;
      --muted: #8a8a8a;
      --primary: #0f3460;
      --primary-dark: #0a2647;
      --accent: #e94560;
      --accent-light: #ff6b6b;
      --ok: #4ecca3;
      --bad: #e94560;
      --border: #2a2a4a;
      --radius: 16px;
      --block-color: #4ecca3;
      --block-shadow: #3aa889;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0f0f23 0%, var(--bg) 45%, #1a1a2e 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .app {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      padding: 18px;
      position: relative;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0 0 6px;
      line-height: 1.25;
      text-align: center;
      color: var(--accent-light);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
    }

    .stat .label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat .value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ok);
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 400px;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .block {
      position: absolute;
      background: linear-gradient(135deg, var(--block-color) 0%, var(--block-shadow) 100%);
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: all 0.1s ease;
    }

    .block.current {
      background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    .block.stacked {
      background: linear-gradient(135deg, var(--block-color) 0%, var(--block-shadow) 100%);
    }

    .block.perfect {
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-size: 2rem;
      margin: 0 0 10px;
      color: var(--accent-light);
    }

    .overlay p {
      font-size: 1.1rem;
      margin: 0 0 20px;
      color: var(--muted);
    }

    .overlay .final-score {
      font-size: 3rem;
      font-weight: 700;
      color: var(--ok);
      margin-bottom: 20px;
    }

    .instructions {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .instructions strong {
      color: var(--accent-light);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .pulse {
      animation: pulse 0.5s ease;
    }

    @keyframes perfect-flash {
      0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
      50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.9); }
    }

    .perfect-flash {
      animation: perfect-flash 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>方块堆叠塔</h1>
    <p class="subtitle">精确堆叠，建造高塔</p>
    
    <div class="stats">
      <div class="stat">
        <span class="label">得分</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">最高分</span>
        <span class="value" id="high-score">0</span>
      </div>
      <div class="stat">
        <span class="label">层数</span>
        <span class="value" id="level">0</span>
      </div>
    </div>

    <div class="game-area" id="game-area">
      <div class="overlay" id="start-overlay">
        <h2>方块堆叠塔</h2>
        <p>点击屏幕让方块落下</p>
        <button class="btn btn-primary" id="start-btn">开始游戏</button>
      </div>
      
      <div class="overlay" id="game-over-overlay">
        <h2>游戏结束</h2>
        <p>最终得分</p>
        <div class="final-score" id="final-score">0</div>
        <button class="btn btn-primary" id="restart-btn">再来一局</button>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="pause-btn" style="display: none;">暂停</button>
    </div>

    <p class="instructions">
      <strong>点击/触摸</strong> 让方块落下<br>
      堆叠越精确，得分越高
    </p>
  </div>

  <script>
    // 游戏状态
    const state = {
      score: 0,
      highScore: parseInt(localStorage.getItem('stackTowerHighScore')) || 0,
      level: 0,
      isPlaying: false,
      isPaused: false,
      currentBlock: null,
      blocks: [],
      gameWidth: 0,
      gameHeight: 0,
      blockSize: { width: 100, height: 30 },
      moveSpeed: 3,
      moveDirection: 1,
      lastTime: 0,
      animationId: null
    };

    // DOM 元素
    const gameArea = document.getElementById('game-area');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const levelEl = document.getElementById('level');
    const startOverlay = document.getElementById('start-overlay');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const finalScoreEl = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const pauseBtn = document.getElementById('pause-btn');

    // 初始化游戏
    function init() {
      state.gameWidth = gameArea.clientWidth;
      state.gameHeight = gameArea.clientHeight;
      highScoreEl.textContent = state.highScore;
      
      // 事件监听
      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', restartGame);
      pauseBtn.addEventListener('click', togglePause);
      
      // 触摸和点击事件
      gameArea.addEventListener('click', handleClick);
      gameArea.addEventListener('touchstart', handleTouch, { passive: false });
      
      // 窗口大小变化
      window.addEventListener('resize', handleResize);
    }

    // 开始游戏
    function startGame() {
      state.isPlaying = true;
      state.isPaused = false;
      state.score = 0;
      state.level = 0;
      state.blocks = [];
      state.moveSpeed = 3;
      
      // 清除所有方块
      const existingBlocks = gameArea.querySelectorAll('.block');
      existingBlocks.forEach(block => block.remove());
      
      // 创建基础方块
      createBaseBlock();
      
      // 创建第一个移动方块
      createMovingBlock();
      
      // 更新显示
      updateDisplay();
      
      // 隐藏开始界面
      startOverlay.classList.remove('active');
      pauseBtn.style.display = 'block';
      
      // 开始游戏循环
      state.lastTime = performance.now();
      gameLoop();
    }

    // 重新开始游戏
    function restartGame() {
      gameOverOverlay.classList.remove('active');
      startGame();
    }

    // 暂停/继续游戏
    function togglePause() {
      if (!state.isPlaying) return;
      
      state.isPaused = !state.isPaused;
      pauseBtn.textContent = state.isPaused ? '继续' : '暂停';
      
      if (!state.isPaused) {
        state.lastTime = performance.now();
        gameLoop();
      }
    }

    // 创建基础方块
    function createBaseBlock() {
      const baseBlock = document.createElement('div');
      baseBlock.className = 'block stacked';
      baseBlock.style.width = state.blockSize.width + 'px';
      baseBlock.style.height = state.blockSize.height + 'px';
      baseBlock.style.left = (state.gameWidth - state.blockSize.width) / 2 + 'px';
      baseBlock.style.bottom = '0px';
      
      gameArea.appendChild(baseBlock);
      
      state.blocks.push({
        element: baseBlock,
        x: (state.gameWidth - state.blockSize.width) / 2,
        y: 0,
        width: state.blockSize.width,
        height: state.blockSize.height
      });
    }

    // 创建移动方块
    function createMovingBlock() {
      const lastBlock = state.blocks[state.blocks.length - 1];
      const newWidth = lastBlock ? lastBlock.width : state.blockSize.width;
      
      const block = document.createElement('div');
      block.className = 'block current';
      block.style.width = newWidth + 'px';
      block.style.height = state.blockSize.height + 'px';
      block.style.left = '0px';
      block.style.bottom = (state.blocks.length * state.blockSize.height) + 'px';
      
      gameArea.appendChild(block);
      
      state.currentBlock = {
        element: block,
        x: 0,
        y: state.blocks.length * state.blockSize.height,
        width: newWidth,
        height: state.blockSize.height,
        direction: 1
      };
    }

    // 游戏循环
    function gameLoop(currentTime) {
      if (!state.isPlaying || state.isPaused) return;
      
      const deltaTime = currentTime - state.lastTime;
      state.lastTime = currentTime;
      
      // 移动当前方块
      if (state.currentBlock) {
        moveCurrentBlock(deltaTime);
      }
      
      state.animationId = requestAnimationFrame(gameLoop);
    }

    // 移动当前方块
    function moveCurrentBlock(deltaTime) {
      const block = state.currentBlock;
      const speed = state.moveSpeed * (deltaTime / 16);
      
      block.x += speed * block.direction;
      
      // 边界检测
      if (block.x <= 0) {
        block.x = 0;
        block.direction = 1;
      } else if (block.x + block.width >= state.gameWidth) {
        block.x = state.gameWidth - block.width;
        block.direction = -1;
      }
      
      // 更新位置
      block.element.style.left = block.x + 'px';
    }

    // 处理点击
    function handleClick(e) {
      if (!state.isPlaying || state.isPaused) return;
      e.preventDefault();
      dropBlock();
    }

    // 处理触摸
    function handleTouch(e) {
      if (!state.isPlaying || state.isPaused) return;
      e.preventDefault();
      dropBlock();
    }

    // 方块落下
    function dropBlock() {
      if (!state.currentBlock) return;
      
      const current = state.currentBlock;
      const lastBlock = state.blocks[state.blocks.length - 1];
      
      // 计算堆叠精度
      let overlap = 0;
      let isPerfect = false;
      
      if (lastBlock) {
        const currentLeft = current.x;
        const currentRight = current.x + current.width;
        const lastLeft = lastBlock.x;
        const lastRight = lastBlock.x + lastBlock.width;
        
        // 计算重叠区域
        const overlapLeft = Math.max(currentLeft, lastLeft);
        const overlapRight = Math.min(currentRight, lastRight);
        overlap = Math.max(0, overlapRight - overlapLeft);
        
        // 检查是否完美堆叠
        isPerfect = Math.abs(currentLeft - lastLeft) < 5 && Math.abs(current.width - lastBlock.width) < 5;
      } else {
        overlap = current.width;
        isPerfect = true;
      }
      
      // 计算得分
      let points = 0;
      if (isPerfect) {
        points = 100;
        current.element.classList.add('perfect');
        current.element.classList.add('perfect-flash');
        setTimeout(() => current.element.classList.remove('perfect-flash'), 300);
      } else {
        const accuracy = overlap / current.width;
        points = Math.floor(accuracy * 50);
      }
      
      state.score += points;
      state.level++;
      
      // 更新方块状态
      current.element.classList.remove('current');
      current.element.classList.add('stacked');
      
      // 添加到方块列表
      state.blocks.push(current);
      state.currentBlock = null;
      
      // 检查游戏是否结束
      if (overlap < 10) {
        gameOver();
        return;
      }
      
      // 计算新方块宽度
      let newWidth = current.width;
      if (!isPerfect) {
        const accuracy = overlap / current.width;
        newWidth = Math.max(20, current.width * accuracy);
      }
      
      // 更新显示
      updateDisplay();
      
      // 创建新方块
      setTimeout(() => {
        if (state.isPlaying) {
          createMovingBlock();
          // 增加难度
          state.moveSpeed = Math.min(8, 3 + state.level * 0.1);
        }
      }, 100);
    }

    // 游戏结束
    function gameOver() {
      state.isPlaying = false;
      cancelAnimationFrame(state.animationId);
      
      // 更新最高分
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('stackTowerHighScore', state.highScore);
      }
      
      // 显示游戏结束界面
      finalScoreEl.textContent = state.score;
      gameOverOverlay.classList.add('active');
      pauseBtn.style.display = 'none';
    }

    // 更新显示
    function updateDisplay() {
      scoreEl.textContent = state.score;
      highScoreEl.textContent = state.highScore;
      levelEl.textContent = state.level;
      
      // 添加动画效果
      scoreEl.classList.add('pulse');
      setTimeout(() => scoreEl.classList.remove('pulse'), 500);
    }

    // 处理窗口大小变化
    function handleResize() {
      state.gameWidth = gameArea.clientWidth;
      state.gameHeight = gameArea.clientHeight;
    }

    // 初始化
    init();
    
    // 显示开始界面
    startOverlay.classList.add('active');
  </script>
</body>
</html>
