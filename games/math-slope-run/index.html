<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学斜坡跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 700px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-display {
            font-size: 24px;
            font-weight: bold;
        }

        .distance-display {
            font-size: 18px;
            opacity: 0.9;
        }

        .difficulty-display {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 15px;
        }

        .game-area {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #0f0f23 0%, #1a1a2e 100%);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #533483 0%, #0f3460 100%);
            color: white;
        }

        .math-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .math-modal.active {
            display: flex;
        }

        .math-content {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            animation: modalPop 0.3s ease;
            border: 2px solid #e94560;
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .math-question {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }

        .math-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 3px solid #533483;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            background: #1a1a2e;
            color: white;
        }

        .math-input:focus {
            border-color: #e94560;
        }

        .math-feedback {
            font-size: 18px;
            margin-top: 10px;
            min-height: 25px;
        }

        .math-feedback.correct {
            color: #00b894;
        }

        .math-feedback.wrong {
            color: #d63031;
        }

        .game-over-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-modal.active {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            border: 2px solid #e94560;
        }

        .game-over-title {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 10px;
        }

        .high-score {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .achievement-popup {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 200;
            animation: achievementPop 0.5s ease;
            display: none;
        }

        @keyframes achievementPop {
            0% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            50% { transform: translateX(-50%) translateY(10px); }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #00b894;
            pointer-events: none;
            animation: scoreFloat 1s ease forwards;
            z-index: 50;
        }

        @keyframes scoreFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .instructions {
            padding: 15px 20px;
            background: #0f0f23;
            font-size: 14px;
            color: #a0a0a0;
            text-align: center;
            border-top: 1px solid #1a1a2e;
        }

        .achievements-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .achievements-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .achievements-modal.active {
            display: flex;
        }

        .achievements-content {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            border: 2px solid #533483;
        }

        .achievements-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .achievement-item.unlocked {
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
        }

        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 20px;
        }

        .achievement-item.unlocked .achievement-icon {
            background: rgba(255, 255, 255, 0.3);
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: bold;
            color: #fff;
        }

        .achievement-desc {
            font-size: 14px;
            color: #a0a0a0;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            color: #a0a0a0;
            cursor: pointer;
        }

        .shield-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(243, 156, 18, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }

        .shield-indicator.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div>
                <div class="score-display">分数: <span id="score">0</span></div>
                <div class="distance-display">距离: <span id="distance">0</span>米</div>
            </div>
            <div class="difficulty-display" id="difficulty">加法</div>
            <button class="achievements-btn" onclick="showAchievements()">🏆</button>
        </div>

        <div class="game-area" id="gameArea">
            <canvas id="gameCanvas"></canvas>
            <div class="shield-indicator" id="shieldIndicator">🛡️ 护盾激活</div>
            <div class="achievement-popup" id="achievementPopup"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()" style="display: none;">暂停</button>
        </div>

        <div class="instructions">
            左右倾斜设备或点击屏幕两侧控制球体，每100米回答一道数学题！
        </div>
    </div>

    <!-- 数学题模态框 -->
    <div class="math-modal" id="mathModal">
        <div class="math-content">
            <div class="math-question" id="mathQuestion">5 + 3 = ?</div>
            <input type="number" class="math-input" id="mathInput" placeholder="输入答案" autofocus>
            <button class="btn btn-primary" onclick="submitAnswer()">提交答案</button>
            <div class="math-feedback" id="mathFeedback"></div>
        </div>
    </div>

    <!-- 游戏结束模态框 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <div class="game-over-title">游戏结束</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="high-score" id="highScore">最高分: 0</div>
            <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <!-- 成就模态框 -->
    <div class="achievements-modal" id="achievementsModal">
        <div class="achievements-content">
            <button class="close-btn" onclick="closeAchievements()">×</button>
            <div class="achievements-title">成就列表</div>
            <div id="achievementsList"></div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            score: 0,
            distance: 0,
            difficulty: 'add',
            isGameOver: false,
            isPaused: false,
            isPlaying: false,
            ball: {
                x: 0,
                y: 0,
                z: 0,
                vx: 0,
                vy: 0,
                vz: 0,
                radius: 15,
                color: '#3b82f6'
            },
            obstacles: [],
            achievements: {
                distance1000: { unlocked: false, progress: 0 },
                math50: { unlocked: false, progress: 0 },
                obstacle100: { unlocked: false, progress: 0 }
            },
            highScore: 0,
            hasShield: false,
            shieldTime: 0,
            speed: 1.0,
            mathCorrect: 0,
            obstaclesAvoided: 0,
            lastMathDistance: 0,
            animationId: null,
            lastTime: 0
        };

        // 成就定义
        const achievementsList = [
            { id: 'distance1000', name: '长途跋涉', description: '前进1000米', target: 1000, type: 'distance' },
            { id: 'math50', name: '数学大师', description: '答对50题', target: 50, type: 'math' },
            { id: 'obstacle100', name: '障碍高手', description: '避开100个障碍物', target: 100, type: 'obstacle' }
        ];

        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const distanceEl = document.getElementById('distance');
        const difficultyEl = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const mathModal = document.getElementById('mathModal');
        const mathQuestionEl = document.getElementById('mathQuestion');
        const mathInputEl = document.getElementById('mathInput');
        const mathFeedbackEl = document.getElementById('mathFeedback');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const achievementPopup = document.getElementById('achievementPopup');
        const achievementsModal = document.getElementById('achievementsModal');
        const achievementsListEl = document.getElementById('achievementsList');
        const shieldIndicator = document.getElementById('shieldIndicator');

        // 初始化
        function init() {
            resizeCanvas();
            loadGameData();
            updateDisplay();
            renderAchievements();
            setupControls();
        }

        // 调整 Canvas 大小
        function resizeCanvas() {
            const container = document.getElementById('gameArea');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            gameState.ball.x = canvas.width / 2;
            gameState.ball.y = canvas.height - 100;
        }

        // 加载游戏数据
        function loadGameData() {
            const saved = localStorage.getItem('mathSlopeRun');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.highScore = data.highScore || 0;
                gameState.achievements = data.achievements || gameState.achievements;
            }
        }

        // 保存游戏数据
        function saveGameData() {
            const data = {
                highScore: gameState.highScore,
                achievements: gameState.achievements
            };
            localStorage.setItem('mathSlopeRun', JSON.stringify(data));
        }

        // 设置控制
        function setupControls() {
            // 设备倾斜
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // 点击/触摸控制
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouch);

            // 键盘控制
            document.addEventListener('keydown', handleKeydown);
        }

        // 处理设备倾斜
        function handleOrientation(event) {
            if (!gameState.isPlaying || gameState.isGameOver || gameState.isPaused) return;

            const gamma = event.gamma; // 左右倾斜 (-90 到 90)
            if (gamma !== null) {
                const tilt = gamma / 45; // 归一化到 -2 到 2
                gameState.ball.vx = tilt * 3;
            }
        }

        // 处理点击
        function handleClick(event) {
            if (!gameState.isPlaying || gameState.isGameOver || gameState.isPaused) return;
            if (mathModal.classList.contains('active')) return;

            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const centerX = canvas.width / 2;

            if (x < centerX) {
                gameState.ball.vx = -5;
            } else {
                gameState.ball.vx = 5;
            }
        }

        // 处理触摸
        function handleTouch(event) {
            event.preventDefault();
            if (!gameState.isPlaying || gameState.isGameOver || gameState.isPaused) return;
            if (mathModal.classList.contains('active')) return;

            const rect = canvas.getBoundingClientRect();
            const touch = event.touches[0];
            const x = touch.clientX - rect.left;
            const centerX = canvas.width / 2;

            if (x < centerX) {
                gameState.ball.vx = -5;
            } else {
                gameState.ball.vx = 5;
            }
        }

        // 处理键盘
        function handleKeydown(event) {
            if (!gameState.isPlaying || gameState.isGameOver || gameState.isPaused) return;
            if (mathModal.classList.contains('active')) return;

            if (event.key === 'ArrowLeft') {
                gameState.ball.vx = -5;
            } else if (event.key === 'ArrowRight') {
                gameState.ball.vx = 5;
            }
        }

        // 开始游戏
        function startGame() {
            gameState.score = 0;
            gameState.distance = 0;
            gameState.difficulty = 'add';
            gameState.isGameOver = false;
            gameState.isPaused = false;
            gameState.isPlaying = true;
            gameState.ball.x = canvas.width / 2;
            gameState.ball.y = canvas.height - 100;
            gameState.ball.vx = 0;
            gameState.ball.vy = 0;
            gameState.ball.color = '#3b82f6';
            gameState.obstacles = [];
            gameState.hasShield = false;
            gameState.shieldTime = 0;
            gameState.speed = 1.0;
            gameState.mathCorrect = 0;
            gameState.obstaclesAvoided = 0;
            gameState.lastMathDistance = 0;

            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            updateDisplay();
            gameState.lastTime = performance.now();
            gameLoop();
        }

        // 游戏循环
        function gameLoop(currentTime) {
            if (gameState.isGameOver || gameState.isPaused) return;

            const deltaTime = (currentTime - gameState.lastTime) / 1000;
            gameState.lastTime = currentTime;

            update(deltaTime);
            render();

            gameState.animationId = requestAnimationFrame(gameLoop);
        }

        // 更新游戏状态
        function update(deltaTime) {
            // 更新球体位置
            gameState.ball.x += gameState.ball.vx * deltaTime * 60;
            gameState.ball.vx *= 0.95; // 摩擦力

            // 边界检测
            if (gameState.ball.x < gameState.ball.radius) {
                gameState.ball.x = gameState.ball.radius;
                gameState.ball.vx = 0;
            }
            if (gameState.ball.x > canvas.width - gameState.ball.radius) {
                gameState.ball.x = canvas.width - gameState.ball.radius;
                gameState.ball.vx = 0;
            }

            // 更新距离
            gameState.distance += gameState.speed * deltaTime * 10;

            // 更新分数
            gameState.score += Math.floor(gameState.speed * deltaTime * 5);

            // 生成障碍物
            if (Math.random() < 0.02 * gameState.speed) {
                generateObstacle();
            }

            // 更新障碍物
            updateObstacles(deltaTime);

            // 检查是否需要弹出数学题
            if (gameState.distance - gameState.lastMathDistance >= 100) {
                showMathQuestion();
                gameState.lastMathDistance = gameState.distance;
            }

            // 更新难度
            updateDifficulty();

            // 更新护盾
            if (gameState.hasShield) {
                gameState.shieldTime -= deltaTime;
                if (gameState.shieldTime <= 0) {
                    gameState.hasShield = false;
                    shieldIndicator.classList.remove('active');
                    gameState.ball.color = '#3b82f6';
                }
            }

            // 检查成就
            checkAchievement('distance1000', Math.floor(gameState.distance));

            updateDisplay();
        }

        // 生成障碍物
        function generateObstacle() {
            const obstacle = {
                x: Math.random() * (canvas.width - 40) + 20,
                y: -30,
                width: 40,
                height: 30,
                speed: 2 + gameState.speed
            };
            gameState.obstacles.push(obstacle);
        }

        // 更新障碍物
        function updateObstacles(deltaTime) {
            for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
                const obstacle = gameState.obstacles[i];
                obstacle.y += obstacle.speed * deltaTime * 60;

                // 碰撞检测
                if (checkCollision(gameState.ball, obstacle)) {
                    if (gameState.hasShield) {
                        // 护盾抵消碰撞
                        gameState.hasShield = false;
                        shieldIndicator.classList.remove('active');
                        gameState.ball.color = '#3b82f6';
                        gameState.obstacles.splice(i, 1);
                        continue;
                    } else {
                        gameOver();
                        return;
                    }
                }

                // 移除屏幕外的障碍物
                if (obstacle.y > canvas.height) {
                    gameState.obstacles.splice(i, 1);
                    gameState.obstaclesAvoided++;
                    checkAchievement('obstacle100', gameState.obstaclesAvoided);
                }
            }
        }

        // 碰撞检测
        function checkCollision(ball, obstacle) {
            const dx = ball.x - (obstacle.x + obstacle.width / 2);
            const dy = ball.y - (obstacle.y + obstacle.height / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < ball.radius + Math.min(obstacle.width, obstacle.height) / 2;
        }

        // 更新难度
        function updateDifficulty() {
            const distance = gameState.distance;
            if (distance < 500) {
                gameState.difficulty = 'add';
                difficultyEl.textContent = '加法';
            } else if (distance < 1000) {
                gameState.difficulty = 'subtract';
                difficultyEl.textContent = '减法';
            } else if (distance < 1500) {
                gameState.difficulty = 'multiply';
                difficultyEl.textContent = '乘法';
            } else {
                gameState.difficulty = 'divide';
                difficultyEl.textContent = '除法';
            }

            // 增加速度
            gameState.speed = 1.0 + Math.floor(distance / 100) * 0.02;
        }

        // 渲染游戏
        function render() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制斜坡（简单线条）
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            for (let i = 0; i < 10; i++) {
                const y = (i * 100 + gameState.distance * 10) % canvas.height;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 绘制障碍物
            ctx.fillStyle = '#e94560';
            gameState.obstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });

            // 绘制球体
            ctx.beginPath();
            ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = gameState.ball.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制护盾效果
            if (gameState.hasShield) {
                ctx.beginPath();
                ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(243, 156, 18, 0.5)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        // 显示数学题
        function showMathQuestion() {
            gameState.isPaused = true;
            cancelAnimationFrame(gameState.animationId);

            const question = generateMathQuestion();
            mathQuestionEl.textContent = question.text;
            mathInputEl.value = '';
            mathFeedbackEl.textContent = '';
            mathModal.classList.add('active');
            mathInputEl.focus();
        }

        // 生成数学题
        function generateMathQuestion() {
            let num1, num2, operator, answer;

            switch (gameState.difficulty) {
                case 'add':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    operator = '+';
                    answer = num1 + num2;
                    break;
                case 'subtract':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * num1) + 1;
                    operator = '-';
                    answer = num1 - num2;
                    break;
                case 'multiply':
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    operator = '×';
                    answer = num1 * num2;
                    break;
                case 'divide':
                    num2 = Math.floor(Math.random() * 10) + 1;
                    answer = Math.floor(Math.random() * 10) + 1;
                    num1 = num2 * answer;
                    operator = '÷';
                    break;
            }

            return {
                text: `${num1} ${operator} ${num2} = ?`,
                answer: answer
            };
        }

        // 提交答案
        function submitAnswer() {
            const userAnswer = parseInt(mathInputEl.value);
            const questionText = mathQuestionEl.textContent;
            const parts = questionText.split(' ');
            const num1 = parseInt(parts[0]);
            const operator = parts[1];
            const num2 = parseInt(parts[2]);

            let correctAnswer;
            switch (operator) {
                case '+': correctAnswer = num1 + num2; break;
                case '-': correctAnswer = num1 - num2; break;
                case '×': correctAnswer = num1 * num2; break;
                case '÷': correctAnswer = num1 / num2; break;
            }

            if (userAnswer === correctAnswer) {
                mathFeedbackEl.textContent = '正确！奖励：加速 + 护盾';
                mathFeedbackEl.className = 'math-feedback correct';
                gameState.score += 20;
                gameState.speed *= 1.1;
                gameState.hasShield = true;
                gameState.shieldTime = 5; // 5秒护盾
                shieldIndicator.classList.add('active');
                gameState.ball.color = '#f39c12';
                gameState.mathCorrect++;
                checkAchievement('math50', gameState.mathCorrect);
            } else {
                mathFeedbackEl.textContent = `错误！正确答案是 ${correctAnswer}。惩罚：减速`;
                mathFeedbackEl.className = 'math-feedback wrong';
                gameState.speed *= 0.9;
            }

            updateDisplay();

            setTimeout(() => {
                mathModal.classList.remove('active');
                gameState.isPaused = false;
                gameState.lastTime = performance.now();
                gameLoop(gameState.lastTime);
            }, 1500);
        }

        // 检查成就
        function checkAchievement(id, progress) {
            const achievement = gameState.achievements[id];
            if (achievement && !achievement.unlocked) {
                achievement.progress = progress;
                const def = achievementsList.find(a => a.id === id);
                if (progress >= def.target) {
                    achievement.unlocked = true;
                    showAchievementPopup(def.name);
                    saveGameData();
                    renderAchievements();
                }
            }
        }

        // 显示成就弹出
        function showAchievementPopup(name) {
            achievementPopup.textContent = `🏆 解锁成就：${name}`;
            achievementPopup.style.display = 'block';
            setTimeout(() => {
                achievementPopup.style.display = 'none';
            }, 3000);
        }

        // 显示成就列表
        function showAchievements() {
            achievementsModal.classList.add('active');
        }

        // 关闭成就列表
        function closeAchievements() {
            achievementsModal.classList.remove('active');
        }

        // 渲染成就列表
        function renderAchievements() {
            achievementsListEl.innerHTML = '';
            achievementsList.forEach(def => {
                const achievement = gameState.achievements[def.id];
                const item = document.createElement('div');
                item.className = 'achievement-item' + (achievement.unlocked ? ' unlocked' : '');
                item.innerHTML = `
                    <div class="achievement-icon">${achievement.unlocked ? '🏆' : '🔒'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${def.name}</div>
                        <div class="achievement-desc">${def.description} (${achievement.progress}/${def.target})</div>
                    </div>
                `;
                achievementsListEl.appendChild(item);
            });
        }

        // 更新显示
        function updateDisplay() {
            scoreEl.textContent = Math.floor(gameState.score);
            distanceEl.textContent = Math.floor(gameState.distance);
        }

        // 暂停/继续
        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            pauseBtn.textContent = gameState.isPaused ? '继续' : '暂停';
            if (!gameState.isPaused) {
                gameState.lastTime = performance.now();
                gameLoop(gameState.lastTime);
            } else {
                cancelAnimationFrame(gameState.animationId);
            }
        }

        // 游戏结束
        function gameOver() {
            gameState.isGameOver = true;
            gameState.isPlaying = false;
            cancelAnimationFrame(gameState.animationId);

            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                saveGameData();
            }

            finalScoreEl.textContent = Math.floor(gameState.score);
            highScoreEl.textContent = `最高分: ${Math.floor(gameState.highScore)}`;
            gameOverModal.classList.add('active');
        }

        // 重新开始
        function restartGame() {
            gameOverModal.classList.remove('active');
            startGame();
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && mathModal.classList.contains('active')) {
                submitAnswer();
            }
        });

        // 窗口大小调整
        window.addEventListener('resize', resizeCanvas);

        // 初始化
        init();
    </script>
</body>
</html>
