<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>折扣闪算冲刺</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --ok:#10b981; --bad:#ef4444; --text:#e5e7eb; --sub:#94a3b8; --btn:#2563eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans SC",sans-serif; background:linear-gradient(180deg,#0b1022,#111827); color:var(--text); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
    .app { width:min(680px,100%); background:rgba(17,24,39,.95); border:1px solid #1f2937; border-radius:16px; padding:18px; box-shadow:0 12px 36px rgba(0,0,0,.35); }
    h1 { font-size:1.35rem; margin:0 0 8px; }
    .muted { color:var(--sub); font-size:.95rem; margin:0 0 14px; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
    .stat { background:#0b1220; border:1px solid #1e293b; border-radius:10px; padding:10px; text-align:center; }
    .stat b { display:block; font-size:1.2rem; }
    .q { background:#0b1220; border:1px solid #1e293b; border-radius:12px; padding:14px; margin-bottom:12px; }
    .q .title { font-size:1.2rem; font-weight:700; margin-bottom:8px; }
    .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button { border:0; border-radius:10px; padding:12px 10px; color:white; font-size:1rem; background:var(--btn); }
    button:active { transform:scale(.98); }
    .msg { min-height:24px; margin-top:10px; font-weight:600; }
    .ok { color:var(--ok); }
    .bad { color:var(--bad); }
    .row { display:flex; gap:10px; margin-top:12px; }
    .ghost { background:#334155; }
    @media (max-width:520px){ .choices{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
  <main class="app">
    <h1>折扣闪算冲刺</h1>
    <p class="muted">30 秒内快速判断折后价，训练百分比与乘法心算。</p>

    <section class="stats">
      <div class="stat"><span>剩余时间</span><b id="time">30</b></div>
      <div class="stat"><span>得分</span><b id="score">0</b></div>
      <div class="stat"><span>题号</span><b id="index">0/10</b></div>
    </section>

    <section class="q">
      <div class="title" id="question">点击“开始挑战”</div>
      <div class="choices" id="choices"></div>
      <div class="msg" id="msg"></div>
    </section>

    <div class="row">
      <button id="startBtn">开始挑战</button>
      <button id="restartBtn" class="ghost">重新开始</button>
    </div>
  </main>

  <script>
    const TOTAL = 10;
    let timeLeft = 30, score = 0, current = 0, timer = null, answer = 0, running = false;

    const $ = id => document.getElementById(id);
    const el = { time: $("time"), score: $("score"), index: $("index"), question: $("question"), choices: $("choices"), msg: $("msg") };

    function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rand(0,i); [a[i],a[j]]=[a[j],a[i]];} return a; }

    function newQuestion(){
      const price = rand(20, 200) * 5;
      const discount = [10,15,20,25,30,40,50][rand(0,6)];
      answer = Math.round(price * (100-discount) / 100);
      el.question.textContent = `原价 ¥${price}，打 ${100-discount} 折，折后价是？`;

      const options = new Set([answer]);
      while(options.size < 4){
        const delta = rand(5, 50) * (Math.random() < .5 ? -1 : 1);
        const v = Math.max(1, answer + delta);
        options.add(v);
      }
      renderChoices(shuffle([...options]));
      el.index.textContent = `${current}/${TOTAL}`;
    }

    function renderChoices(opts){
      el.choices.innerHTML = "";
      opts.forEach(v => {
        const b = document.createElement("button");
        b.textContent = `¥${v}`;
        b.onclick = () => pick(v);
        el.choices.appendChild(b);
      });
    }

    function pick(v){
      if(!running) return;
      if(v === answer){ score += 10; el.msg.className = "msg ok"; el.msg.textContent = "✅ 正确！"; }
      else { score = Math.max(0, score - 5); el.msg.className = "msg bad"; el.msg.textContent = `❌ 错了，正确是 ¥${answer}`; }
      el.score.textContent = score;
      current++;
      if(current > TOTAL) return endGame();
      setTimeout(newQuestion, 250);
    }

    function tick(){
      timeLeft--; el.time.textContent = timeLeft;
      if(timeLeft <= 0) endGame();
    }

    function start(){
      clearInterval(timer);
      timeLeft = 30; score = 0; current = 1; running = true;
      el.msg.textContent = ""; el.msg.className = "msg";
      el.time.textContent = timeLeft; el.score.textContent = score;
      newQuestion();
      timer = setInterval(tick, 1000);
    }

    function endGame(){
      running = false; clearInterval(timer);
      el.question.textContent = `挑战结束！你的得分：${score}`;
      el.choices.innerHTML = "";
      el.index.textContent = `${Math.min(current, TOTAL)}/${TOTAL}`;
      el.msg.className = "msg";
      el.msg.textContent = score >= 70 ? "🎉 心算很强！" : "继续加油，再来一局！";
    }

    $("startBtn").addEventListener("click", start);
    $("restartBtn").addEventListener("click", start);
  </script>
</body>
</html>
