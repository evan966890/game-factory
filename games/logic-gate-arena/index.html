<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>逻辑门竞技场</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #0b1220, #111a33 45%, #1c2f5a);
      color: #e8efff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 18px;
      backdrop-filter: blur(4px);
      padding: 16px;
      box-shadow: 0 14px 42px rgba(0,0,0,.28);
    }
    h1 { margin: 0 0 8px; font-size: clamp(22px, 4vw, 32px); }
    .desc { margin: 0 0 12px; color: #bed0ff; line-height: 1.5; }
    .stats { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 8px; }
    .card { background: rgba(255,255,255,.1); border-radius: 12px; padding: 10px; text-align: center; }
    .label { color: #bed0ff; font-size: 12px; }
    .value { font-size: 21px; font-weight: 700; margin-top: 2px; }
    .question {
      margin-top: 14px;
      background: rgba(10,16,30,.75);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .expr { font-size: clamp(22px, 5vw, 34px); font-weight: 800; letter-spacing: .5px; margin: 6px 0 2px; }
    .ops { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; margin-top: 14px; }
    button {
      border: none; border-radius: 12px; padding: 14px 10px; font-size: 18px; font-weight: 700;
      background: #f4f7ff; color: #182849; cursor: pointer;
    }
    button:active { transform: scale(.98); }
    .controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .secondary { background: rgba(255,255,255,.15); color: #e8efff; border: 1px solid rgba(255,255,255,.25); }
    .feedback { min-height: 24px; margin-top: 12px; font-weight: 700; text-align: center; }
    .good { color: #7bf1b2; }
    .bad { color: #ff9fa4; }
    .hint { margin-top: 8px; color: #c8d7ff; font-size: 14px; text-align: left; background: rgba(255,255,255,.06); padding: 10px; border-radius: 10px; }
    @media (max-width: 540px) {
      .stats { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .ops { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>逻辑门竞技场</h1>
    <p class="desc">90 秒内判断布尔表达式真假（1/0）。题目会混合 AND / OR / XOR / NAND / NOR / NOT，答得越快、连击越高分数越高。</p>

    <section class="stats" aria-label="统计信息">
      <div class="card"><div class="label">倒计时</div><div class="value" id="time">90</div></div>
      <div class="card"><div class="label">得分</div><div class="value" id="score">0</div></div>
      <div class="card"><div class="label">连击</div><div class="value" id="streak">0</div></div>
      <div class="card"><div class="label">正确率</div><div class="value" id="acc">0%</div></div>
    </section>

    <section class="question">
      <div class="label">计算结果（输出 1 或 0）</div>
      <div class="expr" id="expr">(A XOR B) AND C</div>
      <div class="label" id="vars">A=1, B=0, C=1</div>
      <div class="ops">
        <button id="btn1" type="button">输出 = 1</button>
        <button id="btn0" type="button">输出 = 0</button>
      </div>
      <div class="feedback" id="feedback" aria-live="polite"></div>
      <div class="hint">规则速记：XOR 仅当两值不同为 1；NAND = NOT(AND)；NOR = NOT(OR)。</div>
    </section>

    <div class="controls">
      <button class="secondary" id="restart" type="button">重新开始</button>
    </div>
  </main>

  <script>
    (() => {
      const el = {
        time: document.getElementById('time'),
        score: document.getElementById('score'),
        streak: document.getElementById('streak'),
        acc: document.getElementById('acc'),
        expr: document.getElementById('expr'),
        vars: document.getElementById('vars'),
        feedback: document.getElementById('feedback'),
        btn1: document.getElementById('btn1'),
        btn0: document.getElementById('btn0'),
        restart: document.getElementById('restart')
      };

      const funcs = {
        AND: (a,b) => a & b,
        OR: (a,b) => a | b,
        XOR: (a,b) => a ^ b,
        NAND: (a,b) => Number(!(a & b)),
        NOR: (a,b) => Number(!(a | b))
      };

      let state = {};
      let timer = null;

      function randBit() { return Math.random() < 0.5 ? 0 : 1; }
      function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

      function makeQuestion() {
        const A = randBit(), B = randBit(), C = randBit();
        const pattern = Math.random();
        let text = '';
        let answer = 0;

        if (pattern < 0.34) {
          const op1 = pick(['AND','OR','XOR']);
          const op2 = pick(['AND','OR','XOR','NAND','NOR']);
          const left = funcs[op1](A, B);
          answer = funcs[op2](left, C);
          text = `(A ${op1} B) ${op2} C`;
        } else if (pattern < 0.67) {
          const op1 = pick(['AND','OR','XOR']);
          const op2 = pick(['AND','OR','XOR','NAND','NOR']);
          const right = funcs[op2](B, C);
          answer = funcs[op1](A, right);
          text = `A ${op1} (B ${op2} C)`;
        } else {
          const op = pick(['AND','OR','XOR']);
          const notA = Number(!A);
          answer = funcs[op](notA, funcs.NAND(B, C));
          text = `(NOT A) ${op} (B NAND C)`;
        }

        state.current = { A, B, C, text, answer };
        el.expr.textContent = text;
        el.vars.textContent = `A=${A}, B=${B}, C=${C}`;
      }

      function render() {
        el.time.textContent = state.time;
        el.score.textContent = state.score;
        el.streak.textContent = state.streak;
        const acc = state.total ? Math.round((state.correct / state.total) * 100) : 0;
        el.acc.textContent = `${acc}%`;
      }

      function lockAnswer(disabled) {
        el.btn0.disabled = disabled;
        el.btn1.disabled = disabled;
      }

      function answer(v) {
        if (state.time <= 0) return;
        state.total += 1;
        const ok = v === state.current.answer;
        if (ok) {
          state.correct += 1;
          state.streak += 1;
          state.score += 10 + Math.min(20, state.streak * 2);
          el.feedback.textContent = '✅ 正确！继续连击！';
          el.feedback.className = 'feedback good';
        } else {
          state.streak = 0;
          state.score = Math.max(0, state.score - 5);
          el.feedback.textContent = `❌ 错误，正确输出是 ${state.current.answer}`;
          el.feedback.className = 'feedback bad';
        }
        render();
        makeQuestion();
      }

      function stopGame() {
        clearInterval(timer);
        timer = null;
        lockAnswer(true);
        const acc = state.total ? Math.round((state.correct / state.total) * 100) : 0;
        el.feedback.textContent = `⏱️ 时间到！最终得分 ${state.score}，正确率 ${acc}%。点击“重新开始”再来一局。`;
        el.feedback.className = 'feedback';
      }

      function startGame() {
        clearInterval(timer);
        state = { time: 90, score: 0, streak: 0, correct: 0, total: 0, current: null };
        lockAnswer(false);
        makeQuestion();
        render();
        el.feedback.textContent = '开始挑战！';
        el.feedback.className = 'feedback';
        timer = setInterval(() => {
          state.time -= 1;
          render();
          if (state.time <= 0) stopGame();
        }, 1000);
      }

      el.btn1.addEventListener('click', () => answer(1));
      el.btn0.addEventListener('click', () => answer(0));
      el.restart.addEventListener('click', startGame);

      startGame();
    })();
  </script>
</body>
</html>
